body:
  text: 卷之五外科賦瘡瘍外症歷代推詳膏粱八風變病本於內經表裡三因治法分乎先哲經云膏粱之變足生大疔又云諸癰腫筋攣骨痛者此寒氣之腫八風之變也又云諸痛癢瘡皆屬心火三因詳後火氣微甚河間推痛癢之原河間曰人近火者微熱則癢熱甚則痛附近則灼而為瘡皆火之用也或癢痛如針輕刺者猶飛迸火星灼之然也或疑瘡瘍皆屬火熱而反腐出膿水者何也猶穀肉果菜熱極則腐爛而為汙水火熱過極反兼水化也氣血少多丹溪分經絡之異丹溪云瘡之要害處近虛處怯薄處前哲已論及之惟分經之言未之曾聞何則諸經唯少陽厥陰經之瘍理宜預防以其氣多血少也其血本少肌肉難長少陽更有相火遽用驅毒之劑以伐陰血禍不旋踵訣曰多血多氣君須記手經大腸足經胃多氣少血有六經三焦膽腎心脾肺多血少氣心包絡膀胱小腸肝無異記此則知氣血多少之異矣外科精要五善七惡自明此事難知九死地分宜識聖濟録名色固詳朱李書論方斯驗竇氏之徒擅針經之妙育仁之輩補思邈之方熟味群言勾述玄奧欲明大旨先分平病之人要識安危宜究陰陽之證示吉按啓玄子曰經脈一周於身凡長一十六丈二尺計人之息共一萬三千五百定息平人一息脈行六寸漏水下百刻則氣都行八百一十丈正難經所謂一日一夜榮衛行陽二十五度行陰亦二十五度共五十度周於身也丹溪曰得熱則行速而太過得寒則行遲而不及豫按行速熱也多兼實陽證之所由生若兼虛後必陷為陰行遲寒也多兼虛陰證之所由生若兼實後必退為陽陰陽二證詳後內因之故厚味熏蒸發熱更兼七情內攻外因之原風寒暑濕傷人亦為乘虛襲體飢飽勞役失節是名不內外因更有冷熱不均而至金石燒煉常服是因藥毒內傷外有痰鬱兼發而來三因既明部位宜審督脈通乎背脊背側二行太陽是其本經背分五行中間系奇經督脈之道兩旁四行乃足太陽膀胱經之部分任脈行乎腹中臍側兩旁三陰是其所屬腹分七行奇經任脈從前陰起由臍中上咽喉至承漿而止臍旁第一行一寸足少陰腎經之部第二行一寸足陽明胃經之部第三行一寸足太陰脾足厥陰肝經之部乳根屬足陽明胃乳旁乃手三陰經所起足少陽膽經循脅肋行身之側足陽明胃經由乳中行身之前頭為諸陽之會面為三陽之交手背為陽手之三陽從手走至面手心為陰手之三陰從胸走至手足之外跗為陽足之三陽從足走至頭足之內跗為陰足之三陰從足走至腹唇為脾竅舌乃心苗目集五臟之精華鼻通肺家之呼吸腎竅於耳足少陽膽經繞耳之旁胃通於乳足厥陰司乳之頭跨馬囊癰肝家之部喉癰臍發任脈之司先明部分者如毒見於背見於腦中屬督脈旁屬足太陽經也見於鬢屬手足少陽經見於眉屬手足太陽少陽經見於頤見於髭屬手足陽明經見於腮頷屬手陽明經見於顴屬手太陽經見於穿襠屬督衝任三經見於腿外跗屬足三陽內跗屬足三陰見於臂從手背赤肉屬手三陽從手心白肉屬手三陰見於乳內屬陽明外屬少陽頭屬厥陰逐部推求治療自驗用藥引經如太陽用防風羌活陽明白芷升麻少陽用柴胡太陰用白芍升麻少陰只宜獨活厥陰用青皮柴胡佐之以桂庶藥力直攻患處也經絡已清引經之法有驗惡證須識費人之謗不生脫疽井疽及腎疽天疽鋭毒醫之何濟對心雙發及對口蓮子蜂窠急治乃安陳育仁訣曰發於心上出心經五臟乖張事可明名曰井疽最重脾家積毒生背脊發於肩下脊上屬脾厚味發熱積毒所致高腫鮮明根不過肩者順心經火毒對心臨背上對心而發形截督脈又名毒剗君位最易傷人兩肩左右雙生髮肺肝積毒不虛稱左搭手屬肝右搭手屬肺俱生左右肩骨以動之處為可治蓮子蜂窠防毒陷孔似蜂窠實如蓮子二發多生於背與心相近與脊中平輕者形長高腫或偏半背重者形斜平塌兩脅俱傷腰間腎俞發難生生於兩腰內陷肉之間或生兩腰中間椎上毒從腎來欲火消陰十五日前後必死若瘡形紅活高腫為膿急以人參養榮湯合地黃丸療救之督脈經虛從項發俗名對口治宜精生於項後而對前口故名對口但有偏正之不同正者屬督脈易於起發治反易偏者屬太陽經瘡多平塌治反難俗以正為重偏為輕庸說也何明耳後多生髮天疽鋭毒病非輕左天疽右鋭毒生耳後一寸三分陷中是積鬱所致毒從肝肺來形多堅硬頭多隱伏未潰先黑臭穢易生元氣易敗多致不救又有脫疽生手足或生口面命難存此症如粟漸大其色如得漸黑漸開漸大黑如烏羽不知痛癢熱臭難聞小兒多從積熱積毒大人多因服石燥熱古人雖有割截之法豫見三人俱至七八日而死示吉曰諸症皆因瘡勢之浩大積毒之最深地分之險惡故特拈出然瘡之足以傷生者不只於此也背上有九處人髮際為玉枕又名古本一也頸項節二也第三椎為崇骨三也第四椎為玉藏四也肺俞五也脾肝俞六也腎俞七也後心對鳩尾鳩尾即心蓋骨八也鳩尾骨穴凡九也正面六處喉骨為垂骨一也胸為神舍二也心鳩尾三也兩乳穴四也臍中為神闕五也臍下二寸為腸屈間六也共十五處俱忌生癰外腦髭鬢頤迎香瞳子髎之間者俱地分之所忌然種種地分背脈絡所會內系腑臟若病者調攝得宜醫者補瀉無失亦可起死回生苟不知此將息失宜治不對症雖發於不死之地分吾知其不免矣看病之深淺分毒之臟腑大而高起屬乎陽癰也六腑所發平而內發屬乎陰疽也五臟所生疽重而癰輕最輕者初起無寒無熱是熱癤之浮於膚上凡瘡初起不發寒熱高腫於皮膚之間淺而小最大不過一二寸者曰癤六腑積熱發於肌膚之間高腫而痛如碗如盆曰癰五臟積熱攻注肌膚初發如粟或如豆許與肉俱平而不高腫或作赤色時作癢痛曰疽陽善而陰惡所慮者其證半陰半陽須司命之決於胸中初起焮痛頂如尖字惡寒發熱陽可知二七之期膿漸至訣曰癰疽須分陰陽證純陽初起必焮疼微惡寒時身又熱頂如尖字高突形腫似彎弓根緊束高腫氣足根緊束血足也二七之期膿漸侵陽瘡以十四日為關一七焮痛二七膿成二便如常口有味腫消膿潰復精神痛隨膿減生新肉新肉紅色榴子者吉腐皮將斂白星星此屬純陽誠是善隨時調治自功成初起僵頑形如粟米無熱不渴陰為逆一七之後倦怠生訣曰純陰之證症何如初如粟米人不知疙瘩僵頑不紅腫無疼少熱不焮時七日之後身倦怠瘡根平大實難支氣虛不能起發則瘡頭平而不高血虛不能束根則瘡根漫腫而漸大頂不高尖根不活色無光采腐膿遲陷軟無膿空結聚精神昏憒氣難舒飲食少減身戰栗瘡形紫色藥無施舌強痰喘純陰證總有靈丹不治之半陰半陽死生難卜脈數無力形似半昏半爽半平高食難消運症見微寒微熱微赤腫投方應病方得陰轉為陽腐去生新亦可回生起死訣曰陰陽相半死生交善惡相兼細辨昭微熱微寒微赤腫半昏半爽半平高脈來雖數多無力飲食雖餐難運消腫而不潰因脾弱潰而不斂為膿饒大便多溏小便數上身有汗下身焦五善雖兼有七惡未全逃口渴喜茶腸腹痛面浮厭飲足心高心煩不穩睡神亂怕音焦投方應病方為妙陰轉為陽漸可調外症已審脈法宜明氣血沉澀脈來緊身有痛處即發瘡疽之兆身應發熱脈浮數人反惡寒即為瘡疽之萌仲景曰脈數不時見則生惡瘡又曰肺脈俱數即生瘡初起實大洪大為病進已潰者為邪未退而留連潰後沉實沉伏為餘毒初起者主邪氣深伏而難痊潰後脈芤澀遲緩脈證相應無妨也若短細則將變症此六脈總不宜於初起初起脈浮大洪數邪正相搏有餘也若促結則非吉也此六脈總不宜於潰後浮大浮數瘡必高腫宜發表而忌攻利之方高腫者毒在表經所謂汗之則瘡已也誤下之則誅伐無過反傷元氣沉數沉實邪必內藏其外症不焮腫高赤及發熱煩躁大便祕宜疏通而除發汗之劑平塌漫腫宜內補托而益其虛不浮不沉當和榮衛而解其勢初起宜疼不宜癢潰後作癢乃有長肉之功潰後遍身作癢風乘虛入宜內托發散潰後宜癢不宜疼初起不疼乃有純陰之咎不痛大痛非佳症或麻或癢實難醫脈證初詳善惡細辨善不止於五飲食知味二便調動息寧靜者吉惡不止於七嘔吐藥食目上視神氣昏沉者凶善者五臟未傷善候並至則生惡者五臟已損惡候並至則死惡證忽有二三宜當深懼善候乍見一二便可回生五善訣曰心善精神爽言清舌潤鮮瘡疼兼不渴睡醒得安然肝善身輕便因煩自不煩指頭紅活色坐起覺平康脾善唇滋潤衾無穢氣藏凡餐俱有味膿厚更肥黃肺善聲音響無痰韻更長皮膚多滑潤大便自尋常腎善誠為要水升火降良口和因不渴小便利清長七惡訣曰一惡神昏憒心煩舌上干瘡形多紫黑言語自呢喃二惡腰身強目睛邪視人瘡頭流血水驚悸是肝逆三惡形消瘦膿清臭穢生瘡形多軟陷脾敗不知疼四惡皮膚槁聲嘶韻不長痰多兼喘急鼻動脈將亡五惡成消渴隨飲即隨干形容多慘黑囊縮腎凶端六惡身浮腫腸鳴嘔厄頻大便多滑泄臟腑並將傾七惡瘡倒陷形如剝鱔同四肢多冷逆汙水自流通示吉曰五善七惡方書俱載此訣尤備故録之然亦不止於此也如膿成不自出失導引者死膿成不針烙反敷藥者死熱痛正甚失治則毒內攻者死毒內攻後不服藥反針烙者死潰而至於透內膜者死潰喉者死未潰而陷面青唇黑便汙者死陰入腹入囊者死高腫不託里反用下藥者死漫腫不內托反用寒涼攻利者死潰後誤用寒涼致瘡紫黑者死故治者不可不早亦不可不審也善惡明而生死自分虛實辨而補瀉方得氣實者瘡頂高而突起虛則平塌之可憂血實者瘡根束而鮮明虛則漫腫之有咎瘡之虛者腫平膿稀軟漫瘡之實者腫起堅硬膿稠瀉痢腸鳴脈弱皮寒飲食嘔而手足冷臟腑之虛可知胸腹滿脹身熱脈大飲食如故二便調臟腑之實有驗瘡口不合膿稀肉冷自汗色脫者乃氣血之虛寒者疼痛高腫色赤膿厚肌熱者乃氣血之實上實則口渴飲冷目赤頭痛鼻不通下實則小便如淋腹中膨脹大便結下虛精滑泄瀉脈沉足冷最為凶上虛則目閉神昏無熱不渴真為逆邪氣甚則實腫焮疼痛日久不潰大便祕而小便淋真氣奪則虛色敗音嘶睛不了了食無味而身體重初起皮肉未破其實也固然一毫熱藥不敢用潰後膿血出多其虛也固宜一毫冷藥何敢投寒冷克伐過故有反善為惡之弊保元托裡常服致補虛回陽之功瀉實補虛得宜次序投方自效初起之後七日之前內治之法有三托裡疏通和榮衛機要云治瘡大要須明托裡疏通和榮衛三法毒邪在內則痛深脈必沉實外症發熱煩躁大便祕瘡腫木悶不焮赤宜用寒劑疏通臟腑毒邪在膚則痛淺脈必浮數外症焮腫作痛二便調和或惡寒發熱拘急頭痛恐邪氣外極而凶行故先托裡散之毒邪在經絡中外無焮惡之氣內亦二便調和食如常口知味不惡風寒只於熱燥其脈不浮不沉知邪在經絡中也宜調和榮衛外治之法不一藥圍湯漬艾火攻示吉曰凡瘡初起不發寒熱便高腫紅痛癤也其毒最輕外用神應丹四面圍之中空一頭或頭上點白降丹一點即得消散不消或服神化丹或神仙活命飲即愈若瘡初起即發寒熱癰疽也其毒重不論陰陽二證俱用艾火灸之瘡腫初生古人用藥湯淋射蓋氣血凝滯則為癰腫得熱則腠理通經絡暢誠至理也其法以藥煎濃湯瘡在四肢者則塌漬之在腰腹者則淋之下部者則浴漬之仍以淨布蘸水塌其患處水涼再換寒熱頭痛脈浮數托裡散邪發其表經云汗之則瘡已東垣云瘡熱奮然高起結硬而痛色赫赤微帶黯色其邪在血脈之上皮膚之間急發其汗則毒隨汗散矣宜荊防敗毒散冬月萬靈丹脈虛者四妙湯內托復煎湯示吉按仲景云瘡家雖身疼體痛不可發汗汗之則發痓此為瘡家復傷寒者說也若瘡初起七日之內惡寒發熱頭痛身痛瘡高腫身無汗二便如常脈來浮緊浮數表證居多非汗不愈若汗藥誤投之於已潰之後或表邪俱去之時其禍亦不只發痓而已也煩熱便閉脈沉實疏通臟腑絶其源張潔古云有里者下之陳實功云大便祕燥通利相宜陳文治云脈沉實發熱煩躁外不焮腫赤痛乃邪氣深伏在裡宜先疏通宜衛生湯熱結甚者內疏黃連湯示吉曰據東垣之意瘡瘍面赤雖伏火熱鬱不得攻裡為陽氣怫鬱邪氣在經宜發表以去之雖大便數日不見亦宜多攻其表發散陽氣少加潤燥藥以潤之薛立齊云腫瘍內外皆壅宜以托裡表散為主如用大黃寧無孟浪之非若此則大黃之難用也明矣而丹溪又云大黃治癰症之要藥豈諸名家亦相矛盾乎蓋癰疽初起有六經表證者大便如常者脈浮緊浮數者邪氣在表斷不可下若表證不現大便燥結口渴引飲脈浮沉實沉數瘡頭堅硬不起若不用大黃將何以宣通臟腑邪初虞世云癰疽初作須以大黃等藥急轉利之勿以困苦為念此亦一偏之說不辨表裡胡為可訓總之真知其實而瀉利真知其虛而補益浮露而淺者則外消藏伏而深者則內托庶無弊也外無風寒之病形內無便溺之阻塞腹中和舌知味病在經絡先和榮衛通用神仙活命飲當歸黃耆湯四妙湯火攻之法宜施早凡瘡初起不論陰陽俱用艾火灸之是開門逐賊法也其法先以濕紙覆瘡上立視其紙先干處乃瘡結頭處也用獨蒜頭切片如三錢厚貼瘡頭上以艾在蒜片上灸之每三壯一易蒜片不痛者灸令知痛痛者灸令不痛為度如瘡大者以蒜搗爛鋪瘡上亦鋪艾蒜上灸之一二日初發時灸可立愈三四日十愈六七若過七日之關膿將成而不可灸矣古人蠐螬蟲去兩頭隔艾灸法豆豉為末唾津作餅灸法取淨土水和作餅灸法祕方用南星半夏為末薑汁調成餅灸法其灸法俱與蒜灸同各隨其便也示吉曰考之方書頭上瘡面疔毒腎俞發俱禁艾火以頭為純陽之位生瘡則熱亢極面疔為陽毒腎俞發為亢陽爍陰灸之恐以火濟火也此言甚善然又見此症因灸後而愈者如元好問腦疽東垣灸之百壯而愈陳文治曰疔毒藥力不能速到非艾火不解此又當酌量艾之大小壯之多少而行矣然灸之不穩不如再行他法病人元氣素虛肢體倦怠精神昏憒瘡形平塌脈來微散空虛及素畏艾火者俱不可灸灸之恐生昏暈且無真氣抵當火力有損無益亦陳實功之至言也凡遇此症急用白降丹點頭上拔其毒氣內用四妙湯托之藥圍之方隨症投示吉曰瘡之外見雖同而毒之內因各異有因微熱外攻而發於皮膚之上高腫熱痛俗所謂熱癤者用大黃朴硝為末調醋敷可也有因氣血不和留滯發於肌膚之間堅硬疼痛者宜用辛散攻托之品如神應丹是也有因氣鬱痰生發於頸項皮膚之間腫硬白色不甚疼痛用南星半夏為末薑汁調敷可也星半為末薑汁和為餅隔艾灸尤妙有因陽極而發高焮疼痛書所謂癰者宜用清涼之品抑陽散是也花粉三兩薑黃白芷赤芍各一兩為末茶湯調搽患處有因陰極而發平腫不紅書所謂疽者宜溫熱之品抑陰散是也用草烏白芷赤芍南星各二兩肉桂五錢為末蔥湯調塗熱酒調敷亦可有因潰後氣血虛而漫腫者宜用收澀之品鐵桶膏是也詳後種種不同俗以一二種藥概治諸病其能愈乎丹溪云敷貼之藥只可應酬輕小熱症耳若不辨其陰陽所由分妄敷涼藥其禍不小此誠不易之諭然即對證調治只可圍瘡之四旁中空瘡頭用白降丹點上以拔其毒自無倒陷之誤降丹有拔毒之能藥湯有疏通之妙祕方白降丹是陳珍如先生所傳珍如幼患惡瘡危在旦夕遇異人傳授此方降煉點上其毒立愈此丹點瘡頭上初起者即消有膿者即潰頑肉即化拔毒去腐功難盡述方附後溻腫湯用木香犀角大黃升麻黃芩黃連射干黃柏白蘞甘草朴硝檀香梔子生地羚羊角各一兩和勻每用五兩以水一斗煎七升入麝香一錢淨綿蘸藥熱溻腫上一日兩三度冷即再換火毒方熾辛熱溫劑休嘗膿血將成寒涼敷藥莫遏寒涼敷藥其患最大氣脈得寒則不行瘀血得寒則不散瘀肉得寒則不潰新肉得寒則不生七日之後將已成膿瘡頭已見黃色外宜拔而內宜托燈照甚佳七日之後瘡頭見黃色竟用白降丹點上升頭拔毒上用太乙膏罨之以防風邪外入每日用蔥艾煎湯洗淨再換膏藥大約在十一日前後膿出痛定是陽瘡之順候也內服四妙湯黃耆當歸湯托之若八九日後瘡勢已定毒氣已聚尚未成膿須用神燈照法二七之期定行穿穴瘡中大流膿水外宜升而內宜補洗法亦妙凡瘡潰後輕者痛隨膿減先用蔥艾煎湯洗淨敷上紅升丹拔毒呼膿外用膏貼以防風襲內服托裡湯十全大補湯剋日自愈若瘡勢浩大須用豬蹄湯洗法護心護膜蠟礬丸有妙用補血補氣八珍湯有神功若仍堅硬而難潰原須披針之點頭反生煩躁而昏沉不免藥筒之拔毒凡瘡十日之後是膿腐之期若仍堅硬須用披針當頭點入寸許開竅發泄是開門逐賊之法也若雖不作膿形尚紅活焮熱腫痛不必用針竟用白降丹點頭上內服補托之劑如瘡過半月仍不膿潰反生煩躁重如負石恐毒內陷攻心急用披針品字樣當原頂寸許點開三孔隨瘡之淺深一寸二寸皆可入針不痛針深不妨針後隨用藥筒拔毒法其法用新鮮嫩竹一段徑口一寸二三分長七寸一頭留節用刀切去外青留內白一半約厚一分許靠節鑽一小孔以杉木條塞緊外用羌活獨活紫蘇蘄艾鮮菖蒲甘草白芷各五錢連須蔥二兩共放入筒內筒口用蔥塞緊將筒橫放鍋內以物壓住勿令浮起用清水十大碗淹筒煮數滾約筒內藥濃熟為度用大磁鉢連湯盛貯患者榻前針後將筒藥倒出急用筒口乘熱對瘡口合上以手捺緊其筒自然吸住約待片時藥筒已溫拔去塞孔木條其筒自脫再看筒中拔出何物如鮮明紅黃膿血相黏者吉如敗血氣穢紫黑稀水者死內服之品切戒克伐寒涼外治之方正宜箍根長肉潰後若根腳漸開紅腫不散惡症也宜鐵箍膏箍之過此之後去腐生新膿潰腫消痛隨膿減新肉已生紅燦燦腐皮將斂白漫漫剋日功成夫復何慮若榮衛衰弱潰瘍之變無窮倘調治謬差惡候之來難免膿熟自潰易斂為吉癰疽膿熟勢盈欲溢用白降丹點上半日自潰不潰宜開針烙各異皮薄腫高毒淺癰也宜針皮厚腫堅毒深疽也宜烙癰疽輕按即痛者膿之淺也重按方痛者膿之深也按之不起者膿未成也按之復起者膿已成也膿已成而皮厚肉深難潰不用針烙使腐肉挾毒熟之氣久留肉腠間將好肉亦化為膿血此烙法所以有功於潰瘍也使根淺皮薄者又何必假此以賣弄乎由此觀之皮薄者用白降丹可也皮稍厚則用針皮極厚而毒附骨者非烙不可其法看瘡頭之最大者即是膿竅用熟鐵大長針於麻油燈火上燒令其透量瘡淺深及所生之處虛實插入一寸或至二寸針約五六寸針下半截用竹筋劈開挾針在內以意消息用半寸露針頭半寸於外用一寸露針頭一寸於外用線縛緊恐淺深有誤也若未有膿暫以紙捻紝入候次日取出膿色黃白即愈赤黑防出鮮血若在虛處及筋脈骨節處不得亂行針烙針烙之入猶宜稍斜恐透膜也烙遲固為不佳太早亦生變症膿深針淺內膿不出外血反泄瘡淺針深內膿雖出好肉受傷此用針烙之難也膿流毒泄氣血俱虧膿出反痛虛之故膿多不斂弱之因二症宜大劑參耆歸地芎藥術苓補之飲食不化則脾虛飲食不思皆胃弱宜六君子湯十全大補湯肉黯陽虛而屬寒大補湯加熟附子肉赤血虛而兼熱脈數者四物湯加連翹黃連山梔之類肉死不潰因脾困大補湯倍參朮肉白不斂為陽孤大補湯加炮姜寒甚加熟附子膿少色赤不斂血虛也穢氣觸而亦然穢觸者乳香沒藥之類和之瘀腐膿流疼痛筋膈也針挑引而不妨膿潰猶疼必有筋膈住內膿不得出用針挑引出之根腳赤暈口不收蓋緣餘毒未退膿少肉白肉不長只因停住寒邪餘毒未退四妙湯加白芷防風花粉連翹消毒藥寒邪凝滯大補湯加防風桂枝外用蔥艾湯洗破後瘡口堅硬曰風外用白降丹水調少許雞翎掃上太乙膏蓋之內服托裡疏風藥潰後肉長色紫曰毒以紅升丹掃上太乙膏貼之肉即紅活破傷風皆因風襲破傷濕亦為濕侵四妙湯治風加防風羌活桂枝之類濕加蒼朮白朮防風之類虛甚加人參膿出肉長毒未平生肌藥且宜緩用毒氣未盡切勿用生肌收斂藥敷之後必復腫復潰若瘡口大癢以細茶蔥鹽煎湯熱洗瘡口既收皮薄嫩太乙膏未可便除發熱宜究邪正之虛午前熱主於補氣午後熱主於補血脈浮數邪在表宜散脈沉數邪在裡宜下惡寒仍別虛寒之故陽虛則惡寒宜四君湯加桂或炮薑大料黃耆與之寒涼非生肌所喜若肉赤而久不收口脈數者梔連之品亦投同四物湯用發散非潰後所宜倘將斂而遍身作癢脈浮者消風之劑亦用消風散與托裡散同服內虛極而敗症作毒內陷而惡候生潰後痛疼膿色敗臭者胃虛之火宜識大補湯加麥冬五味喘粗氣短恍惚嗜臥者脾肺之弱當救補中益氣湯加麥冬五味脾胃將傾則飲食作嘔而難化六君子湯加木香砂仁不應加附子脾胃已損則肩背不便而重沉補中益氣湯加山萸山藥五味肝腎陰虛目系急而瞳子上視黑睛緊小白睛青赤者六味地黃丸料加炒山梔麥冬五味脾肺氣短肢體腫而色敗聲嘶唇鼻青赤面目俱浮者六君子湯加炮姜不應大補湯加炮薑熟附子衣厚仍寒孤陰無濟陽虛極宜溫補衣薄仍熱孤陽獨存陰虛極宜益腎滋陰寒氣內淫腹痛吐瀉手足冷而人昏憒或咳嗽厄逆腹鳴不食陽氣虛乏惡證宜托裡溫中湯後用六君湯虛極傳變驚悸怔忡牙關緊而臥不寧或發熱惡寒作渴自盜汗手撒身熱脈洪大按之如無俱惡證腰背反張頸項強直為變痓之兆口噤作冷寒戰咬牙斯絶命之期惡證並見托裡溫中功莫緩變證蜂起十全大補力宜施加炮薑熟附救之間有可生者補陽補陰不同虛火虛寒當察此固先哲之常試亦貴當局之變通智者緣異以求同愚者泥活而昧意潰瘍外治更有奇方膿不盡而腐不脫紅升丹之妙無窮腐已盡而新不生八寶丹之功尤大瘡口紫黑而堅硬桑枝灸甚佳用蔥艾湯洗後將桑枝燃火吹息稍近肉取火氣灸患片時日三五次新肉生遲宜灸四畔新肉淡白而生遲桃紅散絶妙白降丹治死肉不去何須巴豆灰硇太素膏司肉長不平不羡丹香龍竭治療細陳調攝宜審溫床暖實偏宜冬月嚴寒冬月發背須穿有袖綿背褡一件服下不合縫合取其易於揭看也且要預生炭火使暖逼盡余寒然後揭開用藥潔淨臥房有便夏天暑熱熱則穢氣易生故也明窗淨几當防蟲毒之傷夏天發背緊防蜈蚣等蟲草紙柏煙庶解穢氣之觸穢氣觸則變證起用草紙柏香烘煙解之保全胃氣厚味與生冷皆除勿冒風寒大熱與大寒皆避多言多動不免真氣之有傷久坐久行皆致起居之不適寡思節欲尤戒恚怒悲憂湯粥適時更宜清虛恬靜調攝無失自能保命於萬全治療隨宜無怪活人於百中腫瘍主治法腫瘍治法先分表裡外周之邪表病也在證則惡風惡寒拘急發熱二便如常在脈則浮緊浮數浮洪在瘡則高焮紅腫而痛淺內因之邪里病也在證則煩躁口渴大便祕結小便赤澀在脈則沉數沉實在瘡則堅硬平腫不赤而痛深以此二證分認明白如看病人純是表證用荊防敗毒散汗散之如表而兼寒兼濕兼痰者用萬靈丹如表而兼虛少食泄瀉脈來浮而無力用內托復煎散如表邪輕里證少脈來虛用四妙湯此毒邪在表之治法也如看病人純是里證用內疏黃連湯不應加朴硝如只是熱燥大便如常去大黃如兼見大渴大汗合白虎湯此毒邪在裡之治法也若不惡風寒二便如常表裡之證俱不見用當歸黃耆湯此調和榮衛之法也若惡風寒二便祕表裡之證互見用衛生湯此通解表裡之法也如表裡之證雖見而微蓋因氣血不和兼痰兼郁壅遏為瘡用神仙活命飲此疏通經絡之法也如偶爾跌僕因而腫硬積久欲潰用瓜蔞托裡湯此破瘀和傷解毒之法也如口渴便結寒熱無汗郁久熱深表裡上下俱病用復生散此驅逐三焦內外熱邪之法也若瘡腫外甚恐毒邪內攻用蠟礬丸此護心護膜之法也如表裡之證俱無瘡頭不高不紅不腫不痛平塌僵頑病人昏怠脈來沉遲微細用回陽三建湯此溫補奪命之法也外此則隨時令之寒溫察地分之順逆分經絡之虛實身重脈緩濕勝者除濕身熱脈大心躁時腫乍來乍去者清熱諸病眩暈動搖脈弦者去風氣澀氣滯乾燥無津脈澀者瀉氣補血其大要始終調理脾胃為主若脾胃不傷臟腑各有所稟氣血凝結者得藥自散膿瘀已成者得藥自潰肌肉欲死者得藥自生死肉已脫者得藥自斂若專攻於瘡脾胃一虛變證蜂起而不可為矣昔東垣翁治表不云發汗而曰托裡治里不云攻下而曰疏通求經絡不曰疏通而曰和榮衛蓋欲保全元氣為主而不專攻於瘡也今之醫者以速愈為高汗下峻攻溫毒漫治毒或速散不知元氣傷而天年夭矣豫集諸方攻補兼備但用者有一可補之機則補之有必不可不攻之勢則攻之庶幾得古人好生之意也荊防敗毒散治癰疽發背乳癰等症初起頭痛發熱惡寒焮腫高赤疼痛脈浮緊浮數邪在表也服者汗散防風荊芥羌活獨活柴胡前胡薄荷連翹桔梗枳殼川芎茯苓甘草金銀花生薑水二盅煎八分瘡在下空心服瘡在上食後服瘡在臂加桂枝少許瘡在腿膝加木瓜熱服取汗用陳酒過口瘡發太陽經倍羌活防風陽明經加白芷升麻少陽經倍柴胡太陰經加芍藥升麻少陰經倍獨活厥陰經加青皮柴胡皆以肉桂佐之萬靈丹治癰疽疔毒對口發頤一切瘡症初起惡寒發熱高焮腫赤疼痛脈來浮緩浮緊用此辛溫發表以散之並治風濕風溫濕痰流注附骨陰疽鶴膝風及中風癱瘓氣血凝滯之症蒼朮八兩全蠍石斛天麻當歸甘草炙川芎羌活荊芥防風麻黃北細辛川烏湯泡去皮草烏湯泡去皮尖何首烏各一兩明雄黃六錢上為細末煉蜜為丸每丸重一錢用硃砂六錢研細為衣磁罐收貯老弱而病勢緩者每服一丸少壯而病勢急者每服二丸服法用連須大蔥白九支煎湯一茶盅將藥乘熱化開通口服盡被蓋出汗為度如服後汗遲再用蔥白湯催之後必汗如淋洗漸漸退下所蓋衣被汗自收而病如失矣若瘡已成膿者即得高腫潰膿若治諸疾無表證者只用熱酒化服內托復煎湯治瘡焮腫赤痛根盤不深寒熱形證在表大便如常或泄瀉脈浮數無力恐邪外盛而內侵此方主之黃耆防風地骨皮各二錢蒼朮三錢芍藥黃芩白朮茯苓人參甘草當歸各一錢防己肉桂各五分水三盅煎至盅半不拘時服四妙湯治一切瘡瘍腫痛微惡寒時內熱口中無味大便如常皆氣血內虛之故此方益氣和血解毒托裡之神方也潰後用之排膿去瘀生肌長肉逐餘毒通經絡尤驗黃耆五錢當歸八錢二分金銀花五錢甘草一錢八分上銼一大劑酒水各半煎服寒熱脈浮加防風柴胡腫瘍痛甚加乳香沒藥腫處堅塊白色加半夏南星土貝母泄瀉加蒼白朮嘔噁心加陳皮半夏蒼朮惡寒加桂皮若膿成不潰加防風穿山甲潰後膿少膿多不斂加牛皮膠五錢飲食不思不化加白朮陳皮虛甚加人參肉赤口渴脈數加人參麥冬五味子熱甚加黃連山梔肉白肉紫手足冷脈微細無力或嘔加人參白朮陳皮肉桂炮姜寒甚加熟附子內疏黃連湯治癰疽發背對口腿癰等症初起腫硬發熱作嘔大便祕結小便如淋煩躁飲冷心煩口苦六脈沉實有力此毒邪深伏在裡也用此疏通臟腑使毒邪不得傳變經絡黃連黃芩山梔當歸薄荷木香白芍檳榔桔梗連翹各一錢甘草五分大黃二錢水二盅煎八分食前服此方代黃連解毒湯清涼飲破棺丹等劑苦寒攻下之品也若病者大便如常惟見煩躁作渴飲冷譫語脈洪數此方徑去大黃與之可也如不應反加狂言自汗大渴再加石膏知母竹葉粳米倘本病投之本方不應倍大黃如大便仍不通反加狂言大渴非用芒硝不可師古人方不若師古人意全在司命者之變通也衛生湯治癰疽發背腦疽對口丹瘤瘰癧惡毒疔瘡濕痰流注一切瘡症未成即消已成即潰在表即散在裡即下通解表裡之神方也羌活八分防風白芷山甲土炒研石決明煅沉香紅花連翹各六分金銀花皂角刺歸尾甘草節花粉各一錢乳香五分大黃酒拌炒二錢脈虛便利者不用水二碗煎八分病在上部先服藥隨後飲酒一杯病在下部先飲酒一杯隨後服藥當歸黃耆湯治一切瘡瘍腫痛熱燥但患者二便如常飲食不減腹中和口知味里無邪也不惡風寒脈不浮表無邪也表裡既和宜調和榮衛此湯主之當歸黃耆地黃川芎地骨皮等分銼一劑水煎服升散加升麻白芷發熱加黃芩煩躁加山梔嘔是濕氣侵胃加白朮脈虛甚煩躁加人參麥冬五味白朮甘草去骨皮名托裡養榮湯並治一切不足之症不膿不潰或潰後寒熱肌肉消瘦盜汗食少睡臥不寧神仙活命飲治一切瘡瘍表裡證互見未成即消已成即潰初起止痛消毒神效兼痰兼郁兼內傷瘀血者並治穿山甲炒研白芷防風赤芍藥甘草歸尾花粉貝母角刺金銀花陳皮各一錢乳香沒藥各一錢二味另研為末水酒各半煎成去渣入乳沒末和服瓜蔞托裡湯治跌僕傷損腫痛積久欲潰或血氣鬱結痰留血壅致成瘡瘍未成消已成潰生肌解毒良驗瓜蔞一個忍冬草乳香各一兩蘇木五錢沒藥三錢甘草二錢酒煎分三服一日服盡粗為細末酒糊丸彈子大當歸酒化下復生散治諸般瘡疹丹瘤膿疥頭面疳火口舌熱瘡及癰疽發背等症初起憎寒壯熱口乾大小便祕用此通解表裡古人防風通聖散之遺意也荊芥防風川芎白芍甘草各五分薄荷山梔當歸連翹滑石金銀花羌活人參白朮各八分麻黃冬春五分秋三分夏不用加紫蘇一錢大黃芒硝二味人壯氣實大便七八日不行各二錢人老氣虛各一錢虛弱煩熱二便如常各五分水二碗煎表證甚者姜三片蔥頭二莖里證甚者臨服加生蜜三匙和服蠟礬丸治癰疽發背已成未膿之際恐毒不能外出反而內攻服此護膜護心並治腸癰及下部癰腫未成即消痔漏腫硬亦效蓋礬解百毒無堅不散蠟性難化能達下焦也白礬研極細三兩黃蠟二兩硃砂另研極細末三錢先用白蜜五錢銅勺內溶化後入黃蠟同化清離火入礬末和勻衆手急丸丸如桐子大如藥硬火微烘丸就用硃砂末為衣每服三四十丸白湯送下病甚者日二服回陽三建湯治陰疽發背初起不疼不腫不熱不紅硬若牛皮堅如頑石十日外脈細身涼肢體倦怠皮如鱉甲色似土朱粟頂多生孔孔留血根腳平散軟陷無膿又皮不作腐手熱足涼者俱急服之附子人參黃耆當歸川芎茯苓枸杞陳皮萸肉各一錢木香甘草紫草厚朴蒼朮紅花獨活各五分煨姜三片皂角樹根皮二錢水兩碗煎八分入酒一杯隨病上下食前後服之用綿帛蓋暖瘡上頂不得大開瘡孔走泄元氣服藥後手足溫暖瘡便發熱漸作焮腫復生疼痛色暗得活堅硬得腐胃氣得回此是藥之驗也在三服中應之則生外兼照法接則回陽為妙潰瘍主治法瘡瘍既潰肉腐膿流血散氣消其虛之必補也宜矣故十全大補湯為潰後諸症之總司但其中尚有氣虛血虛虛寒虛熱之分丹溪云此湯須看年之老壯資稟壯弱症之緩急時令之寒熱加減用之故豫以加減法條敘附後是皆先哲之已驗然司命者從此而消息之察脈審證隨時致宜再能以己意增損一二以平為期斯不愧丹溪之囑也已十全大補湯治癰疽瘡瘍潰後血虛氣散氣短懶言倦怠膿潰反痛死肉不腐膿多不斂膿清肌冷瘡口散大瘡根余腫不消肉白肉淡肉紫肉黯腐肉雖脫新肉生遲等症並治虛人偏身流注瘰癧等瘡難膿難潰難斂者並效人參以下各一錢白朮炒茯苓甘草以上四味名四君子湯加半夏陳皮名六君湯熟地當歸酒拌川芎白芍以上四味名四物湯合四君子湯名八珍湯黃耆鹽水拌炒肉桂五分水二盅姜三片棗二枚煎八分食前服虛人瘡瘍初起加陳皮香附半夏連翹服之內消一加陳皮五味子烏藥膿出反痛倍參耆歸地不應加乳香沒藥各七分更不應四物湯加乳沒肉桂各一錢粟殼泡去筋膜蜜炒二錢肉赤而不斂血虛有熱也去桂加生地牡丹皮口渴飲冷脈數加連翹炒黑山梔麥冬五味熱甚加黃連肉黯不斂陽氣虛寒也倍參耆肉桂加白蘞瘡根腳赤暈不斂及肉長色紫餘毒未退也加金銀花連翹防風白芷去桂瘡口堅硬不斂風寒穢氣所觸也加防風白芷金銀花痛加乳香沒藥漫腫不痛或死肉不斂脾氣虛也倍參朮不應加炮薑熟附肉白膿少不斂陽氣虛也去白芍加炮姜不應加熟附膿多不斂氣血虛也去白朮加山藥陳皮肉淡肉白不斂新肉生遲漫腫虛極也總加牛皮膠五錢去白芍飲食少思而不斂胃氣虛也加木香砂仁陳皮如嘔再加半夏炮姜飲食難化而不斂脾氣虛也加炮薑陳皮倍參術不應佐以八味丸如泄瀉送下二陳丸噁心作酸飽悶噯氣胸膈不寬惡食少食因虛停食也加陳皮山楂半夏枳實去當歸生地如嘔臨服加薑汁膿少而帶赤血虛也去桂倍歸地加丹皮發熱日重夜輕懶言氣短脈浮大無力氣虛也倍參術若加足膝無力遍身倦怠口中無味是中氣下陷用補中益氣湯見內傷發熱夜重日輕五心煩熱脈微細而數血虛也倍歸地加丹皮麥冬去桂不應加姜灰二分再不應臨服加童便半杯忿怒晡熱而出血肝火血虛也去桂加丹皮炒黑山梔面青血脹而出血肝虛不能藏血也去桂加山茱萸五味不應兼用六味丸食少體倦而出血脾虛不能攝血也去桂加參耆歸地兼郁少寐加遠志棗仁茯神龍眼肉如不應暫用歸脾湯欲吐作嘔或外搽內服寒涼或痛甚或感寒邪穢氣而嘔胃氣虛也去地芎倍參術加藿香陳皮半夏木香臨服加薑汁飲食少思腸鳴腹痛腹冷泄瀉脾氣虛寒也去當歸川芎加炮薑木香陳皮如不應兼用四神丸手足逆冷脾腎虛寒也加炮薑木香熟附子如兼自利脈沉遲暫用回陽急救湯方見傷寒飲冷作渴熱毒也加赤小豆短母花粉山梔麥冬去桂善食作渴胃火也去桂加知母山梔麥冬五味不應加石膏膿多作渴氣血虛也去桂加五味麥冬口乾舌燥腎氣虛也去桂加山萸山藥不應兼用六味丸自汗內熱口乾胃氣虛也加麥冬五味烏梅黑豆去桂盜汗內熱口乾陰血虛也倍當歸白芍加麥冬五味黑豆浮麥去桂如不應暫用當歸六黃湯莖中痛小便不利精內敗也去桂加山茱萸山藥澤瀉不應兼用六味丸愈便則愈痛愈痛則愈便精復竭也去桂煎送六味丸食少體倦口乾飲熱小便黃短脾肺虛熱也去桂加五味山茱萸不應兼用六味丸勞役而小便黃元氣下陷也加升麻柴胡午後小便黃短腎虛熱也去桂加升麻柴胡不應煎送六味丸口燥作渴小便頻數腎水虧也去桂加五味麥冬山萸山藥食少體倦作渴胃氣虛也加麥冬五味去桂體倦頭痛或眩暈中氣虛也加升麻柴胡不應暫用補中益氣湯加蔓荊子日晡頭痛或眩暈陰血虛也加柴胡半夏兼用六味丸夢泄遺精頭眩頭痛或痰喘氣促腎虛不能納氣也兼用六味丸如不應是虛寒也用八味丸面目赤色煩熱作渴脈大而虛血脫煩躁也倍耆歸去桂身熱惡衣欲投於水脈沉微細氣脫髮躁也加熟附子不應用回陽救急湯多思不寐體痛盜汗脾血虛也去桂加茯神遠志酸棗仁圓眼肉不應暫用歸脾湯寢寐汗出腎氣虛也去桂加五味煎送六味丸飲食時出汗胃氣虛也加五味麥冬去桂睡後覺飽出盜汗宿食也加半夏陳皮胸滿多痰脾氣虛也去桂加桔梗半夏不應六君子湯加桔梗枳殼晡熱多痰脾血虛也去桂加陳皮半夏咳嗽葉痰腎虧津液上泛也加山萸山藥不應佐以腎氣丸忿怒胸痞肝氣滯也去桂加桔梗山梔不應暫用補中益氣湯加桔梗枳殼倦怠胸痞中氣虛也倍白朮加陳皮半夏柴胡口苦寒熱往來肝火虛也去桂加柴胡陳皮因怒寒熱往來肝火血虛也去桂加柴胡黃芩不應再加炒山梔炒棗仁酒炒黑龍膽草體倦寒熱往來肝脾氣滯也加柴胡陳皮內熱晡熱或寒熱往來陰血虛也去桂加柴胡牡丹皮陳皮畏寒或寒熱往來胃氣虛也用桂枝柴胡脅痛痞滿或寒熱往來肝氣滯也去桂加青皮木香柴胡婦人勞役恚怒或經行發熱譫語夜間熱甚此邪在血分也去桂加生地丹皮柴胡不應只用四物湯誤服克伐之劑或膿血大泄或因吐瀉或誤入房或勞損元氣或夢遺泄精或外邪感觸以致發熱頭痛小便淋澀或滑數便血目赤煩喘氣短頭暈體倦熱渴意欲投水身熱惡衣揚手擲足腰背反張此陽氣脫陷之假熱證也畏寒頭痛咳逆嘔吐耳聵目矇小便自遺瀉痢腸鳴裡急腹痛陰莖短縮牙齒浮痛肢體麻痹或厥冷身痛或咬牙囓唇此陽氣脫陷之真寒證也以上假熱真寒勿論其脈勿論其症若見一二急加附子溫補之庶有復生之理種種加減法皆為虛弱者說倘人壯氣實瘡頭小毒熱輕飲食如常二便調勻身輕體健者竟以四妙湯加減與之亦無不效也經曰以小治小者功小其此之謂乎托裡溫中湯治潰後元氣虛寒或過服克伐以致胃氣脫陷吐瀉腹痛神思昏憒急須溫補緩則不治附子炮去皮臍羌活乾薑甘草炙丁香沉香益智仁木香茴香陳皮生薑水二盅煎服金匱腎氣丸命門火衰以致脾土虛寒不能消潰收斂或飲食少思不化臍腹痛夜尿多口乾喜熱虛痰泛上此方主之熟地自制者佳八兩山萸肉酒淨五兩山藥蒸人乳拌蒸尤妙白茯苓牡丹皮各四兩澤瀉炒三兩以上六味名六味地黃丸專補腎水滋陰降火附子一枚重一兩二錢者佳先用甘草防風煎湯煮三四滾去皮臍切片再用童便煮一日取起曬乾厚肉桂去粗皮二兩以上八味名八味地黃丸兼補命門相火去陰寒壯陽道去附子加五味子二兩名加減八味丸生津止渴引火歸原虛而微寒者用之牛膝肉酒淨二兩車前子炒二兩上為末煉白蜜為丸丸如梧桐子大每服四錢空心鹽湯送下以上十味名腎氣丸引火歸原回陽返本之妙劑也腎水虛上泛為痰脾虛不能攝涎而為痰非此不效瘡瘍外治方法白降丹治癰疽發背一切無名腫毒用少許瘡大者用五六釐瘡小者用一二釐水調敷瘡頭上初起者立刻起泡消散成膿者即潰腐肉即脫撥毒消腫誠奪命之靈丹也水銀一兩硃砂雄黃各三錢硼砂五錢食鹽白礬火硝皂礬各二兩五錢先將雄朱硼三味研細入鹽礬硝皂水銀共研勻以水銀不見星為度先將羊城罐一個放微炭火上徐徐超藥入罐化盡微火逼極干取起如火大太乾則水走如不幹則藥倒下無用其難處在此再用一羊城罐合上以綿紙截半寸闊將罐子泥草鞋灰光粉三樣研細以鹽滴咸汁調極濕一層泥一層紙糊合口四五重及糊有藥罐上二三重地下挖一小潭用飯碗盛水放潭底將無藥罐放水碗內以瓦埃潭口四邊齊地恐炭火落碗內也有藥罐上以生炭火蓋之不可有空處約三炷香去火冷定開看約有一兩外藥矣煉時罐上如有緑煙起急用筆蘸罐子鹽泥固之圍藥神應丹治血氣不和壅遏為瘡高腫赤痛兼痰兼郁兼濕兼寒者並治用小雄鯽魚七個鮮山藥四兩大蔥頭連須二十一個共搗爛用千年陳石灰末半斤南星半夏白及赤芍末各一兩和勻陰乾再碾為細末臨用之蜜調敷四遍外用綿子掩之神燈照法治癰疽發背初起七日前後未成者自消已成者自潰不起發者即起發不腐潰者即腐潰誠良法也雄黃硃砂血竭沒藥各二錢麝香四分上五味研為細末每用三分綿紙裹藥為捻長約尺余以真麻油潤透點火離瘡半寸許自外而內周圍徐徐照之火頭向上藥氣內入瘡毒隨火解散自不內侵臟腑初用三條漸加至四五條瘡自漸愈照後隨用敷藥如大膿已出不必敷也只用膏藥蓋之敷藥方用車前子豨蘞草五龍草金銀花各等分鮮者搗爛加陳米粉兩許飛鹽末二三分共打為稠糊遍敷瘡上中留一頂以膏蓋貼避風如冬月無鮮草預採陰乾為末醋調敷亦妙倘草藥不便以金黃散代之金黃散治諸般癰疽疔腫跌僕損傷大頭時毒濕痰流注漆瘡火丹風熱天疱肌肉赤腫乾溼腳氣婦人乳癰小兒丹毒天花粉一斤大黃黃柏薑黃各半斤白芷五兩厚朴陳皮甘草蒼朮天南星各三兩二錢上切細曬乾磨為極細末磁壇收貯勿令泄氣凡紅腫發熱未成膿者及夏天大令時俱用茶湯同蜜調敷如微熱微腫及大瘡已成欲作膿者俱用蔥湯同蜜調敷如漫腫無頭皮色不變濕痰流毒附骨癰疽鶴膝風等症俱用蔥酒煎調如風熱惡毒皮膚亢熱紅色光亮形狀遊走不定者俱有蜜水調敷如天疱火丹赤遊丹黃水漆瘡惡血攻注等症俱用大藍葉搗汁調敷加蜜亦可湯潑火烘皮膚破爛麻油調敷豬蹄湯洗法治癰疽諸毒已潰流膿瘡勢浩大此湯洗之消毒氣去惡肉回死肌潤瘡口散風消毒腐盡則已羌活甘草赤芍黃芩白芷當歸蜂房各等分為粗末看瘡大小用藥先將豶豬前蹄一隻用白水五碗煮蹄軟為度將汁濾清吹去汁上油花用藥末一兩入蹄汁內微火煎汁沸再用絹濾去渣候湯半溫再用方盤靠身瘡下放定隨以軟絹淋湯瘡上併入孔內輕手捺盡內膿庶敗腐宿膿隨湯而下以淨為度再以軟帛疊成七八重勿令大幹帶湯覆上瘡上以手輕盈旋按片時帛冷再換如此洗五六次自然痛減毒消洗時避風及人口氣鐵桶膏治發背大瘡將潰已潰根腳走散不收束者用之五倍微炒一兩銅緑白及明礬各四錢膽礬三錢輕粉鬱金各二錢如無薑黃代之麝香三分為極細末用陳米醋一碗銅勺內慢火熬至一小杯候起金色黃泡為度待溫用藥末一錢攪入膏內每用燉溫用新筆塗膏瘡根上以綿紙掩之其瘡根漸收漸皺為妙太乙膏治一切惡瘡跌僕損傷濕痰流毒風濕疼痛及內傷攻刺作痛腰膝痠軟無力五損內癰七傷外症俱貼患處又男子遺精女子白帶俱貼臍下臟毒腸癰亦可丸服肉桂白芷當歸元參赤芍生地大黃土木鱉各二兩槐枝柳枝各百寸血餘一兩乳香五錢沒藥三錢東丹四十兩輕粉四錢真阿魏三錢上十味並槐柳枝用真麻油稱足五斤將藥浸入油內春五夏三秋七冬十候日數已畢入潔淨大鍋內慢火熬至藥枯浮起為度住火片時用布袋濾去藥渣將油再稱記數將鍋揩極淨復用細絹將油又濾入鍋內將血餘投下慢火熬至血餘浮起以柳棒挑看似膏溶化之象方算熬熟凡油淨一斤將飛過黃丹六兩五錢徐徐投下火加大些若夏秋熱時每油一斤加丹五錢不住手攪候鍋內先發青煙後至白煙旋起氣味香馥其膏已成即便住火將膏滴入水中軟硬得中為度若太硬加熟油太軟加炒丹每各小許務使老嫩得所候煙盡離火將阿魏切成薄片散於膏面上化盡次下乳沒輕粉末攪勻傾入水內以柳棍摟成一塊再換冷水浸片時乘溫每膏半斤扯撥百轉成塊又換冷水投浸隨用時取一塊銅勺內復化隨便攤貼紅升丹治一切瘡瘍潰後撥毒去腐生肌長肉瘡口堅硬肉黯紫黑用丹少許雞翎掃上立刻紅活瘍醫若無白升二丹決難立刻取效水銀一兩硃砂五錢雄黃五錢皂礬六錢白礬一兩火硝四兩先將二礬硝研碎入大銅勺內加火酒一小杯燉化一干即起研細另將水朱雄研極細水不見星再用硝礬末研勻先將羊城罐用紙筋泥溏一指厚陰乾常輕輕撲之不使生裂溏泥罐子泥亦可用如有裂以罐子泥補之極干再曬無裂方可入前藥在內罐口以鐵油盞蓋定加鐵梁盞上下用鐵盻鐵絲扎緊用綿紙捻條蘸蜜塞罐口縫間外用熟石膏細末醋調封固盞上加炭火二塊使盞熱罐口封固易干也用大釘三根釘地下將罐子放釘上罐底下置堅大炭火一塊外砌百眼爐升三炷香第一炷香用底火如火大則水先飛上二炷香用大半罐火筆蘸水擦盞第三炷香火平罐口用扇煽頻頻擦盞不可令乾干則水先飛上三香完去火冷定開看方氣足盞上約有六七錢刮下研極細末磁罐盛用以鹽滴滷調罐子泥極濕將鐵絲系筆頭在管上如罐上有緑煙起即水走也急用筆蘸罐子泥固之桃紅散定痛生肌長肉用輕粉赤石脂煅石膏煨熟各三錢鉛粉二錢瓜兒血竭一錢冰片五分研極細末磁瓶收貯用少許掃瘡上即愈八寶丹毒腐已盡新肉生遲此方敷上立效乳香去油沒藥去油血竭輕粉各二錢兒茶龍骨各一錢冰片五分鉛粉一錢為極細末以細紗縛筆套上藥入筆套中篩入瘡內外用膏貼之太素膏凡瘡久不收口是元氣虛極急投大補湯內托之外用輕粉三錢冰片五分為細末用豬脊髓調勻攤絹帛上蓋貼剋日取效虛甚者加胎骨灰五分或天靈蓋灰五分補遺神效方神化丹治癰疽疔毒一切無名癰腫初起服之立消雙解表裡疏通經絡以毒攻毒削堅導滯一名醉消散真神方也乳香去油沒藥去油各二錢檳榔黑醜頭末母丁香山稜醋炒蓬朮醋炒巴豆荊芥桔梗大黃赤芍川芎草烏熟地何首烏五靈脂桂枝當歸小茴白蔻去殼斑蝥連翹硃砂全蠍去足雄黃杏仁炒麻黃各三錢穿山甲三錢麝香五分甘草三錢蜈蚣大者去拑一條共有三十二味各為極細末稱准和勻水滴為丸丸如卜子大硃砂為衣每服三分煮酒送下盡醉為度被蓋出汗孕婦忌服神效千槌膏治瘡瘍疔毒初起貼之即消及治瘰癧連根拔出小兒蟺攻頭大小臁瘡久不收口用之白嫩松香抹淨四兩萆麻子仁去殼淨七錢土木鱉去殼五個杏仁去皮一錢銅緑研細一錢巴豆肉五粒乳香沒藥各二錢上合一處石臼內搗二千餘下即成膏矣取起浸清水中用時隨瘡大小用手捻成薄片貼瘡上用絹蓋之白玉膏治久遠臁瘡神效乳香沒藥各五錢輕粉四錢密陀僧二兩象皮五錢鉛粉二兩黃蠟二兩白蠟五錢以上除蠟俱為極細末先用真桐油一斤放鍋內火上滾透去沫油清先入陀僧末攪勻取起入二蠟熔盡攪勻待油稍溫方入細藥攪三百餘遍以大綿紙攤上陰乾隨瘡大小圓長剪貼初貼時瘡中毒水流出膏藥變黑再換新者貼之疔瘡瘡小而禍速者莫甚於疔瘡古人分三十餘種然皆不外臟腑所積之毒也元化實功俱以五色屬五臟其毒多生頭面四肢形如粟米黑豆或發黃泡中或紫黑按之如疔在內先癢後痛先寒後熱四肢沉重心悸眼花是其候也瘡在項以上者三陽受毒先用披針刺入瘡心四五分挑斷疔根令出惡血隨用回疔丹插入孔內膏藥蓋之令其自腐項以下者三陰受毒即當隔蒜灸灸之不痛亦須針刺插藥方效隨後用飛龍奪命丹神化丹萬靈丹發汗疏通如兼見表裡證候照前方中用藥庶無誤也飛龍奪命丹專治疔瘡及癰毒發背腦髮乳癰一切無頭腫毒惡瘡及有頭不知痛癢者已成未成服之神效蟾酥老酒化雄黃各三錢乳香沒藥銅緑各二錢膽礬硃砂血竭寒水石各一錢輕粉冰片另研麝香當門子各五分蜈蚣酒浸炙黃去頭足一條蝸牛二十個上俱為極細末用蝸牛連殼研如泥少加飛羅面和藥為丸如緑豆大每服三丸用蔥白三個令病人嚼爛吐於男左女右手中將丸藥放在內熱好酒送下被蓋如人行五六里出汗為效無汗以熱酒助之重者再進一服病在上食後服病在下食前服忌冰水瓜茄油膩豬雞魚面及一切發物走馬回疔丹治疔瘡初起針破用此一粒插入孔內膏蓋之次後退山膿血疔根為效蟾酥酒化硇砂輕粉白丁香各一錢金頂砒五分蜈蚣炙一條雄黃硃砂各二錢乳香六分麝香五分共為細末糊成麥子大插瘡內一方內消疔毒用甘菊連葉根搗汁一碗用酒送下垂危者入口即活一用雄黃一錢為末爛烏梅肉三枚蜒蝣二條共搗爛塗疔上疔即拔出一用鰟皮魚一個搗爛塗上疔毒自出白降丹千槌膏拔疔毒甚驗凡瘡毒走散頭面耳項俱腫煩躁脈細痰動喘急走黃過心自汗者死紅絲疔手足間有黃疱即起紅絲一條走入心腹令人悶亂不救皆因大喜大怒氣血逆行所致急用針於紅絲所到之處刺之出血再嚼浮萍草相敷之立愈瘰癧瘰癧之名因形而起纍纍貫珠連接三五枚曰瘰癧形長如蛤曰馬刀蟠蛇癧則繞項起核瓜藤癧則延及胸腋種種癧名不可勝述或因風寒厲毒或因厚味熱結或因汗液蟲殘或因憂愁鬱結或因痰凝氣滯病原不一治要宜分暴久如病人耳項胸腋驟或腫核色紅微熱寒熱頭痛此風寒暑熱之暴病也易於消散宜荊防敗毒散加貝母夏枯草不應再加軟堅開鬱之品如病人纍纍如貫珠先小漸大不作寒熱日久漸痛堅硬如棋子大小如李梅繞項延腋此食毒鬱結之久病也最難消散宜潰堅湯桃蠍散之類若癧久而失治身體瘦羸時生寒熱勞怒則痛甚飲食俱減男子骨蒸女子經閉已成壞症若專攻其癧速其斃也理宜調理脾胃保養氣血使根本既固然後再理其瘡庶有可生之機也潰堅湯治馬刀結核硬如石在耳下肩上缺盆腋下此症俱從手足少陽經起若失而不治不守禁忌漸延至陽明頰下頰車俱到已潰未潰皆可服之癭瘤皆治昆布冷水洗海藻炒黃柏酒炒知母酒炒天花粉桔梗各五錢膽草酒炒四錢三稜酒炒莪朮酒炒連翹黃芩酒炒乾葛白芍酒炒黃連各二錢甘草炙五錢升麻柴胡歸尾各五錢上銼每一兩水二盞先浸半日煎至一盞去渣食後臥定伸足在高處頭微低每噙一口作十次咽下服畢安臥片時切不可頓服有甘藻二種相反恐致吐也另揀半料為蜜丸丸如緑豆大每服百丸臨臥服此方人壯氣實者宜之不足者宜滋陰散堅湯潰後宜益氣養榮湯滋陰潰堅湯治憂抑所傷遂生瘰癧氣血不足形體瘦弱潮熱咳嗽堅硬腫痛不分新久未潰者並效川芎當歸白芍熟地陳皮白苓桔梗白朮香附各一錢甘草海粉貝母人參昆布各五分升麻紅花各三分姜三片棗二枚水煎食遠服身熱加柴胡黃芩自汗盜汗去升麻倍參耆飲食無味加藿香砂仁食而不化加山楂麥芽胸膈痞悶加澤瀉木香咳嗽痰氣不清加杏仁麥冬口乾作渴加知母五味睡臥不寧加黃柏遠志棗仁驚悸健忘加茯神石菖蒲有汗惡風加薄荷半夏無汗惡寒加蒼朮藿香女人經事不調加延胡丹皮腹脹不寬加厚朴大腹皮益氣養榮湯治抑鬱勞傷思慮太過心神俱弊以致四肢頸項筋縮結成纍纍如貫珠或硬或軟或赤或白或痛或不痛日晡發熱及潰而不斂者效人參茯苓陳皮白芍貝母香附當歸川芎黃耆熟地各一錢甘草桔梗各五分白朮二錢生薑三片大棗二枚水煎服胸膈痞悶加枳殼木香飲食不甘暫加厚朴蒼朮往來寒熱加柴胡地骨皮膿潰作渴倍參耆歸術膿多或清倍當歸川芎脅下痛痞加青皮木香肌肉生遲加白蘞肉桂痰多加半夏橘紅口乾加麥冬五味發熱加柴胡黃芩渴不止加知母赤小豆膿不止倍人參黃耆當歸潰後反痛加熟附子沉香虛煩不睡倍人參熟地遠志棗仁示吉曰瘰癧之作七情六欲痰飲鬱熱積久而成實非一朝一夕之故也故以上三方以養榮益氣為主而佐以治癧之品蓋恐榮衛一衰變證蜂起雖欲治癧而不可得矣若病初起人壯氣實後方亦可選用桃蠍散治憂思鬱結痰留氣滯乃生瘰癧用大全蠍二十一枚核桃二十一個核桃劈開去肉入全蠍在內紫緊火內煅存性各用一枚為末臨臥陳酒送下孫真人方治瘰癧初起用壁虎裹泥中煅存性去泥為末臨臥陳酒送下並治瘰癧潰爛不收口外治法一用千槌膏貼欲速用白降丹點撥一用火針法其法用做鞋底大針二條將竹筋頭劈開以針雙夾縫內相離一分許用線系定先用桐油一盞用燈草六七根油內排勻點著將針燒紅用手指將核捏起用針當頂刺入四五分核大者再針數孔亦妙核內或痰或血隨即流出候盡以膏蓋之次日針孔漸腐若堅硬者以白降丹厚麵糊打成條曬乾插入針孔內以紙糊二重封固其核發腫作痛腐出內服益氣養榮湯調理切戒勞動氣惱房事煎炒海腥一切發物下疳瘡小便腫痛生瘡名曰下疳濕熱下注者輕淫火毒發者重小便自利不紅不腫只用二靈丹珍珠散敷之自愈如小水不利莖中疼痛紅腫流膿大便亦硬內服八正散大瀉其濕熱方見二便閉若大便自利脈虛人弱者用清心蓮子飲方見五淋若小便淋漓漸爛漸開色紫無膿疼如針刺者難治也二靈丹治下疳初起流膿用兒茶一錢研極細去粗渣再入冰片三分研勻瘡上先用冷茶或甘草湯洗淨拭極干用雞翎將藥掃上即愈珍珠散治下疳皮損腐爛痛極難忍及諸瘡新肉已滿不能生皮又治湯潑火燒皮損肉爛疼痛不止新白珍珠入豆腐內煮數滾研極細末無聲方用一錢花青即上好青黛五分真輕粉一兩三味共研千轉細如飛面磁瓶收貯初起搽之即愈若腐爛疼痛甘草湯洗淨豬脊髓調搽婦人陰蝕瘡或新嫁內傷痛甚者搽之極效魚口便毒兩胯合縫之間紅腫疼痛左為便毒右為魚口得之奔走勞役濕熱下注者少得之入房忍精淫毒內攻者多故其毒從便而入亦當從便而出初起宜通水丹逐之不應用山甲內消散潰後用四妙湯托裡其外治法亦照尋常膏散可也若其毒不因入房只因奔走勞役而得者即用四妙湯補而消之甚驗方見前通水丹治下部諸瘡初起魚口便毒橫痃腹癰人壯氣實小便淋瀝者效用芫花不拘多少揀淨曬極干研為極細末磁瓶收貯每用五分先將大棗二三枚去核夾藥在內空心嚼下冷水過口一方先用雞蛋一枚入瓦罐煮二三滾取起蛋上用銀簪打孔三四十再入罐中復下芫花一錢同煮一二十滾去藥食蛋名緑鳳散並治瘰癧痰核初起良驗山甲內消散治魚口便毒騎馬癰橫痃等症初起未成膿者當歸尾甘草節大黃各三錢殭蠶黑醜打碎各一錢土木鱉去殼三個穿山甲炒三大片水酒各一碗煎八分空心服渣再煎服大便行三四次吃淡粥補住避風為妙楊梅瘡瘡形如楊梅或上或下綿綿不絶皆因入房不淨淫火鬱結之毒也瘡毒所觸氣化傳染先入脾肺其瘡先見於上部皮膚作癢筋骨不疼其形小而且干此症為輕治宜發散若淫女媾精毒氣入腎流於肝先發下疳次生魚口漸至筋骨疼痛下部生瘡漸至遍身形大且硬小便淋赤此症最重因其毒入骨髓外達皮毛若非汗下兼行將何以洗濯其臟腑乎然須察其虛實表裡如瘡上身為多皮膚作癢筋骨不疼宜汗之用羊肉發藥或用萬靈丹如瘡下身為多骨節痠疼小便赤色大便亦硬宜下之用精肉茯苓湯此二者治人壯氣盛初起邪實者之法也若瘡發已久血氣已虛毒猶未退宜解毒托散之用胰子湯虛甚者用仙遺糧湯總之此症宜發不宜遏貴在除根莫求速愈得其旨耳羊肉發藥治楊梅瘡初起皮膚燥癢上部為多威靈仙一兩蟬退川芎當歸各一錢麻黃春用七錢秋用九錢夏用五錢冬用一兩二錢先用羊肉一斤水十碗煎七碗去羊肉入前藥於汁內煎至三碗去渣一日內早午晚分三次服完用羊肉好酒過口吃盡被蓋取汗或吐或瀉三四次以粥補住內毒自解外毒自發忌牛狗鵝雞火酒茶醋等物每早食仙棗三枚如病人不能飲酒或虛極者服胰子湯仙棗方好大棗二十一枚去核入韶粉三分逐個用線扎好放小砂罐內略放水煮熟露一宿空心吃三個冷茶下豬肉茯苓湯治瘡毒下身先見遂及遍身骨節痠疼二便澀滯牛膝肉蛤粉當歸蒼耳角刺紅花金銀花花粉甘草各二錢蟬退二十個山甲土炒為末二十一片土茯苓洗淨木槌打碎四兩大黃大便結者用一兩如常者用五錢自利者不用豬精肉四兩用生白酒三大碗煎至碗半空心服豬肉過口大便去三四次以粥補住胰子湯治瘡毒人虛氣弱不敢汗下用此解毒托散黃連胡黃連川芎牛膝當歸各錢半防風金銀花米仁木通各一錢甘草六分肥皂子去黑皮打碎七粒殭蠶炒研碎七條土茯苓白米泔浸一二時打豆大勿犯鐵器井花水洗淨二斤陳酒河水各二碗煎二碗入前藥並胰子一隻去油淨在內同煎一碗空心服取汗忌物如前虛弱甚者加人參仙遺糧方治楊梅瘡初起筋骨疼痛數月延綿不已並治楊梅風毒誤服輕粉癱瘓骨疼不能動履川芎當歸防風米仁木瓜木通金銀花白蘚皮蒼朮威靈仙各一錢甘草五分皂莢子切片微炒五個仙遺糧即土茯苓木槌打碎二兩人參瘡久氣虛者加入水二碗煎八分看病上下食前後服腿腳之下加牛膝一錢病淺者一月可退病深者百日可痊此瘡欲發先發下疳預服此方能免發瘡也忌食如前外治法一用銅緑膽礬各五錢輕粉熟石膏各一兩共研極細末磁罐收貯濕瘡乾摻干瘡公豬膽汁調點一日二次自愈一用輕粉三錢冰片五分杏仁四十九粒泡去皮尖去油取霜研極細和輕粉冰片再研勻豬脊髓調點若瘡一二枚既大且硬須先用白降丹少許拔腐毒氣後用上藥收口洗瘡方用黃柏黃芩黃連白及各五錢用椒三錢黃古五錢食鹽少許煎湯洗之一用上方入好醋下冬青葉三四十葉同煎取葉貼瘡上渣煎湯洗一方用土菖蒲一味煎湯洗瘡即得收口結毒結毒者瘡毒方熾未經發散忽被藥火之熏蒸或因輕粉之內拔或經點藥之收斂以致毒沉骨髓積久外攻其始也先從筋骨疼痛漸漸腫起發無定處故有鼻崩唇缺咽塞喉疼手足拘攣等症治法初起者仙遺糧湯胰子湯經年纍月毒串筋骨用五寶丹丹素丹紫金丹選用頭痛欲破吹鼻碧雲散五寶丹治結毒筋骨疼痛口鼻腐爛諸藥不效者滴乳石如乳頭下垂碾之易碎明如水晶者化二錢琥珀紅色者佳硃砂冰片珍珠新白者佳各二錢五味各碾極細稱准共合一處再碾數百轉磁罐封貯每用藥末二錢加飛羅面八錢再碾和勻每日用土茯苓一斤洗極淨置石臼內木槌碎為骰子大用水十一碗煎至七碗去渣再用大竹筒一個絹繃一頭將藥五分置竹筒中細節汁內隨手攪勻一日吃完看病上下食前後服每日如此重者四十服輕者一二十服即愈一方加肥皂核一個同茯苓煎如毒結鼻上加辛夷三錢同茯苓煎若毒結最重鼻舌腐爛加牛黃胎骨即能暗補其功最大忌食火酒豬頭糟物海味茶醋薑椒蒜牛羊雞鵝豆腐麵筋鮮魚不忌者豬肉肝肺腰子鴨丹素丹治遠年結毒如神透明硃砂大塊者佳碾細水飛九次一兩桂府滑石極白者佳碾細水飛九次二兩各曬乾每用硃砂三錢滑石七錢碾極細分三十服每服用土茯苓一斤洗淨木槌打碎先用半斤鋪平砂罐內做一小窩將大者一個挖一小孔入藥一服於孔內在放半斤在上用水六碗以筯刻痕記定再加水六碗煎至六碗水痕取起濾清渣再加水六碗煎三碗先後共九碗一日內不拘時溫服不可間斷間一日要補三日服完三十服終身不發忌食如前火酒等物紫金丹治遠年近日楊梅結毒筋骨疼痛日久腐爛臭敗不堪或咽喉唇鼻破壞諸藥不效者良龜板放炭火上炙焦用白酒漿筆蘸塗上反復炙塗三次以焦黃為末三兩透明硃砂末石決明九孔大者佳煅紅童便內漬一次為末各六錢共再研極細爛米飲為丸麻子大每服一錢量病上下食前後服筋骨疼痛酒下腐爛者土茯苓湯下至重者四十服而愈碧雲散結毒入於巔頂以致頭痛眼痛如破者吹之鵝見不食草一兩川芎一兩青黛一錢共為極細末患者口噙涼水以蘆管吹藥疼之左右鼻中取嚏為效外治法結毒瘡色紫黑者用白降丹少許掃上拔去惡毒俟瘡紅活用紅升丹掃上俱用太乙膏蓋貼俟肉將平用太素膏收口痔古人因形定名分為九痔牛奶雞心蓮花雞肝翻花蜂窩穿腸鼠奶外痔然不外醉飽入房厚味發熱負重致遠以致濕熱風燥流注肛門為腫為瘡也治法以涼血為主用槐角槐花生地佐以和血生血用川芎當歸桃仁行氣寬腸用枳殼清熱芩連山梔行濕黃柏防己澤瀉潤燥麻仁大黃疏風秦艽荊芥下陷者升之防風升麻氣弱者補之人參黃耆氣不順者和之木香檳榔其外治法須分內外痔生肛門之外痛甚者清之洗之頭大根小者線結之頭大根大者枯之痔生於肛門之內有喚痔等法次序而行庶獲效也良方治痔主方諸痔初發服一二貼即愈當歸生地枳殼連翹槐角黑牛膽制五味為上多用升麻黃芩黃柏黃連陳皮荊芥穗六味為中稍減防風地榆為下少用上芩連柏冬月用五分夏用一錢五分春秋用七分水二盅煎空心服大便燥結加酒蒸大黃三錢炒麻仁末錢半提肛散治久痔氣虛肛門下墜及脫肛便血脾胃虛弱等證川芎歸身白朮人參黃耆陳皮甘草各一錢升麻柴胡條芩黃連白芷各五分水二盅煎八分食遠服渣再煎熊膽散治痔瘡堅硬作痛脫肛腫泛不收用大冰片一分熊膽二分為末先將大田螺一個用尖刀挑起螺蓋入藥在內平放片時待螺化出漿水用雞翎掃痔上勤勤用之立愈洗痔黃硝湯痔瘡腫痛用大黃二兩用水十二碗煎至八碗再入朴硝一兩略滾傾桶內熏洗之一用枳殼二兩荔枝草四兩河水煎湯先熏後洗藥線方治諸痔癭瘤凡根蒂小而頭面大者用此線系其患根自效用芫花五錢壁錢二錢白色細扣線三錢將水一碗同浸小磁罐內慢火煮水乾為度取線陰乾凡遇前患用線一根患大者二根雙扣繫於根蒂兩頭留線日漸緊之其患自然冰冷紫黑枯落後用長肉藥收口祕方用蜘網四邊粗絲合成線結患根上枯痔方凡痔瘡泛出即用此藥塗之痔自乾黑枯落欲用此方四邊好肉上先用護痔散護好明礬四兩白砒四錢輕粉三錢硃砂三錢先將礬入銅勺內煅滾次入砒末攪勻以礬枯為度去火毒片時次入輕砂再研極細磁瓶收貯每日辰午申三時以溫湯洗淨痔上唾津調塗七八日其痔自然枯盡方上生肌藥護痔散白及大黃苦參緑豆粉寒水石黃柏各等分為細末熟水調塗四邊好肉上方上枯痔藥喚痔散痔在肛門內腸頭上外面不見痛苦不勝用此藥喚出痔來以蔥湯洗淨上藥磁石活而吸鐵者用一兩枯礬五錢乾薑炮另研三分草烏尖生用五分共研極細用生薑汁或蔥汁調塗肛門上少頃肛自內脫出痔瘡上下洗淨四邊好肉上用前護藥次上枯藥一日三上洗用新筆蘸藥洗之如此六七日脫盡痔根即用生肌藥收口後用貼頂升陽散收入其腸內服槐角丸貼頂升陽散萆麻子去殼四五粒麝香三分共搗如膏將頭頂心發去錢大一塊貼此藥少頃其肛即收入如緩再用醋一口噴患人面上立收漏凡瘡久不收口有管如燈草日流膿水者曰漏皆因氣血虧損熱毒鬱結使榮衛運行而失其職也遍身有之唯痔瘡成漏最易俗醫或以藥條腐管或以穿線結開俱痛苦難狀不若服藥內消之為妙也推車客散痔漏不論遠年近日最凶者百日收功其管自出棗仁炒遠志肉山甲炒骨皮枳殼醋煮側柏葉白礬水煮蒼朮鹽醋米泔童便制各二兩槐角子炒陳棕炭貫衆酒拌九蒸九曬各三兩蝟皮煨存性一兩白花地丁七八月採生白花者陰乾六兩如法制度為極細末空心酒下三錢白湯送下亦可服一月後每服加推車客末三分即蜣螂管自推出出者或用快剪剪去柏膠丸內消痔漏廣膠切斷以牡蠣粉八兩炒成珠去牡蠣八兩槐角米一夾四五粒者佳四兩川黃連側柏葉各一兩雄黃以白蜜四兩同煎蜜老為度洗去蜜七錢硃砂小茴各三錢熊膽一錢共為末煉白蜜為丸早晚各服三錢白湯送下葷用雞子素用豆腐過口如痔痛極者加乳香沒藥各二錢蟾酥一錢半正宗追毒丸痔漏通腸汙從孔出先用此丸追盡膿毒後服閉管丸立效胡黃連切片薑汁拌炒一兩刺蝟皮炙切片再炒黃為末一兩麝香二分共為末軟飯為丸麻子大每服一錢食前酒下服藥後膿水反多藥力到也勿懼之閉管丸胡黃連淨末一兩穿山甲麻油內煮黃色石決明煅槐花微炒各末五錢煉蜜丸麻子大每服一錢空心清米湯送下早晚進二服至重者四十日而愈如漏四邊有硬肉突起者加蠶繭二十個炒末和入藥中並治遍身諸漏皆效臁瘡臁瘡紅者多熱腫者多濕癢者多風痛者屬實早寬而暮腫者屬氣虛下陷初起者風熱濕毒為多日久者下陷濕熱為勝初起者荊防敗毒散加牛膝木瓜米仁濕勝加蒼朮熱甚加黃柏癢甚倍防風大便結者加酒煮大黃痛甚加乳沒日久者用補中益氣湯加蒼朮米仁茯苓熱甚加黃柏此內治法也其外治法先用蔥艾湯洗淨瘡色紫黑者用桑枝灸法四圍有硬肉者用紅升丹瘀肉未淨者用千槌膏新肉將生濕毒未退用白玉膏瘡肉已滿不斂用太素膏此皆神驗之方也若臁上百物打破急用熟石膏三錢東丹一錢為細末填實縛緊良驗疥瘡古人雖有干濕蟲砂膿五名其大要在分疥膿二種小如疹子干而且癢名曰疥瘡風熱蟲三者為多內治復生散疥靈丹外治三聖丸熏被法若瘡大如黃豆黃膿起泡而痛甚名曰膿窠瘡濕熱虛三者為多初起濕熱勝復生丹日久痛甚用四妙湯加蒼朮防風外治法用黃赤丹白鳳散疥靈丹苦參糯米泔浸一日白芷白鮮皮炒各一兩枳殼麩炒連翹羌活山梔當歸荊芥各七錢上為細末煉蜜為丸桐子大每服五十丸湯下立可除根三聖丸用大風子肉五十粒水銀二錢樟腦二錢共研極細加柏油二錢研勻為丸周身滾之立愈若兼膿窠加硫黃末一錢熏被法用蘄艾絨一兩雄黃細末三錢共研勻分三分每分用綿紙條裹藥在內一頭燃火置腳爐中以所蓋之被熏之火過取出方解衣就寢熏三次立愈一方加銀珠一錢一方加輕粉一錢亦妙一方睡在被中熏之常致逼毒入內變生他病不可用也黃赤散治膿窠瘡用硫黃三錢豆腐內煮半日用松香二錢東丹一錢共研極細末菜油調搽雞子油調更妙用雞子七個煮熟去白用黃先將銅勺置炭火上加菜油少許入雞子黃煎至黑色油自出也白鳳散用雞子一個打一孔去黃留白入礦石灰二錢用紙封口外用鹽泥封固火煅通紅去泥研為細末菜油調搽癬瘡五癬者濕頑風馬牛也治法宜分上下上半身為頑癬治之易多屬風熱下半身為陰癬治之難多屬寒濕總之血分受病以致皮膚不和也浮萍散治風癬疥癩熱服取汗浮萍七月十五采之陰乾當歸川芎赤芍荊芥麻黃春秋減半夏用三分甘草各錢半銼一劑蔥白一莖豆豉五六十粒水煎熱服在手臂加桂枝在背加羌活在膝加牛膝薄桂外治法一用輕粉硫黃為末蜜調搽一用大棗一個去核入白砒三分泥裹煨透冷定去泥為末香油調搽一用蜜陀僧文蛤等分為末蜜調敷一用土槿皮不拘不少為細末醋調敷以紙蓋之一用商陸根蘸蜜擦癬一用禿菜根蘸人乳擦癬一用白降丹三分和輕粉七分為末醋調搽最效禿瘡防風通聖散酒浸焙乾凡三次食後白湯調服日三服頭上有汗瘡愈矣𤺪攻頭用千槌膏貼之外治法須用蔥椒艾煎滾湯慢慢洗之洗淨瘡甲拭乾先將菜油三兩銅勺內熬滾入鮮蜈蚣三條以蜈蚣黑枯為度去渣用油搽瘡一方用鹹豬油半斤勺內煎化後入麻黃六兩煎麻黃枯黑為度去渣洗淨瘡甲用油搽之赤白癜風用附子硫黃為細末薑汁調勻用茄蒂蘸擦之一用硫黃蜜陀僧各一錢白砒六分共為細末用陳醋調和擦之鵝掌風用五倍子為末桐油調搽風上用炭火烘之二三次即愈一方用鳳仙花草一支豨蘞一兩蟬退三錢煎湯洗一方用瓦花頭髮搗爛用手上搓之立愈一方用川烏草烏何首烏花粉赤芍防風荊芥蒼朮地丁艾葉各一兩煎湯先熏後洗效汗斑用硫黃末共浮萍草搗爛塗斑上過一夜立愈一用蜜陀僧細末陳醋調搽隨手而愈杖瘡杖後即用童便和酒一杯飲之以免血氣攻心外用熟豆腐鋪在杖傷處其氣如蒸腐色變紫後易之得紫血散盡轉淡紅色為度一用韭菜搗爛塗患處一用鳳仙花草搗塗傷處一用陳石灰為末水調鵝翎掃上金瘡用五倍子炒枯為末降香屑炒黑色為末等分和勻敷傷處扎定立愈單方南星末半夏末青石末花蕊石末陳石灰用韭菜搗爛陰乾為末小麥面紅絨灰舊氈帽灰香灰百草霜末以上諸方敷瘡俱效各隨其便也湯火瘡用大黃熟石膏寒水石各三錢東丹錢半冰片三分共為極細末再用礦灰兩許清水浸化取石灰面上清水半盅和菜油半盅攪勻色如雞子黃為度用水油調前藥敷上立愈未發泡者醬敷鹽汁浸大黃朴硝末菜油調敷俱妙取肉得咸而堅實且解熱毒也已發泡者解熱毒為主如蛤蜊殼灰石膏末蚌殼灰大黃末香油調搽取其寒勝熱也已破者收濕解毒生肌為主如榆樹根皮為末油調敷銀杏為末摻之熟石膏東丹為末敷細茶小麥共炒黑存性為末濕者乾摻乾者油調俱妙損傷按墮車落馬打撲閃劍傷刀破皆損傷也其症血肉筋骨受病不在氣分專從血論大要宜分血之虛實如皮破而亡血過多者血虛也宜兼補而和之如皮不破而內積瘀血者血實也宜破血和傷攻利之亡血之脈虛細者生數實大者死損傷瘀血脹滿脈堅強者生小弱者死俗醫損傷惟指瘀血停滯一證故豫並載之和傷治血湯治損傷瘀血腹脹內壅紅腫暗青瘀痛昏悶欲死傷最重者服之山甲炒為末歸尾紅花蘇木生地靈仙加皮各二錢川芎乳香沒藥花粉各五分甘草三分桃仁打碎四十九粒血竭二分大黃五錢水酒各一碗煎臨服加童便一杯服後瀉出瘀血為效後服活血丹調理若打僕氣閉已死者先用通關散見中風吹鼻中有嚏後服此藥自活活血丹治跌僕損傷神藥桃仁去皮尖加皮山楂劉寄奴花頭地鱉蟲用酒浸死曬乾各四兩紅花當歸酒洗牛膝肉酒洗延胡索醋煮牡丹皮香附童便浸炒各三兩蓬朮醋炒青皮蘇術枳實降香末川芎山稜醋炒凌霄花赤芍威靈仙檳榔各二兩乳香去油沒藥去油各一兩大黃陳酒煮乾八兩上如法制度為極細末每服二錢壯者三錢陳酒送下核桃四五枚過口透骨丹治僕打損傷深入骨髓或隱隱疼痛或天陰則痛或年遠四肢沉重無力此藥主之真神方也鬧楊花子火酒浸炒三次童便浸二次焙乾一兩乳香沒藥不去油真血竭各三錢各為末稱准和勻再加麝香一分再研磁瓶收貯封固每服三分壯者五六分不必用夜飯准要黃昏睡好方服酒可儘量送下葷用豬肉過口素用豆腐過口服後避風有微汗出為效忌房事酸寒茶醋等物及諸般血虛弱者間五日一服壯實者間三日一服益母膏能治折傷筋骨遇天陰則痛益母草不拘多少用水煎膏隨病上下食前後服酒化下
