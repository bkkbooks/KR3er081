body:
  text: 女科調經女科雖則有專工余病皆於男子同惟有調經並崩漏胎前産後不相通小産乳疾及種子催生臨蓐各成功調經大法在補血血旺氣衰名曰從古人四物為主劑隨症加減酌其中四物湯當歸川芎生地白芍本方四味烏藥香附青皮著澤蘭丹皮及砂仁茯苓白朮俱良藥甘草陳皮引薑棗先期而至在斟酌一月一至方為正先期而來虛熱證或半月而來或二十日外而至加入條芩炒山梔阿膠知母黃柏亦能應後期而至屬虛寒三十日外或四十五十日一至炮姜蘄艾古人定寒甚須加桂皮附子附子童便甘草水煮三日用脈虛氣弱人參黃耆任將來作痛用延胡血瘀塊痛桃仁紅花順塊痛不止蓬術木通三稜桂枝辛散疼方定經閉塊痛亦宜添再著大黃酒蒸九次牛膝進小腹有塊疼痛屬瘀血故用行經破血之品若還勞瘵經閉者另有良方非一論牛膝鱉甲主方兼臨服童便一杯滲經來不止是虛熱涼血補血是真訣條芩酒炒荊芥炒黑及阿膠日久升麻柴胡不可缺若醫崩漏用棕灰續斷蒲黃地榆二味炒黑血自歇經後作痛血氣虛加入人參黃耆調補悅脈來遲細屬虛寒炮姜人參自古設適來適斷髮寒熱熱入血室譫語說本方合用小柴胡病兼外感湯澆雪白帶皆因濕熱流半夏白薇功甚捷赤加黃連山梔血分來日久升補真奇絶用補中益氣湯或十全大補加升柴肥人胸滿去地黃加入南星半夏正相當脈遲腹痛去白芍泄瀉當歸也要藏經行不止澤蘭去氣虛青烏除去方示吉曰乾道成男坤道成女女以坤道用事上應太陰月天之陰也三十日則周於天故女子之血亦三旬而一見血之下也同於月故名之曰月事月事時下有子道也若月事不調艱於得子皆因陰衰之故故古人用四物厚味之品味厚為陰中之陰理能益血隨症斟酌者可盡其寒熱虛實之變也如是而調之月事調勻陰陽和而萬物生種子之道得其旨矣胎前諸症女子懷胎須調攝飲食起居俱要節辛熱推蕩毒莫投利水破血藥宜歇古人安胎有妙方白朮土炒條芩酒炒川芎當歸訣生地紫蘇及枳殼白芍甘陳香附屑附鹽酒拌炒為末砂仁炒末水姜煎隨症加減為君別噁心惡食名惡阻二三月妊有是苦加入茯苓並山梔竹茹半夏薑汁妥不嘔去半夏胸滿去生地脈遲胃寒姜木香總去甘草病自可胎氣不和腹滿悶痛湊心腹子懸症加入腹皮共人參生薑四片蔥七寸減去地黃白朮苓手帶弩弦疼自定子淋之症又如何小便赤色去不多加入黃柏知母木通竹葉日久升麻不可無一用地膚草四兩水四升煎至一半去渣分三服取自然汁亦可或用地膚子入藥子癇卒倒痰壅甚言語謇澀人不省茯苓半夏及川連臨服竹茹薑汁進小便不通轉胞症胞為胎壓水不滲加入升麻柴胡及蔥頭吐法托法功誠勝示吉曰胞為胎壓轉在一邊水不得通最為急症治法有二一看其母氣怯弱不能舉胎而逼胞者八味地黃丸丹溪吐法一看其母氣壯實善飯胎必肥重胎重而壓胞者瘦胎飲穩婆托法若因過忍小便以致不通者滑石為末蔥湯送下一錢亦效若用八味丸須加車前如不能速合竟配煎藥與之並治漏胎尿出不知者丹溪吐法用二陳四君四物三湯煎大碗頓服以指探吐吐出少頃氣定又與亦然豫曾用之甚效托胎法用一老成穩婆察其病處若胎氣上者以香油抹手入産戶托起其胎溺出如注通後即以參耆升麻大劑服之若少有急滿再托如前一法將孕婦倒豎起胎自墜轉其溺濺出似勝於手托矣此症治緩則殺人故豫備述四肢浮腫如水氣面目俱浮子腫例姜皮腹皮與茯皮四物甘芩暫時去足指發腫漸腿膝亦如水氣難飲食二三月見名子氣天仙藤散另有力天仙烏藥香附及甘草陳皮等分生薑木瓜蘇葉入各三片每服三錢日三服六君兼用脾虛益中氣下陷用補中益氣湯胸腹脹滿遍身浮名曰胎水不須憂加入蒼術腹皮並卜子四物黃芩去不留不愈鯉魚湯一服白術茯苓當歸川芎等分銼鯉魚一個破腹鱗煎汁調末四錢足生薑七片及陳皮煎至七分空心服妊娠下血明胎漏加入阿膠黃耆蘄艾炒就淋漓不止續斷君烏梅一個功能奏胎動痛時治如何阿膠人參白術加相湊風寒頭痛去白芍當歸羌活蔥姜為主救無汗加醋乘熱服被蓋汗出人無咎若兼暑氣入香薷黃連木通扁豆知母泄瀉去歸加蒼朮小便不利澤瀉車前施食添蒼術厚朴腹皮卜子好嗽入前胡貝母杏仁桑皮山梔瘧疾柴胡並知母痢疾木通厚朴腹皮持大便祕加蘇子杏仁桔梗臨服之時生蜜十匙去白朮耳聾目暗因火甚小柴胡湯合用除達生八九月間達生散服過數貼無産難腹皮洗淨三錢人參陳皮蘇梗各五分芍藥白朮當歸慣各一錢炙甘草二錢蔥五葉能食胎肥黃楊贊春入川芎防風夏入芩冬加砂仁枳殼秋澤瀉真多怒黃芩柴胡食炒神曲胎動苧根及金銀渴加黃芩麥冬痰加半夏氣上加蘇子生地尋臨蓐臨蓐之時有主方催生甚穩佛手湯當歸六錢川芎四五錢益母水煎嘗冬天衣服宜厚暖若傷冷氣名凍産紫蘇吳萸煎熱湯熏洗下身無憂患夏月臨産宜貯水溫涼得所人無纍黃蜀葵子用煎湯調入五苓功為最子死腹中症如何面赤舌青脹悶多二錢熟大黃二分麝本方加童便妙無過唇舌俱青母亦死面青舌赤子活疴母主死交骨不交加龜板醋炙二錢為末血餘一錢和勻服示吉曰懷胎十月覺腰痛連腹腹中轉動即産候也進佛手湯一劑俟漿水破下産婦正身仰臥兒自轉順頭對産門努力送出名曰正産若臨月忽然腹痛或作或止或三四日或數日胎動而痛陳不息者名曰弄胎或一月前忽然腹痛水下似欲便産卻又無事名曰試水俱非當産也不問胎水來否宜寬心候時服本湯調理若坐草太早或努力過度或先期動手風入産門使生路腫脹狹小以致纍日不下及橫逆偏礙之患治之宜多服本湯生血氣益胞水庶為可生如産經日久氣乏名曰宿疾宜用赤小豆二錢阿膠炒三錢水盅半煎八分服一法用皂夾末吹鼻中令嚏即生胞衣不下産後何症最為急胞衣不下腹悶極皆因惡露脹胞中漸沖清道痛不息若喘滿時定主凶脫衣散用從來得牛膝木通各三錢歸尾枳殼各二錢入滑石四錢冬葵子二錢五分水煎熱服應有益産母自銜頭髮尾得嘔噦時胞自出按胞衣不下急以臍帶斷之以物墜住使其子血脈不潮入胞中則胞衣自當萎縮而下總淹延時日亦無害矣只要産母心懷安泰不可焦躁驚憂古法取夫單衣蓋井上立出一用鐵稱槌燒紅酒浸少頃服一用胭脂一張溫水洗服一用黑豆一合炒熟入醋一盞煎五沸去渣分五服外用鞋底炙熱尉小腹上下三五次立效産門不閉産門不閉是為虛胎前調攝不相宜補中益氣湯誠妙加入炮姜香附醋炒醫子宮不收玉門不閉或腫脹焮熱疼痛苦無量加味逍遙散所司當歸芍藥白茯苓白朮甘草炙及柴胡各一錢芍酒炒加入丹皮山梔二樣若腫消後用升提補中益氣如良相按子宮不收外治法用荊芥藿香椿根皮三味煎湯熏洗總之二症俱屬虛乏升補為急切忌寒涼産後産後總宜大補益寒涼克伐害非一雖有雜症未治之丹溪一言餘論息主方加減産寶湯熟地當歸香附方丹皮白朮白茯苓陳皮山楂木通入姜灰少許及川芎益母甘草棗姜及煎成童便添一杯加減再分虛與實何者為實腹疼痛兼有硬塊手難動皆因惡露去不多敗血停留為病重桃仁紅花牛膝肉桂增蒲黃靈脂亦有用何者為虛惡露多昏暈不省腹空痛手按痛止口懶言人參黃耆加亦中去血不止血虛熱生地山梔荊芥二味炒黑截阿膠黃耆及烏梅益母丹皮除去絶血暈之症頭眼暈神昏口噤心下悶韭醋熏法自古傳補新去瘀宜自定有痛須憑失笑功失笑散用蒲黃五靈脂二味為末無痛參耆亦神應脈滑有痰合二陳半夏白茯陳皮甘草再加竹瀝薑汁進示吉曰産後眩暈譫語發熱諸症須問其去血多少及胸脅小腹有無痛處手不可近者及去血少者瘀未盡也行血為先無痛處者或有痛處手按痛減去反去血過多者血虛極也補血為要倘倉卒未及詳審先用熏法産後血暈用韭葉細切入有嘴瓶中用滾醋沃之急封其口以嘴塞産婦鼻中令醋氣透入即醒然後辨證用藥蓋韭菜最能清胸中滯血加以醋氣運達用無不效産後噦惡名沖胃癲狂錯亂衝心類是皆敗血往上衝五靈為末半生半炒三錢兌送下童便酒來調本方調理精神遂産後寒熱多屬虛本湯調理又何疑不愈柴胡並鱉甲醋炙為末腹中塊痛敗血欺增入澤蘭桃仁紅花劑失笑散用亦相宜若兼咽酸並飽悶惡食噁心傷食醫加入山楂及厚朴麥芽神麯效亦奇蓐勞之症乍寒熱喘乏自汗久不歇莫作瘧疾並外感逍遙散用真奇絶逍遙當歸甘草炙白芍酒炒柴胡入茯苓白朮加丹皮山梔水煎服後疾如失半身肉戰半身汗惡露不淨真希罕二陳四物加桃仁山楂煎成瀝汁功不亂卒倒仆地似中風肢體抽搐痓症同産寶須加半夏竹瀝姜汁發痓仍添桂枝攻聖惠愈風湯名亦主前荊芥略炒當歸身尾等分通為末三錢童便下豆淋酒下有奇功豆淋酒黑豆不拘多少炒黑投酒中去豆用酒大腸血少大便結生地枳殼紅花不必說桃杏麻仁炒為末減去白術茯姜益歇泄瀉脾虛兼發腫蒼朮砂仁厚朴統豬苓澤瀉及神曲麥芽除去當歸病不恐瀉甚加肉果山藥扁豆食傷脾胃自炮悶作酸噁心泄瀉甚加入蒼術厚朴木香砂仁除去當歸生地川芎益母應去血過多生噁心嘔噦不止虛寒形加人參半夏並薑汁一加烏梅益母當歸熟地停去三味因怒傷肝胸脅痛飽脹胸滿食不用木香延胡青皮厚朴增不止柴胡芍藥動血虛煩躁易虛驚錯語失神臥不寧加入人參棗仁竹茹朱砂麥冬丹皮姜灰益母去不存痰迷心竅不能言瓜蔞川貝枳實人參菖蒲桔梗添竹瀝薑汁臨服入去丹皮姜灰香附益母傳精神短少添遠志麥冬茯神生地服如仙脾虛飽悶不進食砂仁白蔻木香厚朴入川芎丹皮烏藥益母四味除倍加白朮功奇特升舉作痛腹有塊若無寒熱兒枕類兒枕塊痛七日自止痛不移處作寒熱紅花官桂牛膝死血遂或合失笑散蒸乳寒熱乳必膨青皮枳殼木通功為最骨節疼痛難轉側內無血養榮筋骨去血過多之故生地白芍紅花人參增牛膝乳香官桂二味少許亦有益小産妊娠小産是何緣七情交攻厚味煎起居不時調理失或因跌撲損傷兼大産如瓜熟自脫小産猶如生採然枝枯藤蔓果自落病比大産十倍添因循不治滑胎症終身無子良可憐古人保胎預防法養血清火固胎元固胎湯用白芍當歸川芎生地條芩酒炒白朮同人參茯苓甘草陳皮同阿膠艾葉砂仁香附氣多壅有痰再添姜半夏脈數山梔亦可通三五七月服數劑螽斯之慶自無窮示吉曰凡人經淨種子之後最宜將息勿怒勿勞勿舉重勿遠行勿洗浴勿夏淫火以擾其子宮而多服養肝平氣清熱養血補脾之品胎自固矣蓋墮胎之症在三五七月者多在四六八月者少臟陰而腑陽三月屬心五月屬脾七月屬肺皆在五臟之脈陰常易虧故多墮耳惟一月之內墮胎人但知不受妊不知其受而墮也一月屬肝大怒則墮多洗下體竅開亦墮一次既墮肝脈受傷後期必應乘其虛耳故人無子者宜預服調經種子之藥以保一月之胎豫家四金匱丸出自祕府實有挽回造化之功屢用屢驗調經種子如神敢自祕謹附於後以廣生生之德云四金匱丸香附六兩用黃柏山梔各二兩同浸炒川芎續斷白朮白茯當歸山藥白芍俱酒洗炒各四兩青皮砂仁俱炒白茯酒洗各二兩條芩酒炒生地酒洗各四兩為末山藥淡醋湯糊丸醋湯下蓋條芩白朮安胎聖藥養胎全在脾胃臂之鐘懸於梁梁軟則鐘下墜折而墮矣故用白朮苦條芩力能清下焦實火火去則陰自足一增其利一去其害又何小産之足慮哉赤白帶奇經八脈帶居一橫於腰間如帶束病生於此故取名方書分為五種録色如青泥屬肝紅津屬心形如白涕屬肺黃如爛瓜屬脾黑如衃血屬腎經行産後風入胞傳於臟腑生病酷出婦人良方東垣之論主亡陽東垣云血崩久則亡陽故白滑之物下流未必全拘於帶脈丹溪濕熱痰積屬丹溪云帶下是濕熱為病治濕為主亦有痰積下流宜升提之白屬氣分赤屬血徐用誠言真可讀清源收帶有妙方耆白術當歸人參升麻柴胡局茯苓半夏甘草陳皮川芎香附水煎薑棗空心服生地黃柏瘦人添延胡小茴腹痛兼去參冬加姜灰法玄妙防風山梔色青先紅白黃連梔子用黑合六味地黃煎示吉曰帶症病原不同治法各異如病婦肥白無病容或昔肥今瘦脈來沉滑濕痰也如飲食減少四肢無力帶下多白胃中痰積下滲也如婦人久病寒熱不齊夜輕日重或自汗脈大無力氣虛下陷也如兼潮熱夜重日輕肌黑形瘦盜汗骨蒸脈細數血虛火熱也如因不得於夫七情抑鬱鬱而為火以致帶下郁也濕痰宜滲濕消痰海石半夏南星黃柏蒼朮川芎香附樗根皮痰積宜消痰升提二陳加二朮升麻柴胡或前湯加互壟子下陷宜升提補氣宜六君子湯加緑升麻柴胡火熱宜滋陰養血四物湯加黃柏樗根皮滑石青黛海石鬱氣宜開鬱行氣越鞠丸加樗根黃柏分條而治自得病情東垣用葵花治帶白者治白赤者治赤須炒黑用神驗肥人用瓦壟子以燥其濕乳疾陽明胃經主乳房厥陰肝經乳頭生醇酒厚味兼憤怒胃肝火動癰疽妨堅硬如石名石乳婆娑多口乳發方吹乳發於乳嘴上乳漏之症生兜囊不痛不癢如桃核乳岩潰後病難當有子吹乳外吹症兒口熱毒吹乳病急須消散易為功因循潰後醫難應軟溫飲子是煎方總治乳疾能接命柴胡赤芍並木通黃芩瓜蔞青皮順甘草桔梗共當歸乳香沒藥山甲進廣膠三錢酒水煎痛甚角刺橘葉滲托裡黃耆及防風解毒銀花連翹貝母順示吉曰乳症消散為易潰後收斂為難蓋其形內懸垂而血易滿也然乳癤為輕石乳乳發為重乳癰潰日尤可望愈乳岩一潰不可救矣胎前乳癤為內吹産後乳癤為外吹外吹若潰乳至即膿最難收口初起乳汁不通結核腫痛速宜揉散或忍痛吮出惡汁或用木梳頻刮乳房乳汁一通核自消散倘不愈急用蔥搗成餅攤乳上一指厚用灰火一罐覆之須臾汗出腫消內服瓜蔞散亦妙黃瓜蔞子多者一個當歸甘草各五錢乳香沒藥另研各一錢水煎酒服若結核乳岩兼用八珍湯加青皮柴胡麝香少許尤妙祕方治吹乳乳汁不行豬牙皂炒黑蛤粉等分為末每服一錢陳酒送下一方諸般乳病內消用大黃白芷鼠糞當歸等分為末每服三錢陳酒下毛公威驗過女子月事胎産脈法玄黃之精妙合而凝乾道成男坤道成女女子以坤道用事故陰盛陽衰為順左為陽右為陰寸為陽尺為陰是以女子寸脈常弱尺脈常盛右脈常盛左脈常弱此與丈夫之脈不相同之大綱也更有不相同者惟月事胎産之脈經云女子二七而天癸至任脈通太衝脈盛月事以時下故有子王太僕曰陰靜海滿而去血陽動陰合而泄精二者通和故能有子即易所謂男女媾精萬物化生也其有子之脈若何經曰手少陰脈動甚者妊又云陰搏陽別謂之有子十月既滿子欲受生則有離經之脈可考焉離經者離其常經謂脈來數急或沉細而滑也逮及産後脈來沉小緩弱為吉何也脈為血之充産後則心生血肝藏血其生藏者有限血送胎下無窮不足證也若脈來弦實洪大是為脈症相反其能久乎總之産後之脈現微細不責其不足胎前之脈現洪滑不責其有餘臨蓐之際沉滑而數不責其熱調經之時遲數不等方辨其病此為女子脈法之要從此而益求其精有何病之不愈哉調經脈法診脈沉遲主逾期不至小腹冷痛脈弦數主先期而來或有黑紫血塊弦滑而沉主月色淺淡或雜色如魚腦或帶下多白脈微澀主月來血少或過期不至沉實主經行著氣腰腹疼痛六脈俱微主榮衛皆虛月事前後不均或來缺少或淡白色陰脈虛陰脈搏手主血崩二尺芤主血海敗微細而數主骨蒸血少經閉不行脈來狀如琴絃若小腹痛主月水不利孔竅生瘡少陰脈滑而數者陰中生瘡少陰脈弦者白腸必挺出胃脈澀少陰脈微遲微則無精遲則陰中寒澀則血不來此為居經三月一至漏血下赤白脈遲者及芤小虛滑者生急疾者及大緊實數者死妊娠脈法王冰曰陰搏陽別謂之有子者陰中有陽故尺脈搏擊手指與寸口殊別也王叔和曰診其少陰脈動甚者妊子也少陰心腎也心主血脈腎名胞門子戶二脈動甚妊娠何疑王肯堂曰懷胎二三月之脈兩寸浮大兩關滑而尺微帶數者此真胎脈妊娠四月可分男女左疾為男右疾為女俱疾主生二子又法尺脈左偏大為男右偏大為女左右俱大主産二子妊娠五月脈來數疾不散六七月脈來實長若沉遲而澀宜防胎墮八月脈喜弦實忌沉細若少陰微緊主兩胎一傷臨蓐脈法離經之脈一息六至或六脈沉細而滑若兼中指本節跳動臨蓐之徵也如忽然浮大必主難産看唇舌若青黑沫又出者為母子俱死若面赤舌青母活子死面青舌紅母死子活産後脈法産後之脈診得緩滑及沉細附骨者生若見實大弦急及寸口疾澀不調者死肝脈虛散而數者主血暈左手三部堅牢主血氣衝心沖胃胎前尺脈沉滑産後不減者主兒枕痛兩尺脈芤主去血過度右手三部虛散者主惡露不止蓋氣不足以固血也微細而數主血虛發熱日輕夜重六脈微細無神主蓐勞自汗右關沉而有力主傷食發熱噫酸惡食産後傷寒熱病脈宜微細不作陽病見陰脈論也丹溪曰胎前脈細小産後脈洪大者死一婦年四十歲有十餘年不受胎矣月事前後不準而又無子脈來微細兼數豫制女寶丹服至百日而孕後産一男一女子二十餘歲有孕至五月間必墮已三四次矣豫亦以女寶丹加減付之即産一子女寶丹調經種子如神兼能安胎保孕當歸酒洗六兩生地酒洗六兩白芍藥酒炒三兩川芎酒洗三兩云白朮土炒六兩條芩酒炒四兩陳皮炒三兩香附童便鹽酒醋四制四兩阿膠酒浸溶蜜內三兩砂仁炒二兩以上如法制度為末另將益母草二斤半煎膏和煉蜜及阿膠為丸丸如桐子大每服五錢空心白湯送下月事後期來者去條芩加乾薑灰一兩蘄艾二兩肥者加製半夏三兩白茯苓四兩有白帶者再加白薇四兩氣虛甚者加人參三兩茯苓四兩山藥四兩如安胎用白蜜丸不用益母膏如腰痛加山藥杜仲各三兩一孕婦瘧疾大作脈得弦數豫用知母四錢柴胡三錢陳皮二錢甘草一錢井河水各一碗煎至一碗露一夜明早隔湯燉溫服而愈不愈加生首烏五錢自盜汗甚加黑豆三錢食多加枳殼二錢此方熱多者宜之一孕婦瘧疾右脈微滑左脈微弦豫曰脾虛生痰也以白朮五錢生薑三錢井河水煎露一夜溫服而愈此方寒多者宜之一孕婦痢下赤白裡急後重逐滯利水俱不可豫曰惟清血調氣法也用薑汁炒黃芩黃連各一錢蘇梗當歸各錢半炒白芍扁豆山藥茯苓澤瀉車前枳殼各一錢木香五分甘草二分煎服數劑而愈一新産發熱服藥不止豫以益母草煎湯加童便與之熱遂退蓋診其脈平和惟稍數故也一新産發熱投之四物及童便姜灰之類不應豫診其脈右弦滑左微細豫曰是必咽酸飽悶停食故也以神麯山楂厚朴枳實加入前方而愈
