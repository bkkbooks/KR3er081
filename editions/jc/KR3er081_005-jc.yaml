body:
  text: 卷之三傷寒賦上篇人生疾苦莫重傷寒岐伯陳傳變之經內經具載仲景詳方法之治金匱斯明補論方晉王叔和功大加註釋宋成無己功多自宋及元於今為盛集大成王肯堂之輩摘精要陶節庵之徒考古而徵今博學以說約欲明其症先正其名霜降後為傷寒若溫暖則有冬溫之異春分後為溫病倘暴寒則有寒疫之殊乃問時疫因四時天令不正既名熱病由夏月暑熱方生濕溫暑暍宜分類似傷寒有辨將行三法汗吐下明察六經太陽則發熱惡寒頭痛項強拘急體痛陽明則頭額目痛微寒身熱鼻乾不眠少陽脅痛耳聾寒熱嘔而口苦太陰腹滿自利尺寸沉而咽乾少陰之經舌乾口燥厥陰之症煩滿囊卷日傳一經七日尋愈若言兩感六日再傳麻黃桂枝與五苓治太陽無汗自汗及煩渴葛根白虎並承氣療陽明表證里證與下攻惟少陽有汗吐下之禁三賴小柴胡以和解至少陰有下溫補之證亦看脈足便以收功脈沉實有力便結宜下脈沉細無力足冷宜溫補太陰有或下或溫之方厥陰有急下急溫之例兩感之症日傳二經沖和靈寶百全一二脈浮緊宜汗須看頭痛發熱惡寒脈沉實宜攻還須便結繞臍硬痛足冷而脈沉細雖面赤煩躁可溫胸滿而寸滑沉或懊憹冷厥必吐煩渴而小便不利或飲水即吐或發黃而利水是求大熱而錯語呻吟或乾嘔不眠或汗渴而寒涼是用隨證而治乃為良醫治之失時變證蜂起失汗則面赤身癢怫鬱而不知痛處因而大煩失下則口燥咽乾熱結而津液內消兼之痛硬不利小便如狂不除不吐懊憹鬱悶依舊吐衄之後小便利而大便黑蓄血居多頭汗已形小便難而渴飲漿發黃可待血有桃仁犀角黃宜茵陳五苓陰躁陽狂有異重斑輕疹亦殊卒口噤而背反張剛柔二痓作手足冷而便通秘寒熱二厥生呃或噦遵陶氏之書陰陽毒從李氏之論蛔厥手足冷雖有熱而禁用寒涼狐惑唇口瘡辨上下而急求湯劑汗下禁於動氣隨臍之上下左右而施苓桂泄於奔豚審氣從小腹衝心而治過汗患不少下早變尤多表證顯惡寒誤下則結胸痞氣懊憹之症作發汗恐不徹過多則肉瞤肉苛筋惕之病興結胸有大小寒熱水之稱痞氣惟痞滿不疼痛之辨大小湯丸任用姜根熨法尤良筋肉跳動為亡陽肉苛者非溫補不愈循衣摸床為死症撮空者用升陽以求痊便結如何下攻亦可雜症互見隨病施方嘔吐雖屬少陽寒當溫食當消而火當解呃忒雖為胃病寒宜熱痰宜化而秘宜通瀉利自利協熱協寒之故膿血自便寒熱傷血之由喘有表裡水飲之不同喘便秘而不惡寒者下之則愈痛有寒熱燥實之不一重按而痛漸減者補之則安頭搖屬風有痛宜察心悸停水氣虛亦然寒熱為少陽之邪便秘者可下潮熱主陽明之燥未結者可和擾亂為煩心熱之諦憤怒為躁腎熱之徵汗下溫涼不同陰虛陽實有別脈遲厥利不能食反能食者曰除中下利臍痛引陰筋食如故者名臟結二症俱死多眠神復兆向壁臥有陰寒之虞衄血紅汗名動陰血為厥竭之禁不得臥有數種陽明是其大端越經症不只一方導赤乃其最效膀胱有冷熱之結咽痛有寒熱之攻漱水者血症與陰寒瘈瘲者風熱及痰飲小腹脹滿蓄血與溺澀宜分大便不通陽結與陰結宜審動搖身振筋骨不榮驚悸怔忡氣虛停飲三物金沸療咳嗽而湯異功同白虎五苓治口渴而同功異法舌苔分乎表裡表則白滑里生黑黃體痛介乎陰陽陽則煩疼陰如被杖汗出不止曰漏大汗後亡陽所生頭旋眼花曰眩汗下後陽虛所致項強為表證結胸如痓者宜陷胸丸頭痛者屬三陽嘔吐涎沫者為厥陰痛鬱冒直視非佳兆喑啞不言豈易為遺尿有熱有寒寒則死而熱可治譫語者有虛有實實則下而虛難醫舌卷囊縮厥陰亦辨陰陽手足搐攣汗出又逢風露曠日持久變證有三汗吐下後仍不痊壞病方投鱉甲飲行住坐臥皆不定百合須求百合湯前熱未除復感寒寒熱往來號溫瘧如何治療原用柴胡前症已明瘥後宜謹發頤豌豆何今日之毒有餘錯語昏沉咎當初之汗不徹勞復食復尤可恕調中鱉甲先嚐女勞易病悔誰知逍遙燒褌有驗浮腫因嫌脾氣弱水濕不流喜唾方知胃有寒津液不納飲酒必然將病復虛弱知前汗下傷類傷寒症有五治食積於平胃化痰飲於二陳補中益氣治虛煩加減續命醫腳氣惟有桃仁承氣兼治瘀血損傷再且傷風暑濕多眠身重風溫可用葳蕤多汗妄言濕溫原需朮附中暑中暍之症香薷飲宜投傷濕風濕之流羌活湯有效普濟消毒飲專療大頭六神通解方能司晚發內外有別男女須分發寒熱而天癸適來知晝明而夜譫語服寒涼而經水適斷防蓄血而腹滿疼胎產之間毫釐千里胎前之治安胎是真四物沖和治太陽不如蔥蘇飲為穩當紫蘇大黃下秘結不如外導法為萬全少陽陽明柴葛雙解小腹外護青黛井泥方見後直中真寒妊娠患之絕少附子薑桂炒制用之不妨溫毒發斑升麻連翹加於四物自汗口渴白虎倍用人參月滿既生治法又異診脈偏喜沉細若浮緊反為不佳制方切忌寒涼雖身熱還須禁用欲發表之劑加羌活紫蘇蔥於黑神攻大便之方添酒大黃於產寶剛柔二痓五積入麝成功自噤中風聖惠愈風乃效喘急參蘇飲人參蘇木二味煎服眩暈二四湯二陳四物合用寒熱宜補宜消譫語血虛血實未治雜症丹溪有言勿拘風寒前哲有論大綱細目幸此篇之備陳心要秘傳容後章之再布傷寒賦下篇運氣加臨歲時各異六經傳變旦暮不同察色聞聲為先切脈審證莫後觀其形體參決死生青色為寒兼主風痛之候赤色屬熱須防戴陽之虞脾土色黃有晦濕明熱之辨肺金色白主氣虛血脫之災黑色為陰主寒主痛光明潤澤青黑逢之亦可生沉晦夭枯紅黃見之亦有死相生者吉相剋者凶分部位而觀成敗靈樞甚詳別死生而論外榮內經明悉望色曰神聞聲曰聖口出無倫為譫語無稽怒叫號狂言外感有餘出言壯厲且先輕而後重內傷不足語言懶怯且先重後輕語不接續曰鄭聲無人始言曰獨語鼻塞身重自屬傷風聲啞唇瘡定因狐惑口噤攣搐為痙症鼻鼾語塞是風溫錯語呢喃出言不正胸中汩汩因有水喉中漉漉定為痰症見前篇不必再及脈因未悉次第推求表則浮而里則沉中為少陽之候遲則寒而數則熱緩為胃氣之和動數大滑浮為陽為熱沉澀弱微弦為陰為寒脈象先分四時順逆方驗陰陽急辨有力無力須知陰證見陽脈者生真陽來復之兆陽證見陰脈者死正氣衰微之機汗後脈安靜為痊躁亂者不吉溫後脈漸出為愈歇止亦凶大小疏數不常定為死崇病進病退有別證察陰陽尺脈無力而虛汗下宜禁寸口無力而弱吐之則亡六經之脈見於前審形之法陳於後凶者身重如山石吉者身輕如轉丸尋衣摸床肝熱乘肺冒心叉手過汗陰虛手足牽引曰風頭重視深曰倒揚手擲足揭去衣被陽可知倦臥神昏引衣自蓋陰為的鼻為肺竅忌青黑而紅黃者佳舌乃心苗喜紅滑而黑刺者忌中暑則板齒燥脾熱則唇口焦唇口黑青陰寒之故唇口腫赤熱極之徵病愈目眥黃睛黃者發黃之漸病重目直視稍動者痰飲之妨喜陽證之目開惡陰證之目閉心胸滿悶察痞氣而大小結胸小腹脹膨分蓄血而大小便秘疑似須別活法宜精太陽有風有寒自汗無汗之故陰證有虛有實傳經直中之分傷風見寒則汗多脈浮而緊傷寒見風則汗閉脈緩而浮前經未盡而過經表在者並病之例三經不傳而齊病自利者合病之條有頭痛而發熱脈沉太陽脈似少陰而反重無頭痛而脈沉發熱少陰證似太陽而反輕重為正氣衰微乾薑生附不可緩輕為表邪浮淺麻黃附子正宜投陰證似陽固多陽證似陰間有脈沉足冷知身熱面赤之症非真重按無根識數大洪浮之脈是假稀糞旁流而痛硬必非陰寒手足逆冷而乍溫自知反化陽狂莫作陰躁紋跡勿認斑疹發狂重於如狂傳經輕於直中發黃有血濕之辨傷寒有內外之名夾氣夾痰幸節庵獨究內傷外感按東垣始明勞力傷寒似虛煩夾食傷寒兼食積從脈不從症莫疑從症不從脈當曉識病於未來世人方羨斷死生於現在神鬼來通鼻孔燥干欲漱水者衄之兆頭上汗出小便難者黃之基腹痛為自利之先鋒自利而痛者恐白膿之下噁心為嘔吐之響導不食而飢者防蛔厥之憂心慄為正不勝邪倦臥而漸成寒逆身戰為邪不勝正汗出而預報安痊心動為慄身大動為戰若身微動為振振為正氣虛寒足冷耳聾咳嘔悶煩汗下不解斑將至妄語悲嘆煩躁少臥神志不寧狂欲興痞積於腹中動氣之本氣動於臍下奔豚之原小便利者瀉將痊汗自出者便必硬微浮緩而不嘔清便自安肌表熱而大煩作汗必解邪氣欲傳脈緊盛未來之病循經可推邪氣不傳脈靜和病愈之期屈指可弄未知死症焉將全生陰陽毒過七朝兩感傷寒六日黑斑不治厥竭須亡陰陽交及摸尋衣唇吻青兮面燻黑舌卷囊自縮何堪耳聾遺屎並失尿更添昏亂咳逆不已汗喘不休結胸症具兼煩躁臟結亦死陰陽易病女勞復吐舌真凶二陽合病忌弦長汗後脈疾名臟厥重暍除中口張目陷如此之流天命何咎若欲奪命於萬一求全之毀常來必須審證於再三百中之發有望說約歌示吉曰傷寒主方陶節庵先生提綱舉領共集四十可謂約之極矣包與堂編成歌括以便學者豈非先得吾心者乎予更採名家之秘並獨得之法增補於後同志者庶無遺珠憾也太陽經足太陽膀胱經起於目內眥從頭下後項連風府行身之背症不同方各異四時傷寒各有例惟有冬月正傷寒不與春夏秋同治發表實表兩妙方用在三冬無別制正傷寒正傷風表虛表實不相同表虛自汗脈浮緩疏邪實表有神功表實無汗脈浮緊升麻發表自然松背惡寒身發熱頭痛脊強無休歇俱屬太陽膀胱經有汗無汗須分別有汗表虛脈浮緩無汗表實浮緊列正傷寒霜降後春分前天冷嚴寒萬類深藏觸犯其氣而即病者名正傷寒頭痛發熱惡寒項脊強無汗脈浮緊升麻發表湯名即麻黃湯加味桂枝麻黃升麻白芷川芎甘草羌活防風杏仁共咀槌法妙豆豉加一撮引蔥姜寒熱頭痛無汗喘去升麻加干葛是奇方發熱惡寒身體痛除杏仁加芍藥又加蒼術身癢面赤小便數減去白芷杏仁加柴胡白芍頭悶寒熱胸飽悶枳殼桔梗加投證服之無汗病難痊汗多又恐生別病示吉按經曰陽之汗以天地之雨名之病人得汗熱除猶天氣鬱熱一雨而涼也凡服此劑外用厚被蓋覆其身及手足取汗汗出不可驟動待汗乾方可揭開凡口苦舌乾或吐衄亡血或淋瀝瀉痢或臍旁動氣或風溫濕溫中暑或瘡痛或產後或經水適來適斷或陰虛勞倦或尺脈微弱並不可汗俱禁此湯服此湯復熱脈躁亂者死汗出不至足者死正傷風冬月嚴寒水冰地凍傷風即病自汗者名正傷風即桂枝湯加味疏邪實表湯名桂枝川芎赤芍羌活防風白朮同甘草姜三和棗二膠飴二匙共煎濃加之柴胡杏仁能消喘止汗黃耆腠理封飽悶還須添枳殼桔梗玄機能有幾人通服此藥後進熱米湯一碗以助藥力溫覆一時遍身微汗者佳切忌如水流漓反生別病一服病瘥不必煎渣盡劑病猶在再煎服蓋欲中病即止也凡小便數者善飲酒者及春夏秋傷風俱忌此湯春夏秋三時感冒春夏秋另有方通用羌活沖和湯春溫夏熱秋治濕隨時加減妙難量病症與冬皆相似淺深表里脈中詳脈有浮脈有沉半浮半沉表裡尋有力無力辨虛實或溫或寒細酌斟更有汗吐下三法隨宜施治莫沉吟脈浮為表證脈沉為里證有力為實宜寒宜瀉無力為虛宜補宜溫此傷寒感冒大概治法羌活沖和羌活防風甘草黃芩蒼術白芷生地細辛川芎薑棗槌加蔥搗汁三時發汗自然松心胸飽悶除生地宜加枳殼桔梗定寬中石膏知母夏用名神術湯名不能發汗紫蘇攻寒熱喘加柴胡杏仁汗後不解大黃通噁心半夏並薑汁夾食砂仁厚朴同去生地黃芩瀉亦去三時自汗脈浮緩寒熱頭痛即傷風實表去蒼加白朮黃耆止汗卻收功自汗去蔥此名加減沖和劑雜症還當一掃空自汗不止用桂枝白芍小柴合用是良工此湯治春夏秋不分有汗無汗太陽證在者用此解利可代麻黃桂枝青龍各半等湯元氣本虛及勞力冒寒傷寒見風傷風見寒用之皆效陽明證陽明經起於鼻絡於目循於面行身之前其症微惡寒頭額目痛鼻乾不眠陽明證不得眠鼻乾目痛病之緣惡寒身熱微洪脈此係陽明胃經傳柴葛解肌湯一服即葛根湯加味猶如渴極飲甘泉解肌湯用葛根柴胡黃芩桔梗白芍羌活甘草白芷靈槌法石膏末一撮薑棗一服即身輕熱服本經無汗惡寒甚加入麻黃不用芩冬多春少夏秋減言麻黃秋夏蘇葉病自平汗而帶渴當何劑如神白虎用如神陽明本病自汗大渴如神白虎湯名用人參甘草麥冬五味臨石膏山梔知母引薑棗竹葉為槌人自清陽明胃腑本實病發斑發黃發狂妄亂譫語結胸口燥干發譫語衣掀足擲手揚舉心腹滿硬繞臍疼發渴斑黃妄狂舞舌卷囊縮便硬堅邪傳正陽明胃腑六一順氣是神力秘之莫與庸愚睹六一順氣大黃樸硝黃芩枳實厚樸柴胡甘草白芍勻水煎鐵鏽三匙入殺車槌法妙如神按此湯兼調胃三乙大小承氣大柴胡大陷胸等湯下藥之總司也然亦為急下之劑若表病未除里證又急已加大黃於小柴胡湯中下之矣必須斑黃妄狂燥結七八日下證已全者投之氣血兩虛並老弱婦人產後當下藥此湯分咐去芒硝微和胃氣細斟酌躁渴譫語兼結胸心下硬痛手難著甘草除去加甘遂桔梗瓜蔞病自削陽證表病在而誤下之則成結胸少陽證起於目銳眥止頭角絡耳中循胸脅行身之側少陽證嘔而苦耳聾胸脅多痛楚脈來弦數膽之經本經切禁汗下吐病在半表半裡間柴胡雙解飲方妥小柴胡湯加減雙解飲用甘草人參陳皮乾葛柴胡半夏黃芩加入薑棗槌法妙艾汁三匙藥更神嘔吐竹茹姜搗汁小水不利茯苓入脅痛青皮應速增痰加貝母瓜蔞實寒熱似瘧桂枝用渴症天花粉知母共嗽加五味金沸草口齒無津石膏重心胸飽悶未經行非是結胸理自明表黏至胸未入腑只用小柴桔梗枳殼增不效陷胸加枳桔小陷胸湯瓜蔞黃連枳實半夏合用柴胡功最靈壞病本方加鱉甲虛煩竹葉炒粳米本經病與陽明合芍藥葛根二味新熱入血室歸紅著男加生地更調停老婦傷寒無表證熱甚硝黃酌量增按傷寒汗吐下後仍不瘥名曰壞病前熱未除復感寒寒熱似瘧名溫瘧本湯加桂枝芍藥寒多倍桂熱多倍芩女人傷寒經水適來適斷晝則明瞭夜則譫語如見鬼狀名曰熱入血室太陰證始於足大趾上行至腹絡於咽連舌本循身之前太陰證脈俱沉病形一一要詳論沉而有力宜當下沉而無力又宜溫陰證有二若初起頭痛發熱後變便結煩渴脈沉有力是陽經熱邪傳入陰經之陰證宜下之若初起無熱不渴就便怖寒自利足冷脈沉無力是直中陰經之陰證宜溫之三陰同法口渴咽乾腹滿痛桂枝大黃湯可用身目發黃頭汗出茵陳將軍湯最重無熱自利臟寒甚加味理中湯是聖太陰寒證勢沉沉回陽救急湯為正治腹滿痛咽乾渴手足溫便結脈沉有力桂枝大黃湯名桂枝甘草赤芍柴胡枳實大黃薑棗著腹滿而喘不惡寒加入腹皮去甘酌檳榔磨水入三匙熱服順臾病可卻治頭汗腹滿小便澀大便秘發渴脈沉實身目發黃茵陳將軍湯名茵枳實黃芩厚樸山梔大黃甘草入推法燈心三片姜太陰頭汗此湯的大便自利去樸黃加入滑石黃連腹皮益治自利不渴手足溫身無熱脈沉無力附吐蛔動氣奔豚呃逆加味理中湯名人參最尊炮姜肉桂茯苓陳白朮甘草同薑棗一匙壁土入湯吞食即吐蛔飢不食川椒烏梅細辛吃去甘草肉桂便實大黃蜜少加腹滿時減去甘得利後身疼附急溫嘔加半夏生薑汁自利腹痛更有方木香薑汁磨勻入動氣奔豚白朮除甘瀾水煎原有力呃忒丁香並柿蒂熟附沉香磨汁食治直中陰經真寒證無熱不渴便惡寒四肢厥冷戰慄腹痛吐瀉手足甲青唇青或舌卷囊縮脈沉無力或至無脈回陽救急肉桂人參熟地附子炮姜共茯苓五味陳皮甘草白術半夏姜煎入麝逐寒凝嘔吐涎沫小腹痛鹽炒吳萸妙入神無脈應加豬膽汁吐加薑汁藥方行少陰經始於足心上行貫脊循喉絡舌本下注心胸行身之前少陰證脈亦沉有力無力分下溫舌乾口燥腎水涸或利清水心硬痛腹脹繞臍土勝水六一順氣有方存不渴惡寒身厥冷腹痛吐瀉病沉沉此是陰寒深入里回陽救急急須尋厥陰經始於足大趾上環陰器抵小腹循脅上口唇厥陰證脈又沉溫下同前一樣論舌卷囊縮並消渴四肢厥冷乍還溫煩滿便實多屬熱六一順氣可旋吞口吐涎沫四肢冷嘔逆不渴腹痛硬此是厥陰真寒證回陽救急湯已整少陰厥陰治略同二湯用去人能省兩感證兩感證日雙傳一日太陽少陰連腎與膀胱沉洪脈口乾頭痛熱寒兼二日陽明與太陰沉長之脈胃脾經目痛鼻乾腹自滿大便自利不安寧三日少陽厥陰聯肝膽之脈見沉弦耳聾脅痛囊捲縮古人不治命由天幸節庵訂妙方不論陰陽兩感傷設立沖和靈寶飲一服兩感雪加湯沖和靈寶飲柴胡羌活白芷干葛細辛川芎生地防風甘草石膏黃芩醫兩感煨姜黑豆棗神方更明表裡多少病治分先後細推詳表病多而里病微麻黃葛根湯最奇表緩裡急先攻裡六一順氣不順疑麻黃葛根湯治表干葛麻黃干姜白芍豆豉蔥齊六一順氣方見上將來攻裡不重提發熱下利身疼痛脈來沉細兼無力陰寒中不渴踡臥又昏沉回陽救急溫經用治分表裡辨寒熱節庵權變人