胱而為病故云初起表無熱如狂均用利水藥也然逆結治水為急故用五苓加山梔滑石如狂治熱為先故更用知柏以治下焦蓄熱也同經異病方似法殊用者細心思焉包與堂復增紫蘇亦取微汗之意也過汗口渴證身熱渴汗不松經汗愈渴脈微洪陽明裡熱消津液全賴如神白虎功本方已見陽明證心煩須用竹茹功背寒去梔入花粉無汗斯湯切莫逢亡陽證亡陽證因汗多頭眩振振病不和肉瞤筋惕虛之極溫經益元莫蹉跎溫經益元人參白芍當歸地黃甘草附子須煨白朮茯苓同肉桂棗姜糯米法依槌飽悶生地除加枳殼瘦人去芍法真垂有熱即當除附子自利不止白術升麻追更加壁土除歸地止痢神功在補脾姜炒半夏能除嘔渴用天花法更希汗後惡風表虛甚除去肉桂附子地黃奇加入桂枝膠飴妙衛虛亡陽汗可醫無陽證無陽證細詳定頭痛發熱惡寒甚不能作汗系陽虛愚蒙又不辨時令妄用麻黃必害人再造飲治須臾定再造甘草白芍肉桂黃耆人參熟附羌活防風川芎細辛煨姜三片和棗二更加童便氣和勻夏天附子細辛去加入黃芩石膏知母靈冬月不必加戴陽證身微熱頭不痛無寒不煩面赤騂躁悶飲水不入口虛火炎炎勢若焚只因汗下傷元氣誤投涼劑必死益元湯服必安寧益元人參附子五味乾薑甘草麥冬芍藥強黃連茯苓並知母生薑大棗水煎嘗三匙童便蔥白二槌法頓冷服為良撮空證撮空證仔細詳休投風劑把人傷叉手當胸言語亂昏憒循衣並摸床只因肝熱來乘肺升陽散火即安康升陽散火白芍當歸人參甘草茯神柴胡白術黃芩陳皮麥冬薑棗入水煎槌法煮真金痰加薑汁炒半夏泄瀉升麻炒白術靈大便燥實譫語渴流通必定用將軍懊憹證懊憹證尾虛煩心中鬱悶不舒散反復顛倒無眠睡懊懊憹憹病非凡皆緣誤下陽邪陷梔子豉湯探吐安梔子豉湯梔子豉先煎梔子後豆豉服後得吐心中暢不吐再服不可遲下後心煩並腹滿再添厚樸枳實又何辭氣少原加炙甘草嘔吐薑汁足所司按表證誤下陽邪陷於心胸之間輕則懊憹重則結胸痞氣總之心中不安欲吐不吐者本方吐之或以手探吐下膿血身發熱痢膿血莫作陰寒漏底說溫熱積中成下痢黃連阿膠湯可絕黃連阿膠川芎當歸白芍生地烏梅隨甘草地榆水煎服京墨磨汁病可追身熱柴胡渴乾葛脈弱人參白朮推示吉曰陰寒腹痛病後必下膿血服桃花湯用赤石脂炒粳米炮姜水姜煎服昔年毛方來兄忽患真寒證腹痛自汗四肢厥冷脈絕諸醫束手予用回陽急救而痊於時吳石虹尚在曰此證暫愈後必下膿血則危矣數日後果下痢如魚腦全無臭氣投之參附則不應忽思三物桃花湯仲景豈欺我哉以三物為丸與之三四服愈矣蛔厥蛔厥證手足冷誤投涼劑人必損食即吐蛔不食飢雖有熱證寒不穩椒梅安蛔理中湯酸苦辛辣蛔自隱忌甘草甜物蓋蛔得甘則動得酸則靜見苦則安得辛辣則頭伏於下安蛔理中湯人參白術烏梅川椒炮姜入白茯生薑用水煎手足冷甚附子益嘔加半夏及陳皮臨服更加生薑汁蛔吐不止苦楝根黃連細辛亦相得大便秘結加大黃但得微利人安逸狐惑狐惑症是蟲病狐蟲食肛下唇瘡兼聲啞上唇有瘡惑蟲應兼咽乾是蟲食其臟面色乍白乍黑赤惡聞食氣眠默默舌白齒晦甚殺人黃連犀角湯為的黃連犀角共烏梅加入苦參水煎食桃仁槐子連艾葉並治䘌症齒色黑越經證睡夢中忽言語無病昏昏神不主湯粥與之隨口吞形如酒醉多不舉心火剋金越經證導赤各半湯急取導赤各半茯神人參滑石黃連梔子甘草黃芩麥冬知母同犀角棗姜槌法入燈心食積證食積證類傷寒發熱惡寒頭痛難噁心嘔吐身無痛加減調中飲可參兀兀欲吐同霍亂探吐之法即能安調中陳皮厚樸甘草蒼術白術草果山楂神曲枳實黃連乾薑引用姜木香磨汁消其積腹中疼痛加桃仁熱結大黃能盪滌減去白朮並山楂草果乾姜亦無益胸中飽悶加枳殼莫用甘草及白朮霍亂須將皂末五分鹽和水一碗探吐為良策腳氣症腳氣症類傷寒頭痛惡寒身熱攻腳膝軟疼難轉動嘔逆身痛便不通暑中三陽患必熱寒中三陰患冷同風浮濕弱脈中辨補劑淋洗禁不用病起腳膝名腳氣加減續命湯保安加減續命羌活防風白芍麻黃桂枝甘草川芎二蒼白術著防己燈心二十莖棗姜薑汁依槌法脈數去桂枝與麻黃黃芩黃柏柴胡熱可卻寒中脈遲加附子牛膝木瓜濕脈弱風浮加獨活虛加人參便秘大黃立能脫挾痰證挾痰證類傷寒身熱昏迷頭又眩涎出口中氣上喘七情內損病之緣神出舍空言語亂加味導痰湯可痊加味導痰湯半夏陳皮甘草瓜蔞枳實桔梗茯苓黃芩白朮南星薑棗引竹瀝薑汁入和吞痰飲似祟功誠妙年壯氣盛吐法行勞力感寒證虛煩證類傷寒莫與傷寒一例看頭痛寒熱口微渴兩腿痠疼舉步難濈濈汗出身作痛浮虛無力脈中看若誤汗之輕變重切記臨時仔細觀氣血內傷寒外感調榮養衛是神丹調榮養衛參黃耆定生地川芎陳皮白朮並柴胡細辛甘草當歸羌活防風槌法入蔥薑棗應元氣不足略加升口渴天花知母進煩熱竹茹與山梔喘嗽去辛還用杏仁汗多桂枝白芍減升辛乾嘔薑汁半夏正減去生地甘草少耆朮飽悶消除枳殼桔梗勝咳嗽細辛防風宜減之瓜蔞貝母消痰盛腹中痛疼去耆朮乾薑芍藥方投證血瘀內疼大便黑桃仁紅花滌其病減羌芍術防耆辛痛甚大黃瘀血盡色復證病新瘥思淫欲男女私交將病復陰陽易證最難醫襠末逍遙宜用速逍遙人參及黃連韭根犀角地黃兼滑石柴胡豭鼠糞甘草竹茹知母全姜三棗二水煎用裩襠燒灰錢半重和服再加童便良小便利愈陰頭腫裩襠用近陰處一塊男用女裩女用男裩腹痛囊卷竹茹添有黏汗出方為中無熱脈虛足又冷竹茹黃連知母滑石不須用再去地黃並犀角加入肉桂附子白術當歸送少加木通以引經陰寒之證誠能動按傷寒瘥後血氣未平犯色欲而病復者名女勞復若因淫欲之後無病人反得病者名陰陽易在男子則陰腫入小腹刺痛在婦人則裡急連腰胯重引腹內痛大熱昏沉錯語失神眼中生花百節解散熱氣衝胸欲死此湯並治節庵曰額黑身黃者難治舌出數寸者死百合瘥後昏沉錯語勞復食復等症勞復證及百合新瘥勞傷血氣弱熱纏經絡更昏沉錯語少神煩熱渴新病瘥食復證脾虛氣弱不能勝重則吐下輕則消柴胡百合總宜在柴胡百合合人參知母柴胡黃芩甘草生地陳皮茯苓白芍棗姜槌鱉甲煎來溫服效如神天花粉用能除渴胸中煩熱用山梔仁頭若微痛羌活川芎入飽悶須加枳桔勻嘔宜半夏薑汁炒食復黃連枳實平便實大黃除燥結虛煩竹葉竹茹清一加黃連乾嘔不眠頻錯語黃連犀角病安寧麻黃杏仁咳喘用虛汗黃耆腠理凝心中驚悸為血少茯神遠志當歸好脾倦必須增白朮腹如雷鳴煨姜討水停心下加豬苓勞熱鱉甲醋炙找時熱不除勞復證葶藶烏梅艾汁了晚發證三月間晚發病時行寒疫身痛甚頭痛身熱並惡寒口渴無汗病不順脈來有力兼浮緊羌活沖和投不應槌法六神通解湯人壯氣實須臾定六神通解石膏黃芩滑石麻黃甘草細辛蒼朮羌活川芎和豆豉薑蔥熱服汗周身頭痛惡寒症皆罷反怕熱時便不行大渴大熱並譫語大黃枳實柴胡增除去麻黃並蒼朮槌法檳榔磨水吞臨服檳榔水調和服大頭傷寒大頭病是天行發熱惡寒頭痛疼一服黃芩黃連消毒飲痰火喉閉悉安寧芩連消毒飲柴胡連翹枳殼桔梗羌活防風荊芥白芷饒黃芩黃連川芎射干甘草牛蒡竹瀝生薑汁共調大黃先利一二次後服人參當歸毒自消黃耳傷寒黃耳病類傷寒耳中策策痛不安惡寒發熱風入腎脊強背直如痓般荊防敗毒誠有效補天石載病情探荊防敗毒荊芥防風羌活獨活柴胡前胡甘草方川芎桔梗茯苓妙細辛白芷蔓荊共成湯原方十三味再添蟬蛻黃芩芍紫荊皮用病無妨寒勝宜投小續命白附僵蠶天麻羌活獨活幫外治法用苦參磨水滴入耳中或用猴姜根汁或用苦薄荷汁土木香汁滴入耳中赤膈傷寒胸赤腫又疼痛發熱惡寒病甚重頭痛體痛類傷寒荊防敗毒誠有用本湯加入黃芩黃連瓜蔞元參赤芍中升麻並用紫荊皮大便燥實將軍送外治須用三稜針刺腫出血能蠲痛示吉曰吳門戈氏專司傷寒有補天石集集中惟此二條類傷寒秘而不傳予於張孟如處得之附後胎前傷寒宜清涼忌溫熱太陽證是胎前發熱惡寒頭痛先脈來浮緊身無汗蔥蘇飲服自然痊蔥蘇飲用二錢川芎蔥頭帶須廿一紫蘇攻三錢生薑三錢須搗爛水煎熱服汗來松無汗加醋仍熱服厚被蓋暖汗不同示吉曰胎前表證無汗不可輕與發表以本方代麻黃羌活等湯溫熱時疫同治以蔥能解邪又能安胎也古人用四物合沖和湯治之然歸芍走陰尤恐引邪入內不如蔥蘇飲為穩當如終無汗再用古人法可矣妊娠病陽明兼鼻乾目痛夜不眠煩渴身痛並自汗柴葛引子得安然柴胡葛根並知母各一錢五分大青山梔各二錢石膏升麻各一錢及蔥白二十莖生薑大棗一同煎若不急治胎即落外護之法妙難言妊娠病少陽證耳聾脅痛口苦應噁心嘔吐脈弦數雙解飲服人當定柴胡黃芩及川芎紫蘇知母甘草陳皮進枳殼桔梗芍藥同棗姜煎服病自順嘔痰半夏及前胡脅痛青皮砂仁不可聽口渴不眠竹葉葛根增不愈石膏山梔法可信妊娠病入三陰大便熱結不能行口渴惡熱並煩滿沉實有力脈來因若還不下胎即落大黃紫蘇飲方靈大黃酒製腹皮洗蘇梗川芎陳皮理當歸芍藥枳殼兼甘草蔥頭生姜病自已便通之後胎無恙安胎等劑宜服起示吉曰攻下傷血終防犯胎然秘結不下固不利於子其母命亦隨之而亡本方亦不得已也予屢遇此症先用蜜湯與之外用蜜導法豬膽導法閉結自下胎元保全所活甚多若導之不效方用本方然大黃酒製亦無害也外護法其功不少熱病傷寒即宜用之導法見大便秘條後護胎法用井底泥伏龍肝青黛等分水調塗臍下二寸許如干再塗溫毒發斑按玉峰李氏曰妊娠傷寒過經不愈發斑如錦紋用四物湯加升麻連翹防風黃芩柴胡若發斑煩渴非人參白虎湯不愈若斑見而復隱者元氣不足故也倍參則復出矣中寒症胃氣素虛寒邪直中陰經其症惡寒吐瀉四肢闕冷倦臥口吐涎沫妊娠此症亦少以其氣血調和乃能受胎萬一有之薑桂附子不能無用節庵曰附子薑桂雖熱炒制無害必加黃連甘草兼制沉香墮之亦經所謂有故無殞之意乎產後傷寒在月內惡露未淨時從此而治宜溫熱忌寒涼身發熱頭又疼惡寒無汗表證成脈來浮緊法當汗產後又非一樣論豆淋發表湯奇效若得微汗即身輕豆淋發表紫蘇川芎羌活茯苓白朮同當歸蒲黃鬚炒黑熟地姜灰甘草通丹皮香附及陳皮厚樸黑豆炒黑酒煎濃生薑益母為引子臨服童便入一盅頭痛不愈加蔥白冬月無汗麻黃攻不可用多傷風自汗紫蘇去桂枝芍藥暫通融嘔吐半夏蒼薑汁腹痛延胡烏藥容示吉曰產後榮衛俱虛寒邪湊之即病其症與平人相符但其脈不宜浮緊有力若診得微細勿作陽病見陰脈論蓋產後微細脈固當如是耳制方最忌寒涼以血得寒則凝恐停血為害並非所以扶生生之意丹溪云產後毋得令虛當大補氣血雖有雜症以未治之若大發熱必用姜灰輕者用茯苓淡滲其熱一應苦寒發表之劑皆不可用此言誠為至當但產後寒熱譫語癇痓等症屬血虛血實飲食三者為多如去血過多胸脅少腹無痛處或空痛手按則減此血虛也如敗血不行惡露不散腹中疼痛手不可按此血實也如產後脾胃尚虛飲食過度後至胸腹飽悶噁心作酸惡聞食氣此停食也血虛宜補血血實宜行血停食宜健脾消食治詳女科本條下切不可概認風寒而作外感治之豆淋酒以黑豆炒焦黑將黃酒乘熱淋之入藥內同煎發散風寒生新去瘀實產後之聖藥也陽明少陽和解證另有方濟生加減柴胡湯產後血羸發寒熱飲食少進腹脹忙陽明不眠少陽嘔隨症加減保無妨加減柴胡紫蘇陳皮人參酒炒白芍川芎勻甘草丹皮並半夏生薑大棗水煎吞口渴不眠加乾葛竹葉知母亦須行去芎半惡露未淨加生地荊芥炒灰香附靈胸中煩滿加瓜蔞桔梗不嘔去半夏腹痛延胡姜灰香附興血虛發熱夜尤甚四物合用莫因循脈必微細無力津液不足生煩渴麥冬竹茹知母五味臨去半夏錯語心煩不得睡竹葉辰砂知母精嘔加薑汁去甘草熱入血室紅花當歸行一加生地桂枝茵陳山梔發黃用斑爛元參青黛尋一加牛蒡子升麻治斑欲出未出者三陰經三陽邪傳三陰燥渴大便不通行腹滿硬痛脈沉實將軍四物莫沉吟將軍四物當歸生地酒炒大黃白芍因川芎香附丹皮柴胡甘草生薑煎服即身輕新產姜灰山楂用兼行導法更為神按此用大黃轉藥必須看腹中硬痛非凡燥渴日數已久方可用之若燥結在廣腸豬膽導法尤妙蓋產後陰血已虧用大黃恐復傷其血變生他症耳中寒胎產後真中寒手足厥冷心不安口噤不言人不省云術四兩細切完二升陳酒煎至半服之奇效自忻歡按產後中寒宜用蒸臍法外用熏法用吳萸紫蘇蔥頭煎湯於密室中放桶內熱時熏既而洗之甚效外感脈法產後因得熱病臨脈細四肢暖者生脈大忽然肢逆冷須知其死莫留停卻病避瘟法論曰冬時嚴寒萬類深藏蟄蟲周密君子居室恐觸寒威而生病也蟄蟲尚知衛生何以人而履霜蹈冰自殘其命乎倘有不得已之事不能免於衝風冒雪者宜飽食飲酒以敵其威若時得疫癘互相傳染闢疫之法又所宜講經云聖人不治已病治未病不治已亂治未亂此之謂也一用水飛雄黃男左女右吹鼻孔中一用透明雄黃一塊五錢重者絹包系頭頂心妙一取貫眾浸水飲之一用赤小豆同糯米浸水缸中每日取水用之發汗法人之寒氣自表而入亦自表而出發表之道所由作也凡頭痛發熱惡寒項背強身體痛拘急怫鬱面赤身癢脈浮緊或浮數無汗者俱屬表證經曰在表者汗之若在深山窮谷無藥處先用薪火燒地良久掃去以熱水灑之取蠶沙柏葉桃葉少加細糠麩鋪所燒地上約厚二三寸加席令病人臥於上飲七沸湯一碗多被密覆汗即至矣候周身及腳心俱透即愈七沸湯用水七碗燒鍋令赤投水待沸取起再燒再投如此七次取湯一碗乘熱飲之又法傷寒及溫病不得出汗用搗薑汁綿裹周身擦之良法也止汗法自汗表虛汗多亡陽桂枝止傷風之汗黃耆止氣虛之汗當歸止血虛之汗內治法也外治法凡傷寒溫熱病汗不止將發披水盆中足露於外宜少蓋外用龍骨牡蠣糯粉麥麩白朮為細末和勻周身撲之其汗自止一用蚊蛤為末津調塗臍內亦妙吐法經曰在上者因而越之吐法是也凡病在膈上或胸滿多痰或食在胃口或胸滿微煩或胸中懊憹或胸中痛欲按或寸口脈滑或寒氣在胸煩滿或寸脈沉伏或乾霍亂心腹刺痛或中風寒痰涎壅甚或下利日數行寸口脈滑悉皆可吐一用瓜蒂散瓜蒂赤小豆等分為細末先以水二盅煮香豉一合作稀粥去渣取三分之一和散一錢頓服之不吐少少又加得快吐乃止諸亡血虛家不可用豬苓散溫病身不熱煩渴發狂小便不利用豬苓茯苓澤瀉滑石阿膠各一錢為末白湯調服仍以涼水一盅飲之鵝翎探吐吐痰法用皂莢末麝香細辛生礬為細末薑汁調二三分灌下後將鵝翎蘸桐油燃皂莢末探吐止嘔吐法嘔吐不止用炒粳米一撮入各藥中同煎後加生薑自然汁傳送隨用竹管重納內關其嘔即止惟胃實嘔吐不可米恐反助邪氣也導法經曰病在下者下之諸承氣湯所由設也然或遇年老氣衰婦人新產及久病之後下不可不下不可所以不能已於導法也一用好蜜煎膏滴冷水中即硬為度入麝香細辛皂莢末和勻捻成條如指大浸冷水中候硬推入穀道中即通一用豬膽一枚傾去一半入香油半盅以蘆管套進以一頭推入穀道中放膽汁香油流入燥屎自下止痢解大黃芒硝法服黃硝而下利不止將參朮乾薑甘草熟附白茯訶子肉蔻粟殼陳皮升麻木通烏梅燈心水煎臨服入炒壁土一匙調下救陰寒法治陰寒嘔逆吐利腹痛身如被杖四肢厥冷過於肘膝昏沉不省六脈或沉或絕心下脹滿結硬堅冷如冰湯藥不受面唇指甲皆青黑或鄭聲舌卷囊縮煩躁冷汗不止腰背腿疼蒸臍法熨臍法已見中寒一用吳萸二三合麩皮一升鹽一合拌勻炒熱以絹包腹中上下熱熨之自然有效一灸氣海穴在臍下一寸五分丹田在臍下二寸關元在臍下三寸用大艾灸二七壯一用胡椒為細末蜜丸塞馬口內一時許自然汗出而愈用諸法後無汗者有汗便秘者溺通逆冷者溫暖昏沉者清爽絕伏者漸出即為生兆仍灌入薑汁照前用藥脈伏絕者先用薑汁好酒各半杯熱服脈來可治或用艾湯調硫黃末三錢出汗而愈去舌苔法用薄荷水浸青布於舌上洗淨後用生薑切片蘸水時時刮之其苔自退再用薄荷搗浸涼水時時噙漱以免乾燥之患治鼻衄不止法用水紙搭在鼻中隨用山梔炒黑色牡蠣龍骨火煅京墨百草霜共為細末加血餘燒灰各等分用茅花汁濕蘸藥入鼻中即止如無茅花將紙捻鏽釘水濕蘸前藥末入鼻中亦妙再用茅根側柏藕汁三味搗汁磨京墨入本湯調服治陰寒呃逆不止法用乳香硫黃艾各二錢為細末用好酒一盅煎數沸乘熱氣使病人鼻嗅之外用生薑擦胸前最效灸期門法見呃逆條熨結胸法一切寒結熱結水結食結痞結痰結支結大小結胸痞氣俱用生薑搗爛如泥取渣炒熱絹包漸漸揉熨心胸脅下其痛滿豁然自愈如姜渣冷再入薑汁再炒再熨揉之以愈為效惟熱結用冷姜渣再入揉之不可炒熱看斑法一切發斑用紅紙捻油燈照看病人面部胸膛背心四肢有紅點起者乃發斑也若大紅點發於皮膚之上謂之斑小紅點行於皮膚之中不出起者謂之疹蓋疹輕而斑重也先將薑汁噴於斑上已發後照輕重陰陽寒熱虛實用藥救發狂法一切熱病發狂不可掩閉床帳務用揭開放入爽氣良久隨用銅鏡按在心胸間熱勢稍退即除若傷寒溫熱發狂渴不止者將朴硝一斤研細用水一盆將青布方圓一尺許三五塊浸於硝水中微攪半乾搭在病人胸堂並後心上頻易冷者搭之如得睡汗乃愈一切發狂奔走勢不可遏須於病人處生火一盆用醋一碗傾於火上其煙衝入病人鼻內仍將薑汁噴於病人頭面身體手足即安方可察其陽狂陰躁用藥治吐舌不收法舌出不收用麻黃湯洗淨將冰片牛黃麝香研末點舌上即收治大頭傷寒法用芙蓉葉桑葉車前赤小豆白蘞白及大黃黃連黃柏白芷雄黃朴硝各等分為末用蜜水調掃腫處治咽喉腫痛法用青黛一錢白硼五分寒水石一錢紫車前山豆根元明粉朴硝各一錢冰片一分為極細末竹管吹喉中入至病處
