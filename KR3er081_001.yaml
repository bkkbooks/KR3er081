front:
  text: 自序餘年十二先母周夫人見背先君子君輔公杜門讀書道義自許口不道阿堵字以故家貧甚嘗寄食子佩舅氏家舅氏撫教有加焉於時明發有懷因思生戚往往大病每於誦讀之暇間覽方書先君子遂謂小子曰汝有意於此乎古人不得為良相每願為良醫蓋良相良醫其功正相等耳果能精之則可以自療並可以療人亦內典所謂自利利他之道也豫拜訓之下深謝不敏長而遭滄桑之變寄跡於穹隆之陽人有疾者按方加減與之所投輒效因而叩戶求方者殆無虛晷竊思古人陳案雖各臻其妙然論多方雜未易窺測不免楊朱之嘆故於晨窗夕幾究心靈素博涉群書斟酌盡善成山居述四卷有論有方有經有變頗備苦心但力綿不克就梓久置庋閣今年春偶公遜叔過齊頭見而閲之謂曰汝有此而不與人共之不亦同於懷寶迷拜者乎且汝先子之言具在顧其忘諸豫蓋唯唯謝不敏長夏無事因於山居述中簡其要者為主方隨症加減一症一方以見其常加減附論以通其變編為俚句名曰說約庶幾學岐黃者得會歸之源去煩苦之失耳若曰從此活人功與調元者等則豫豈敢康熙二年夏四月古吳自了漢蔣示吉仲芳氏識
