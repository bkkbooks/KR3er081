body:
  text: 卷之一中風人覺大指次指麻木不仁或肌肉微掣即為中風先兆西北地寒風浩蕩或中腑兮或中臟或中血脈或中經善行數變難名狀卒倒外症仆地不知人痰塞喉間命欲喪東南地濕類中風證候相同治須當腑中風邪著四肢惡寒拘急脈浮遲中臟唇緩滯九竅鼻塞便閉不語時若中血脈口眼歪又有中經亦要知六經無症溺調和口不能言肢不持古人曾作真風治三家妙論亦須思東垣人名大率主氣虛河間人名腎虛兼火治丹溪人名主濕內生痰總是類中分明注治之先用開關法皂牙皂去皮弦二兩細辛半夏藜蘆各三錢俱為末再加麝香吹鼻中有嚏則生無難活醒後投之三合湯茯苓陳皮甘草半夏應相當南星瓜蔞當歸桔梗黃芩黃連白術竹瀝薑汁一匙共一湯左癱屬血右瘓屬氣血虛加白芍川芎生地四物恐泥痰用薑汁炒瘀血桃仁與紅花瘀血證小便利大便黑或腹中塊痛氣虛人參黃耆也同劑盜汗遺尿亦如之小便不利不可利殭蠶全蠍閉塞加鉤藤善治牙關閉肥人烏附少許以引經烏頭附子童便煮用氣實人參亦要忌右寸有力去參恐補住痰涎於經絡風盛自汗身體痛防風羌活並薄桂頭目不利或頭痛川芎白芷蔓荊細辛荊芥穗無汗身疼加白芷羌活川芎防風蒼朮秦艽配心血虧欠神恍惚茯苓遠志菖蒲入或心動搖驚悸者酸棗仁竹茹辰砂益風痰熾盛須膽星防風枳實牙皂瓜蔞仁食傷神曲麥芽山楂枳實便祕還須三花行大便結用三化湯厚朴大黃枳實羌活等分每服一兩微利之示吉曰東南類中風者多故從火痰氣而治實有神驗若果系風邪外中六經形症具者原宜先服小續命湯解表便祕者三化湯通滯之後方用本湯調理更為切當至於治口眼歪斜方法固多不如瀉頰車地倉二穴歪左針右歪右針左病可立愈傷風頭痛發熱鼻不通惡風自汗號傷風脈來浮緩兼無力參蘇飲服自然松人參紫蘇及枳殼桔梗乾葛前胡同陳皮茯苓甘草半夏木香少許棗薑攻以下加減咳嗽去參加桑皮杏仁去皮尖打碎內有痰熱黃芩進痰唾如膠金沸草胸滿痰多瓜蔞貝母順冬月自汗桂枝添若還無汗麻黃令傷食厚朴神曲麥芽中酒白蔻烏梅信頭痛羌活川芎不可無氣喘杏仁蘇子亦莫剩示吉曰人之易於傷風者其故有二一因元氣虛乏氣不衛外風乘虛入治宜參耆益氣而佐以散邪一因素有鬱熱在內毛竅常開邪風易入治宜芩連清火而佐以疏風此皆氣虛鬱熱為本風為標也治本則標自愈中寒中寒傷寒殊非一傷寒科在後傷則漸深中直入初起怖冷四肢寒無熱不渴身戰栗脈來無力又沉遲加味理中湯有益人參白術甘草並乾薑加桂陳皮功妙極寒甚附子及吳萸鹽炒附童便煮茯苓半夏吐有力生薑煎就須冷服伏其所主先其所因也無脈豬膽一匙麝香半分吃泄瀉不止加黃耆升麻薑汁三匙嘔吐入舌卷囊縮指甲青脈絶蒸臍不可忽蒸臍法用麝香半夏皂夾末一匙填實臍中後用生薑片貼於臍上放大艾火於薑片灸二七壯灸關元氣海各二七壯熱通於中逼寒出外手足溫暖則生一用硫黃麝香末填臍中放蔥餅於臍上以尉斗盛火於蔥餅上尉之如餅爛再換一枚蔥餅用蔥頭一握切去葉留白根約寸許連敷四五餅應用暑病暑天病熱名暑證腹痛吐瀉冒暑病頭痛身熱躁不寧身如針刺傷暑應寒熱自汗出不止咳嗽倦怠為中暑脈虛身熱為暑證動而得之病屬陽加味香薷湯可止香蕾麥冬五味茯苓甘草陳皮厚朴扁豆木瓜次第尋黃連燈心生薑大棗服氣虛人參白術共黃耆靈寒熱柴胡黃芩為要藥嘔吐藿香半夏法為精瀉合澤瀉豬苓真妙訣去麥味渴用知母花粉藥如神綿綿腹痛傷冰冷乾薑滑石法從心去連麥味小水不利或短赤澤瀉山梔並滑石搐搦加羌活號暑風胸滿枳實檳榔消食積自汗不止用參耆水瀉白術木通澤瀉有益頭痛川芎並石膏痰悶瓜蔞及枳實以上陽證治法若居涼館善風涼頭痛惡寒頭項強身形拘急熱無汗靜而得之陰寒傷此因暑致病宜服羌活並蒼朮厚朴乾葛及藿香紫蘇等分薑三片水煎熱服號升陽湯名兼食神麯滑石妙內傷冰冷用炮薑示吉曰夏至一陰生人內寒而外熱若過食冰冷及連薷益元寒涼之劑遂至寒積於中而成內傷寒證凡吐瀉而腹痛無休歇脈來遲緩者是也治宜理中湯合平胃散溫之寒甚加附子如誤投香薷飲則危矣注夏溫熱蒸人夏日長氣虛體弱熱因傷胸中氣促四肢倦心煩食少不如常好臥口乾或泄瀉治用清暑益氣湯黃耆升麻與蒼朮各一錢人參白術陳皮神曲澤瀉黃柏酒炒麥冬青皮及當歸乾葛三分各三分五味九粒甘草水煎引薑棗盜汗還加浮小麥便赤滑石並山梔渴甚天花粉烏梅食去蒼朮頭痛川芎石膏好嗽加石膏杏仁升麻蒼術出木香砂仁胸不寬瀉加肉蔻茯苓的去麥歸濕東南之地恆多濕居民感受病非一或行涉水雨露蒸或過飲冷因而得小便短赤身體重骨肉痠麻行不疾漸加浮腫及身黃燥土滲濕湯可識茯苓香附半夏陳皮厚朴澤瀉豬苓蒼白朮引用砂仁並薑棗臨服半匙鹽可入外濕寒熱身腫痛羌活防風木通加有益內濕胸滿兼嘔吐喘脹腹膨用枳實黃連山楂炒卜子溺閉木通車前力濕熱發黃仗茵陳山梔車前兼滑石示吉曰治濕大法在表在上者開鬼門用麻黃防風輩微汗是也在裡在下者潔淨府用五苓輩利小便是也丹溪云濕得燥則豁然而收用蒼朮是也濕從風散用羌獨活類是也濕久則生熱用黃連山梔是也從此而變通之諒能活人但麻黃只可用二三分蓋汗多恐生變症耳火相火命門君火心二火一水不相均惟腎屬水經所謂一水不勝二火五臟氣升皆是火氣有餘便是火妄動須知爍至陰經所謂一水不勝五火也古人調治非一法一一從頭説與君心火亢極陽強病人壯氣實咸令進癲狂便閉用朴硝大黃大承氣湯朴硝大黃枳實厚朴水煎服大便如常芩連應黃連解毒湯黃芩黃連黃柏山梔烏梅水煎服治火熱錯語呻吟不眠煩躁脈數乾嘔實火可瀉從上方隨經調治須臾定飲食勞倦身發熱元氣不足內傷證補中益氣味甘溫陽虛之火功偏勝補中益氣湯人參黃耆當歸白朮陳皮甘草升麻柴胡生薑大棗水煎服相火熾盛以乘陰朝涼暮熱血虛成陰中之火甘寒降知柏四物法通靈四物湯當歸生地芍藥川芎加黃柏知母二味鹽酒炒腎水受傷陰虛病面紅耳熱浮火盛左尺洪數無根火柏龜六味治如神六味地黃丸地黃山藥茱萸肉茯苓丹皮澤瀉蜜丸淡鹽湯送下加黃柏龜板空心服以上補虛火法胃虛過食生冷傷抑遏陽氣脾中央火鬱之證升散之升陽散火最為良升陽散火湯治五心煩熱胃脘時疼四肢乏力肌熱筋痹或骨髓中熱用升麻葛根羌獨活白芍人參各五分炙甘草生甘草柴胡各三分防風二分半水煎服忌寒涼物去獨活及生甘草加蔥即火鬱湯命門火衰陽脫病面赤煩躁虛火盛足冷脈沉陰極躁回陽救急醫中聖回陽救急湯見傷寒科陰虛發熱火旺甚脈數無力屬心腎內傷發熱乃陽虛脈大無力脾肺分氣從左起肝之火陰火還從臍下生腳下熱來侵腹者斯人虛極藥難平熱從腳起先用附子末津調貼腳心中湧泉穴引火下行後服四物降火之劑示吉按積熱論曰治火之法始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣是徒知治熱以寒而不知熱之不衰由乎真水之不足也當壯水之主以制陽光經曰寒之而熱者取之陰陰腎水也求其屬也此獨為積熱者説愚意治火除人壯氣實者便祕者火微者從正治外俱當遵此為則蓋火非水不降未有腎水足而心火熾者也益坎勝離湯實為火證之總司湯見勞瘵內傷飲食勞倦是內傷或因飢飽過行房風寒傷人名外感辨明調治病無妨人迎緊盛手背熱寒熱邪作無間歇惡寒無汗鼻不通此是外感君須別內傷之症氣口洪手心有熱微惡風寒熱間作不知味更兼氣弱語言慵內傷惡寒得暖解外感近火寒仍攻外感內傷相挾者脈症並見須辨通內傷不足急補之外感有餘瀉不同或先補養或先散先後之間無苟從治內傷法補中益氣用黃耆人參當歸白術升麻柴胡甘草與陳皮引加薑棗水煎服氣和微汗最為精救腎水虧酒炒黃柏入心養血紅花三分升麻柴胡自汗去夜間不睡加棗仁炒為末亦去升柴川芎蔓荊頭痛用口乾乾葛藥為靈巔頂痛時細辛藁本怔忡驚悸棗茯神甚者再加遠志肉柏子仁菖蒲食加神曲麥芽山楂枳實瀉添澤瀉白芍茯苓黃連枳實除胸悶有痰前胡半夏茯苓為君防己木瓜除腳弱龍骨牡蠣煅為末治遺精防風羌活白芷川芎身熱用兼風寒頭痛者加虛火知母黃柏元參火炎上者用黃芩黃連清內熱菊花熟地醫眼疼傷食後天之本屬脾胃納化飲食滋榮衛胃主納飲食不下為胃病脾主化飲食不消為脾病養生妙法節飲食脾胃受傷飲食倍胸腹飽悶並作酸噯氣惡食腹痛纍或吐瀉時下泄屁種種皆因傷食例甚則發熱與頭痛惟身不痛傷寒異有傷食類傷寒條在傷寒科左關平和右關緊香砂平胃功有濟蒼朮陳皮厚朴甘草平胃散只此四味香附砂仁木香理氣川芎枳實並藿香術薑煎服食須忌消肉山楂草果消面卜子消糯米食酒藥神曲飯食神麯與麥芽生冷瓜果薑青皮逐一加糯米索粉傷時加杏仁西瓜多吃食鹽促魚傷橄欖川椒紫蘇稻草將來消牛肉麝香能消蔬果積干葛烏梅白蔻酒傷人枳殼桔梗除胸滿挾氣烏藥檳榔寒薑益傷飲須合四苓湯飲茶湯涼水之類四苓茯苓澤瀉豬苓白朮嘔吐臨服加薑汁白朮茯苓治脾虛泄瀉車前白蔻白朮以上消導之法上部有脈下無脈其人當吐不吐卒指物探吐是良方否則爪蒂散有力瓜蒂赤小豆為末溫水調下一錢吐之食積鬱久成濕熱黃芩黃連大黃不可缺再入白朮並澤瀉去藿香砂仁蒼朮訣胃中停滯生冷物心腹急痛人暴卒大黃乾薑巴豆肉等分為末名備急蜜丸豆大服三丸或吐或瀉痛自息以上下食積法按丹溪曰明知身受寒氣口吃寒物初得之宜溫散溫利稍久則成郁郁久則成熱熱久則生火若仍用溫藥寧不助火添病乎宜用辛涼以發表辛寒以理中邪易伏而病易退也至東垣則有輕則損其谷重則逐其滯之論蓋少壯新病宜推逐急去為美如老人久病又宜導化漸去為佳也二公之旨真消導法中口訣故特拈出調理脾胃至哉坤元調脾胃萬物資生無病纍胃陽納受是所司脾陰消化精神遂飲食自倍脾胃傷潔古枳朮丸為最白朮八兩將土炒四兩枳實麩皮炒為末子荷葉包米煨飯丸一補一瀉方真好半夏陳皮消痰用理氣香附砂仁不可少元氣素弱脾不磨食多腹內即不和加入木香炒陳曲白芍人參亦用多素有痰火鬱胸膈咽酸噯氣並酒積炒山梔黃連白芍川芎陳皮砂仁木香茯苓入胃強脾弱人好食食後反飽難消克黃連山梔甚石膏人參白芍甘草及按王節齋曰凡治諸病若見胸膈飽悶或噫氣咽酸腹痛泄瀉惡食少食等症便問曾問飲食審明傷積即先調理脾胃消導飲食然後用本病之藥或於本病藥內佐以消導若不審此藥雖對症而無效也蓋藥先入於胃脾胃自傷不能運化藥味以成功耳同志者審之酒客病病因於酒則歸酒氣味俱陽熱性有無形元氣受他傷上下分消不可久宜微汗利小便切不可用下法久則病深變症多先賢著論須尋究葛花解酲湯妙藥白蔻砂仁葛花著如無花以乾葛根代之各五錢澤瀉炮薑神麯白術各一錢豬苓茯苓陳皮人參約各一錢五分木香青皮各五分共為末調下三錢病可卻六郁滯而不通病名郁濕火氣血痰與食六郁之症發東垣五郁之旨出岐伯丹溪製成越鞠丸總解諸郁有功績香附醋炒蒼朮及撫芎神麯山梔宜炒黑水丸豆大服百丸等分為末隨症加藥病如失寒熱頭痛胸膈痛耳聾目暗脈沉澀氣鬱木香烏藥加砂仁青皮薄桂及濕鬱周身骨節痛陰寒則發肢無力脈來沉細白芷茯苓咳嗽氣急為痰鬱手足麻木脈滑沉痰塊堅硬咯不出須加瓜蔞桔杏仁南星半夏及海石火鬱口苦五心煩頭目惺惺目昏黑小便赤澀脈沉數黃連青黛功奇特午後發熱為血鬱小腹痛處移不得脈來沉澀或芤結上下失血桃仁紅花入噯氣作酸為食鬱遇食作痛不思食胸腹飽悶面色黃枳實針砂散砂沉緊脈右關沉緊春加防風夏苦參秋冬吳萸用有益氣捍衛沖和之謂氣妄動變常火之例局方燥熱與辛香以火濟火有何利冷生氣者出高陽人名高陽生冷生氣誤言也氣多是火丹溪意上工調治辨虛實虛者右手脈無力懶言氣短身倦怠胸中虛滿不思食塞因塞用六君子人參白朮茯苓甘草半夏陳皮薑棗煎服補中益氣亦有力滯氣實者脈洪實憂愁忿怒因而得胸脅脹滿噫不通吐酸噁心心鬱抑種種氣滯若何醫分心氣飲最相宜木通半夏桂枝赤芍茯苓各三錢半蘇梗二兩羌活桑皮青皮陳皮腹皮各五錢甘草木香引薑棗檳榔香附枳殼胸滿奇脅痛川芎柴胡為要藥痛居小腹用吳萸氣滯氣虛言補劑六君兼用功誠異性急加柴胡熱用黃芩女人烏藥香附原有利氣滯腰痛枳殼木瓜翻胃沉香磨順氣示吉曰治氣補虛實瀉是正治也若虛實相兼宜一補一瀉古人亦有定法至虛中實實中虛切宜細察假如人老病久脈虛人弱虛也倘投補藥而不效須察其胸腹之間有無痛處及噯氣作酸否若有之輕者用消導之品重者及大便實者用酒製大便一二錢微利之後用補藥無不驗矣譬之加染舊衣必先洗其垢後加顏色也然乎痰百病怪病皆痰甚脾胃虛弱濕不滲濕熱相蒸遂生痰遊行到處皆成病實脾燥濕是良方因痰生於脾胃也降火順氣能接命痰隨氣升善治痰者先治氣氣升屬火善治氣者先降火古人總用二陳湯隨病加減如神應茯苓半夏及陳皮甘草四味生薑進有火山梔黃芩次第添不愈加黃連降氣蘇子枳殼從容順頭痛鼻塞是挾風紫蘇羌活防風不可聽面紅嗽喘咯不出卒倒痰涎為癇痓熱痰因用青黛黃芩黃連瓜蔞花粉功奇特身重倦怠名挾濕面目浮腫氣喘急脈來濡滑為濕痰燥濕健脾蒼白朮吐咯不出痰硬極動則氣喘名挾郁右脈沉滑左手平南星瓜蔞貝母香附兼海石嘔吐噁心胸痞塞遇寒則甚滑遲脈乾薑肉桂治寒痰再加二術從來的卒倒仆地不知人角弓反張風痰立南星白附及天麻殭蠶牙皂兼薑汁竹瀝噁心嘔吐口咽酸胸膈飽悶為挾食右關緊滑名食痰平胃相兼神曲麥芽入氣虛須合四君湯血虛四物薑汁益脅痰白芥子青皮痰滯經絡須竹瀝薑汁示吉曰濕痰寒痰痰飲痰涎二陳實是主劑若久而不治兩寸堅滑名老痰根深固結致肺胃二脈伏結者名結痰膠黏固結消吐不盡六脈澀滯名頑痰痰隨火上升為狂為癇名火痰此四者非二陳所司也宜節齋化痰丸清金降火緩治效速用天冬去心黃芩酒炒炒海粉瓜蔞仁橘紅各一兩桔梗香附鹽水炒連翹各五錢青黛朴硝各三錢為細末煉蜜入薑汁為丸如龍眼大或噙化或白湯化下或細丸和黍米大薑湯送下亦可咳嗽咳嗽當分二症奇有聲無痰咳症醫有痰無聲名曰嗽嗽屬脾家痰濕欺咳為肺經邪氣盛風寒火濕亦因虛主治當宜用保和方名杏仁花粉紫蘇桔梗及前胡黃芩山梔清火寬中枳殼半夏茯苓消痰甘草橘紅多引用生薑同燈草飲時食後起沉疴風痰再添南星竹瀝薑汁肺實桑皮葶藶不可無右寸浮洪有力或氣急喘甚若還風嗽聲難轉麻黃用三分石膏用一兩是真途清晨嗽多肺火動天冬麥冬在所用上午嗽者胃火伏知母石膏病自中下午嗽多屬血虛宜補陰四物湯加知柏二冬火浮於肺黃昏重黃昏嗽多不宜涼藥宜人參五味瓜蔞白朮之類春嗽白芍川芎柴胡加入夏宜清火麥冬得秋用桑皮防風冬解表麻黃防風桂枝半夏乾薑悉以上治有聲有痰咳嗽相兼者嘔吐痰涎無聲者二陳平胃治之則再合枳實白術功誠妙茯苓半夏陳皮甘草蒼朮厚朴白朮枳實薑汁臨服不可忽以上治有痰無聲者乾咳久嗽用滋陰內熱無痰最害人四物湯將為主劑再添知母黃柏鹽酒炒及元參燈心甘草和諸藥桔梗天花火用黃芩酒炒貝母茯苓清痰用二冬款冬枇杷葉潤燥行血見再加沙參丹皮紫菀肺傷因用白及黃耆人參酸收訶子五味瀉桑皮枳殼辛散防風生薑問好音面紅吐血火炎上童尿藕汁最為靈示吉曰治咳嗽大法新者大約屬痰食風寒宜瀉宜散久者大抵屬勞火陰虛宜補宜收然新者易治久者難醫豫制噙化丸治久嗽乾咳無出其右不敢自祕謹傳於世用川貝母花粉款冬花陳香櫞各二兩訶子薄荷葉各一兩為極細末再用天冬麥冬去心紫菀元參各二兩桔梗甘草各一兩五味子烏梅肉各五錢柿餅四兩煎湯去渣再入梨汁蘿蔔汁各一碗飴糖二兩元明粉五錢薑汁三錢煎成膏子為丸丸如雞豆大每噙一丸化盡咽下再噙使藥力不斷神效難述喘肺主清高無寒窒一有邪干便喘急風寒痰火各不同醫家心法辨虛實內因痰火外風寒六脈浮洪更有力是為實證五虎湯麻黃石膏甘草益細辛半夏及桑皮杏仁枳殼再加入引用蔥薑徐徐服隨症加減方為的若有痰升痰喘證茯苓香附南星正相應乍進乍退名火喘黃芩山梔麥冬五味蘇子並食後作喘食積來神曲麥芽山楂枳實腹皮進大便燥結不能通元明粉兼蘇子勝結甚加大黃何者為虛正氣虛遇勞則發似邪欺呼吸短氣脈無力補中益氣法精奇黃芩山梔兼火用茯苓半夏挾痰宜挾食山楂腹皮枳實氣高而喘是良醫哮附嗆症喉中為甚水雞聲哮證原來痰病侵若得吐痰併發散遠離厚味藥方靈白果二十一個去殼切碎炒黃麻黃蘇子各二錢黃芩一錢五分款冬半夏各三錢且為君桑皮杏仁皆錢半三碗水煎二碗存食後徐徐溫咽下更能定喘法如神示吉曰喘為惡候哮為痼疾自古難之然猶易明也更有嗆症最為利害不可不知蓋人喉間有二管一軟一硬軟者連胃而無底通有形之水穀上入下出名曰食喉硬者連肺而有底只通呼吸之氣元門謂之十二重樓名曰氣喉若有形之物誤入氣喉惟其有底不能下出必從上嗆出而後止若嗆有形中之無形者如酸醋鹽水之類尚有方法可治若嗆有形之易碎者如粥飯之類尤易嗆出若嗆有形中之堅硬者如瓜子生豆之類上不出下不降必死無疑也醋嗆哮嗽用甘草二兩每段切二寸長兩半劈開用豬膽汁五枚浸三日火炙為末蜜丸茶清吞下二錢臨臥服食鹽哮嗽方用白麵砂糖各二錢糖餅灰汁捻作餅子爐內燥熱剗出加輕粉四錢另炒將餅切為四掗摻輕粉在內令病者吃盡吐出病根瘧寒熱往來名曰瘧正氣與邪相擊搏風寒暑濕食與痰亦有陰虛兼氣弱陽分日發邪氣輕陰分深兮應間作在氣分早臨血晏臨於陽為熱寒為陰並則寒熱離則止暑風邪氣與榮衛並行則病作離則病止榮衛邪氣並相爭邪不勝正移時早為輕正不勝邪移晚行病重治法要分有無汗無汗散邪藥為君有汗正氣藥為主更看新久再評論新者宜瀉宜發散久者補氣及滋陰無痰無食不成瘧初起清脾飲最靈草果柴胡並厚朴陳皮半夏及黃芩茯苓白朮青皮醋炒甘草生薑並用檳陰陽水煎露一夜清晨溫服效如神自汗去半夏加知母黑豆無汗加蒼術乾葛精多熱黃芩知母加倍用多寒薄桂定須增頭痛羌活川芎白芷要藥煩渴不眠葛粉親夏月香薷並扁豆冬天無汗麻黃尋寒甚加桂枝自汗去麻黃加桂枝芍藥此治新瘧有餘證若還虛久再酌斟日久自汗精神倦六脈微細更無神氣短懶言不思食夜間盜汗又來勤人參黃耆用補氣歸芍鱉甲醋炙好滋陰除出果檳及厚朴棗薑為引定功成若欲截兮藥如何實是常山檳榔最多青皮烏梅真妙藥丁香少許酒煎過或井河水各半煎或酒水各半煎夜裡露時清晨飲是日絶食去沉疴瘧母恆居左脅間瘧後脅下生塊名瘧母令人多汗脅疼連藥宜消導何為好鱉甲三稜蓬術香附四般醋煮停勻加海粉青皮桃仁神曲麥芽與紅花藍為末糊丸日三服病常漸去不為難霍亂霍亂之症起倉卒外有外感內有積胃中停蓄難運消吐瀉交作腹痛極上焦但吐而不利下焦但瀉無吐逆中焦吐瀉兩相兼偏陽多熱偏陰寒吐利得盡陰陽順其間死者終稀焉治用加減正氣散藿香紫蘇陳皮全厚朴茯苓並半夏桔梗腹皮蒼朮先白芷甘草砂仁末生薑大棗水來煎紅花木瓜轉筋用山楂麥芽神曲傷食兼腹痛須加炒芍藥寒痛加炮薑肉桂似仙枳實青皮心下痞柴胡乾葛寒熱纏小便不利澤瀉豬苓效中暑發熱黃連香薷傳轉筋入腹痛欲死蓼湯熏洗病可止千金方有外治法男挽其陰女牽乳手足厥冷脈將絶鹽納臍中艾炷接火灸人醒後酌方細看陰陽及寒熱又有一種乾霍亂腹痛欲死病勢悍不吐不瀉㽱腸痧鹽水吐之神妙案三因吐法用鹽二兩放刀上炷赤將井河水各一斤和勻用鹽淬入水內頻飲探吐之後用藥調理但得吐瀉病無妨熱湯米湯不可按誤食熱米湯則死外治曲池刺青筋委中出血亦有干示吉按古人之論霍亂多責於暑故此疾多生於夏秋即冬月有之亦原伏暑而然是以脈雖虛小手足微冷不可輕用薑桂熱藥況霍亂之脈沉伏者多理宜正氣散合香薷飲之類治之此言一出活人不少但夏月之病寒熱不同投治大異苟不具婆人審問鮮有不夭人者何則假如病人的系日中勞役動而得之其為熱也無疑若雖從日中得之於時又多食冰水冷物或從冷水中浴來是又冷熱兼雜矣倘不從日中勞役暑氣高徵肉食與冷寒齊進冷館兼大扇清涼陽氣退藏陰寒填塞不用桂附何以活人故先哲升陽湯冷香飲子非無故而發也泄瀉水穀為瀉泄瀉之原有六節虛濕寒痰食與熱五泄之名內經傳溏泄利滑洞五泄三虛之旨先賢説飲食傷脾脾虛不能運化色欲傷腎腎虛不能用藏忿怒傷肝肝虛木來剋土健脾利水是主方燥濕升提不可缺或用風藥或溫補或因虛滑宜收澀總用健脾滲濕方二術伏龍肝炒車前茯苓訣厚朴豬苓與木通澤瀉陳皮甘草木香列煨薑三片少許鹽酒積白蔻葛根截濕泄泄水腹不痛小便不利腸鳴動倍二術加桂枝少許食泄腹痛泄後減噫酸臭腐食不用加山楂香附枳實砂仁神麯麥芽後重加檳榔寒泄脈遲穀不化腹痛悠悠無休罷加炮薑肉蔻火瀉腸鳴下黃赤一陳痛來瀉可怖肛門焦痛脈數急黃芩黃連薑汁炒山梔真好許去蒼朮虛泄虛滿不思食水穀食時完不化脈來沉細久不痊人參山藥砂仁挂痰泄泄痰浮水面泄下沉者是積浮者是痰或多或少脈滑善半夏南星法必添吐出痰涎人更便六證從容審問明更分新久醫方驗新者宜瀉宜消食久者升提溫補益泄久下陷用升提升麻柴胡更有力虛甚人參白芍山藥虛寒炮薑肉果吃腎虛送下四神丸故紙酒浸炒四兩吳萸炮炒一兩肉果麵裹煨二兩五味子二兩為末生薑半斤同大棗一百枚煮爛取棗肉為丸每服一錢五分鹽湯送下防風羌活兼風入暑月香薷滑石扁豆尋冬天炮薑誠有得虛泄久泄更有方一匙黃土炒為末臨服食痢痢疾原來下膿血裡急後重不可説食積氣滯總相兼慎辨青黃赤白黑純白而來氣必傷血受病兮應是赤氣血俱傷赤白來食積為黃是真的純血來者亦如之黑者須知死血色白膿稠黏是為痰宛如豆汁方屬濕諸痢下迫皆屬火勿妄以白為寒測通因通用其經文食積瀉濕和蕩滌後重須教調氣除清血便膿應自息通滯湯兮治法傳條芩厚朴薑炒入蘇梗檳榔共木通胸中不寬陳皮枳殼立熱用黃連薑汁炒痛木香後重將軍不可忽小水不利加滑石車前臨服木香磨薑汁頭痛惡寒身體熱蒼朮防風羌活干葛接名風邪痢噁心作酸胸滿悶枳實山楂神曲麥芽呷名食積痢內傷痢疾小腹痛桃仁紅花能治紫黑血腹中不痛身不熱大孔迫甚黃水泄氣鬱為痢用升麻柴胡防風不可缺煩渴身熱腹痛極水穀入胃即吐噦噤口痢疾胃熱甚倉米人參蓮肉悅酒積痢因恣飲酒葛根白蔻烏梅烈天行疫痢老幼傳令用敗毒無他説夏月香薷扁豆增腸澼銀花血自竭隨症加減是良工再看新久醫中傑新者宜下宜消克久者宜升宜補益諸痢日久減檳榔加入扁豆白芍白朮補脾山藥及茯苓下陷升麻柴胡得日久氣虛人參黃耆用紅久血虛當歸白芍力血痢不止用阿膠荊芥蒲黃同炒黑薑灰從治加少許若還不止血餘頭髮燒灰用益痢久不止人虛極按腹不痛無食積四君四物隨證添訶子粟殼且行澀如石榴皮肉果烏梅俱收澀藥脈來遲緩是為寒炮薑肉桂肉蔻績芩連禁用治噤口痢將田螺搗爛入麝香一分納臍中引下其熱內用黃連一錢人參三分煎湯終日呷之一口下咽即愈毛公威傳痢病神驗方用真川連一兩五錢吳茱萸湯拌炒白朮五錢半土炒蒼朮米泔水浸炒四錢五分白芍酒炒二兩當歸二兩蓮肉炒四錢山楂肉八錢木香不見火二兩肉豆蔻麵包煨五錢四分麥芽炒三錢五分神麯五錢五分枳殼麩皮炒去麩二錢五分上共為極細末每服一錢二分壯實者一錢五分小兒三五七九分看人大小用白痢白湯下赤痢蜜三匙和白湯下赤白相兼燈心湯下水瀉清米湯下俱空心服忌一切葷腥麵食椒酒煎炒生冷等物按此方投之虛弱之人及痢久者甚為穩當若壯盛初起腹痛甚及積滯勝者祕方白丸子奇效用皂礬揀淨一兩入白蘿蔔汁一盅銅勺內火上化開再入好真粉一兩五錢和勻取起曬乾為末用神麯打糊為丸每服五分壯實者七分赤痢燈心湯下白痢薑湯下白瀉米湯下服後瀉出黑積藥即行矣積聚癥瘕積聚皆有塊食積痰血成其類積為食積有成形忽聚忽散聚為貴榮衛失序七情傷脾不運化神憔悴五積為陰五臟生六聚為陽六腑贅主治總宜化堅湯當歸白朮為前隊半夏陳皮枳實兼山楂香附砂仁對厚朴木香等分煎生薑一片功方遂右脅有塊青皮三稜蓬術左脅有塊川芎桃仁桂枝肉食成塊草果連粉面食積神曲卜子貴痰塊在中海石加瓜蔞白茯檳榔碎壯健人加檳三稜蓬術瘦弱人參少許配瘧後柴胡鱉甲青皮如要丸時加阿魏外治尉法有神功五仙消痞痞能潰痞塊外治祕法用小鱉一個紅莧菜二兩貫衆五錢阿魏二錢蔥蜜各一兩共搗為膏再入麝香三分貼在痞上外用青布罨著內服消痞煎藥神效五仙膏用大黃肥皂生薑生蔥大蒜各半斤共搗爛用水煎取汁去渣再煎成膏黑色為度攤絹帛上先用針刺患處後貼膏藥痞滿從來痞滿無痛塊胸滿虛悶難通泰皆由土弱失運行濕熱食痰多作怪半補半瀉是奇方白朮茯苓為主賽枳實厚朴及甘草陳皮木香香附砂仁在蘇梗檳榔炒卜子引用生薑大棗功難載脈遲加入炮乾薑脈數黃連薑汁炒方有賴傷酒須添葛根白蔻澤瀉山楂曲麥芽治食積小便不利加澤瀉木通大便結時將軍入按痞痛甚用大黃脈來無力人參黃耆益示吉按仲景云滿而不痛為痞滿而痛為結結責之實實為積滯有餘則宜下宜消痞責之虛虛為中氣不足則宜和宜補據此虛實兩分又何必袞同消補但人有脾氣素虛現停積滯補之則積滯未消邪得補而愈甚消之則脾氣未健土受傷而愈虛不得不從易老講一補一瀉之法矣許學士云邪之所湊其氣必虛留而不去其病則實斯言信然嘔吐乾嘔有聲吐有物聲物俱有嘔之則吐輕嘔重乾嘔凶嘔乃漸出吐頓出不嘔不吐為噁心總是胃虛不能食有寒有熱亦有痰有因停水因食積或因氣滯或氣虛加減平胃病自息半夏陳皮共藿香厚朴香附及蒼朮枳殼桔梗引木通砂仁炒為末一匙薑汁臨服入煩渴欲飲脈來數黃連竹茹山梔落去蒼朮吐水冷涎脈沉遲炮薑肉桂吳萸作嘔吐痰沫脈滑時南星白茯云術索水停心下汩汩聲茯苓澤瀉豬苓藥飽悶作酸惡食氣右關緊盛傷食例神麯麥芽並檳榔草果山楂肉傷利面傷加卜子久病之後不納食脈來無力又微細人參黃耆白朮並茯苓枳殼桔梗厚朴三味去胸膈抑鬱善噫氣忿怒憂愁不快意檳榔卜子大腹皮升散升麻防風具傷酒乾葛澤瀉白蔻佳傷風紫蘇乾葛易噎膈反胃噎膈之證多因火熏蒸津液成痰阻七情妄動五臟傷陰血漸稿無生所咽喉痛塞不能食病起賁門上焦膈中膈飲食得水行食不半日又吐出下膈飲食如平人朝食暮吐渾無力主治加味二陳湯茯苓半夏甘草陳皮立黃連山梔青竹茹藿香厚朴木通的桔梗香附共砂仁臨服一題加薑汁韭汁童便次第增痰泥中焦須竹瀝合用四物薑汁炒血虛左脈來微澀氣虛須合四君湯右脈芤弱並無力痰飲寸關脈滑沉瓜蔞貝母能開膈脈來數盛是火炎萸炒黃連倍用的脈來芤澀是血瘀桃仁歸尾韭菜汁寸關沉澀是氣結沉香木香檳榔入大便燥結不通行酒蒸大黃合四物再加桃杏仁麻仁炒為末蘇子瓜蔞仁之類潤之養血潤燥牛羊乳寒痰泥膈吳萸覓脾不磨者神曲麥芽同七情鬱結成氣噎寸關沉澀七氣湯乾薑黃芩肉桂得半夏橘紅並熟地甘草芍藥各二兩桔梗吃三兩枳實五枚人參一兩氣病投之噎自息示吉曰噎膈重病也其原非忿怒抑鬱即憂愁思慮其來有漸始則痞滿火嘈吞酸不知治療既而逢食則噎尤可少食久則食下則吐或粒不下咽當此之時三陽熱結精血枯稿若欲求愈須病者安心靜養行仙家十六字法一吸便提氣氣歸臍一提便咽水火相見如此行之再加之以薄滋味勤藥餌愈病不難仙家云屋破修容易藥枯生不難也張雞峰曰噎當是神思間病惟內觀自養可以治之此言深中玄旨若欲速效而投香燥之劑其害不可言也開膈下食方惟元明粉三錢硼砂三錢為末每服三錢用火酒一杯薑汁半杯共入勺內煎二三滾取出澄清用小酒杯徐徐服之自覺臍下溫熱即得飲食矣然亦為劫劑服後即投大補較之香燥稍善也此方乃毛公威先生所傳厄逆俗名打厄名厄逆才發咽喉則據寂連續數聲軋軋然短促不長難消息有痰有火有停水有寒有氣有食積主治丁香柿蒂湯丁香柿蒂竹茹陳皮當本方四味茹柿苦寒治下焦之逆氣丁陳辛溫理中氣之痞塞中下焦之概藥也飲食太過胸中滿神曲麥芽枳實及檳榔痰涎壅塞脈來滑茯苓半夏木香方水停心下汩汩聲白朮茯苓豬苓澤瀉尋發熱煩渴脈來數柴胡半夏白芍黃芩去丁香滯氣盈兮腹胸滿砂仁木香半夏存胃中虛冷脈來遲乾薑肉桂附子白術相親虛來虛甚全無力六君合用始為精六君子人參茯苓半夏白朮甘草陳皮諸厄不止用沉香薑汁磨成臨服行若還病久厄逆作虛極從來證最忌六君合用沉香木香寒甚還同炮薑肉桂落本湯去竹茹古人嗅法有奇方期門灸法亦當學倘然大便結成行須用將軍無推卻嗅法用乳香硫黃艾各三錢為末好酒一盅煎數沸乘熱使病人鼻嗅之外用搗薑渣擦胸前亦好灸期門法婦人屈乳頭向下盡處骨間動脈是穴男女乳小者以手一指為率陷中動脈是穴男左女右灸三五壯噯氣胃納水穀脾運化榮衛周流無驚詫緣何噯氣氣上升胃中濕熱痰食話丹溪主治星半湯南星山梔共半夏石膏煨香附及茯苓甘草陳皮生薑助食積神曲麥芽檳榔枳實氣滯砂仁木香及口渴煩悶薑汁炒黃連虛甚人參白芍白朮若還寒氣脈微遲或傷生冷並寒物除去山梔及石膏加入炮薑木香益益智茴香及厚朴隨症加減病如失吞酸吐酸飲食入胃脾不運濕熱相蒸為酸病如穀食在器濕熱而易為酸也吐出酸水為吐酸吐咯不出吞酸應若還不治漸噁心翻胃噎膈須臾進丹溪加味二陳湯茯苓半夏甘草陳皮已前定黃連蒼朮及砂仁神麯香附吳萸順吞酸冬月倍吳萸夏月吐酸黃連倍甚人參白朮虛弱增枳實山楂食傷認再戒怒氣以平肝滋味薄時胃清淨嘈雜心嘈總是屬虛火火動痰生因作楚二陳湯共桔梗黃連山梔人參白術香附厚朴白芍伍煨薑棗子一同煎竹茹薑汁加皆可嘈甚不止加石膏熱多青黛亦得所郁用砂仁並撫芎便實大黃酒蒸用能救苦驚悸怔忡左寸澀血少將來合四物麥冬遠志酸棗仁竹茹烏梅炒米入終歲火嘈必夭年火能熯物真可惜水腫人之全生資水穀脾主谷兮腎水屬水旺土虛不勝水水氣泛溢浮腫局手按成窟舉手滿皮光如泡氣喘促實脾燥濕是主方利水分消真可録上腫必須兼風治開鬼門時微汗浴經曰上盛為風非風則濕氣不能自上於清陽之分下腫必須潔淨府小便利兮通水穀分消湯是祕人傳二術蒼白茯苓厚朴全豬苓澤瀉大腹皮香附砂仁枳殼兼陳皮木香磨水汁生薑燈草一同煎上腫麻黃用二三分防風方有效下浮米仁防己藥如仙米仁炒須用二三錢神曲麥芽卜子消食積葶藶桑皮治氣急利水滑石並木通發熱黃連山梔入腹脹卜子共檳榔氣陷升麻柴胡少許益虛甚人參亦可加痰多半夏原有力山梔葛根茵陳治發黃牽牛大黃治便實去白朮又有虛證更宜商朝寬暮急血虛殃合四物湯暮寬朝急氣虛證四君合用且先嘗先喘後脹加黃芩麥冬去二朮香附砂仁先脹後喘倍二術諸脹用藥忌甘溫麩麵醬鹽切莫食示吉曰分消湯治脾虛水腫土炒白朮須用三錢是有神驗但先喘後脹其病在肺非分消所司也麥冬飲治水出高原其症四肢皆腫少腹不急初起便有喘滿用麥冬五十粒去心薑汁炒糯米五十粒水煎不拘時服又祕方防耆散治肺葉脹腫蓋肺主皮毛風邪入肺不得宣通肺葉脹亦能作腫其症先眼下臥蠶紋起喘急用防風桔梗杏仁桑皮蘇子貝母各一錢黃耆三分水薑煎服又有血分證婦人先經水斷絶而後四肢腫滿小便不通此血瘀水道以通經為主宜小調經散白芷五錢沒藥官桂甘草各三錢赤芍細辛當歸延胡各一錢琥珀另研一錢麝香五分為細末每服二錢酒下以上三症病同治導司命者無忽諸鼓脹水腫鼓脹其原一皆是脾虛不運克鼓脹病重水腫輕水腫皮浮如常食四肢皆腫飲食如常其病在外故輕名雙鼓脹氣入於臟為鼓脹腹大身瘦食不入名單鼓脹病在內故重脾虛致病是總原亦有水血與食積有因氣實及氣虛上工隨症用消息實土分消是妙方二術厚朴炒枳實陳皮香附縮砂仁豬苓赤茯澤瀉的木香腹皮引生薑水煎氣急磨沉香飽悶檳榔炒卜子血膨當歸赤芍紅花丹皮嘗血臌脅滿少腹脹痛身上有紅絲紋腹有塊痛按不移大便黑色血為殃不愈加靈脂桃仁三稜蓬朮桂枝水臌小便苦心病胸腹脹急水飲傷合用五苓散祕方用大戟四兩大棗二百同煮一時去戟旋旋食棗水利為度食積鼓脹大便結小便赤澀胸悶絶牽牛卜子及檳榔三稜蓬朮亦可設氣實鼓脹因抑鬱留滯不散腹脹急大腸虛祕或吐酸脅肋痛脹及面黑合用分心氣飲見諸氣氣虛脹滿多勞役元氣虛乏真倦極短氣溏泄腹脹膨脈來微細不思食宜合補中益氣湯分條而治是良醫實脾利水為君則順氣消食為佐使清金肺制木肝從來得用黃芩麥冬之類滋補腎火以制火用知柏之類肺得清化斯有力卻鹽味以防助邪斷妄想保母氣益莫服利藥圖暫快補益真元病自息示吉曰人脾氣素虛現停水積方生臌證治斯疾者正氣足而滯氣行是為上工其次利小便尤可活人若用下藥大便利而暫取快是速斃也豫遇斯證嘗早服補氣健脾之品食後進勝金丹一錢消積利水順氣雖無速效活人已多傳以壽世勝金丹用蒼朮炒二兩厚朴薑汁炒枳實炒桃仁去皮尖炒丹皮陳皮檳榔赤茯半夏黑醜頭末木香各一兩甘草川芎各六錢為細末外用皂礬四兩五錢先用蘿蔔汁化開濾去泥土煮乾再入醋煮乾為末與前末和勻再用神麯三兩為末打糊為丸丸如緑豆大每服一錢虛人老人五分湯下並治胸膈飽悶泄瀉痢疾瘀血內傷功不盡述癆瘵腎經虛損名癆瘵朝涼暮熱病無賴五心煩熱消瘦形乾咳失血真陰壞陰常不足彥修傳朱丹溪有陰常不足陽常有餘論益坎勝離湯自在發熱面赤盜汗來消中便赤功難載脈來微數兼無力日輕夜重又喘急若日重夜輕又為內傷元氣證皆因房欲喪陰精滋陰降火病漸息當歸生地川芎白芍丹皮茯苓天麥門冬去心各一錢炒知母黃柏鹽酒炒用五分陳皮甘草同生薑大棗臨服童便竹瀝好銀胡骨皮治骨蒸黃耆白術棗仁炒為末自汗保咳嗽氣急貝母去心為末紫菀桑皮有痰貝母蔞仁子見血阿膠犀角紫苑丹皮寒熱鱉甲醋炙早脈弦加柴胡青皮從治略加炒薑灰泄瀉山藥澤瀉找去知柏歸童便盜汗浮麥堪為佐牡蠣黑豆功亦大金櫻蓮鬚主滑精再加山藥牛膝車前浮火動赤白濁加石蓮白茯燈草勞熱龜膠青蒿中嗽血沙參紫菀添衄血山梔黃芩茅根搗汁臨服加入用喉干聲啞花粉桔梗增收斂五味訶子共瀉甚減去當歸知母黃柏神曲麥芽山楂厚朴同消食示吉曰男女人之大欲存焉每致過度陰虛證多故丹溪以此立論然病名虛損亦有從陽氣不足者若因彥修之法概治虛損能免廢人乎故有反是説者謂陽生陰長只當以參耆補之滋陰之劑無益也籲一證一藥豈容偏僻參耆補陽東垣已制方治內傷元氣矣丹溪豈有誤哉是不善用丹溪者誤也失血心生血兮肝藏血隨氣而行無處缺目視舌言耳能聞手能握持足能攝緣何錯經致妄行勞傷火動從容説嘔吐血出名吐血從胃而來是真訣宜犀角地黃湯衄血皆因出鼻中痰內有血名咳血肺經有火二症來衄為輕兮咳禍烈血隨唾出各唾血痰帶血絲名咯血腎經有火妄煎熬癆瘵之症難逃越痰涎有血血從脾脾虛不攝被火欺六症皆從上竅出鮮血為新紫血瘀犀角地黃能總治犀角丹皮生地基各一錢五分赤芍當歸黃連黃芩炒酒炒各一錢茅根搗汁磨墨奇吐血阿膠天冬用衄血麥冬梔子炒黑依咯唾黃柏知母並熟地麥冬山梔加亦宜紫黑血塊胸中塞酒蒸大黃並韭汁藕節搗汁最行瘀浮火上升童便入咳嗽沙參天麥冬痰多貝母天花力口渴知母五味麥冬寒熱青蒿鱉甲立脾虛泄瀉去當歸黃芩茯苓山藥甘草陳皮入從治略加炒薑灰還同童便一齊吃若還不止用蒲黃側柏荊芥俱炒黑脈來微緩更無神血不藏攝虛之則阿膠加入八珍湯四君四物合用黃芩黃連犀角不可食如有內熱加童便半杯薑灰少許褚澄云乾咳出血若服童便百不一死服寒涼百不一生宜童便一物飲之小便尿血為溺血心與小腸邪熱結清心蓮子見淋證合本湯莖中疼痛湯澆雪倘然不痛是為虛養肝固榮加減截不止荊芥及蒲黃俱炒黑補中益氣升提絶下血雖從大腸來其原不一費心裁有鮮有瘀有遠近糞前血為近血糞後血為遠血有因血熱有氣衰或為腸風下清血而色鮮或臟毒下血色濁者是下陷風邪亦致乖治法新久辨鮮瘀鮮者新者本方奇合用川芎並白芍槐花荊芥及地榆三味炒黑側柏將來礬水煮甘草陳皮煎飲病無餘發熱龜膠柴胡效血虛熟地血餘醫酒客烏梅白蔻乾葛下陷防風升麻柴胡驅跌僕傷加螞蝗地鱉從治薑灰少許俱紫黑血塊為瘀血桃仁紅花歸尾訣鱉甲丹皮及川芎赤芍延胡不可缺荊芥蒲黃俱炒黑水煎服時陳酒入不止蘇木熟大黃塊止前方加減吃下血不止荷何醫泄瀉胸痞脈又虛此屬脾虛不攝血補中益氣最相宜加入炮薑並芍藥血餘阿膠功最希上下失血太過多氣息幾微命若何寒涼之涼休仍用獨參一味起沉疴是陽生陰長之法示吉曰治失血大法其始也熱主流通用清熱滋陰之品佐以炒黑蒲黃荊芥側柏之類蓋血得黑則止也若血出上竅加以順氣如蘇子破瘀如藕汁降火如童便之類其既也以致肝脾不能藏攝須用補肝益脾之品切不可仍用寒涼以傷脾胃血上湧不止用大蒜搗如泥或津調附子末下敷腳心湧泉穴引火歸原血自歸經如倉卒未便竟以熱湯浸二足亦驗若血出下竅新者正治本湯中便血加檳榔便結者再加元明粉溺血合四苓此在下者引而竭之也稍久用升提升麻柴胡之類不止合補肝益脾之藥無不效矣雖然亦未嘗盡其變也豫常用消食之品而治吐血便血其效若神蓋人但知脾虛不能攝血而不知飲食傷脾亦不能攝血也其要切右關沉緊者是豫嘗用清肺之劑而止便血人但知腸風臟毒熱在下焦殊不知上焦肺熱亦傳於腑而便血也其要切右寸浮洪或洪數及血在糞後來者是人皆以豫傳祕方籲豫方豈祕哉豫不過察三部之中獨大獨小獨遲獨數者病也余病實可例推
