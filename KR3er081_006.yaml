body:
  text: 小兒科卷之四小兒色診說夫女子稟少陰之氣而生合少陽之數而化丈夫逢少陰之數而化稟少陽之氣而生少陽之數次於七故女子二七癸至可為人母少陰之數次於八故男子二八精通可為人父若是則為成人診以大方脈法如未至二七十四歲二八十六歲之歲惟以小兒論不可與大人同日語矣錢仲陽云若憑寸口之浮沉必乃橫亡於孩子故小兒半歲之際心鑑有按眉端之法甚善兼辨脈紋以斷病自此以後未及三周者錢氏看三關察五色辨脈紋是法尤不可廢三歲以下始以脈診焉然亦不過以一指按高骨分其三部定其息數而已若再加一二歲方以一指袞轉尋其三部以關為準七八歲移指少許自九歲而後診以二指次第以三關部位尋取其浮沉遲數陰陽冷熱自無遁情矣從此而至二七二八之歲方以三指照內經脈法診之古人云寧醫十老人莫醫一小兒老人雖榮衛俱衰而口尤可宣小兒既血氣未足又兼口不能言苟其疾病惟賴三關面色而洞其臟腑之微不亦難乎心鑑按眉端法小兒半歲者以名中食三指按於髮際額前眉端之間兒頭在左舉右手頭在右舉左手食指為上中指為中名指為下三指俱熱主傷風邪鼻塞氣粗發熱咳嗽三指俱冷主外感風寒內傷飲食發熱吐瀉食中二指熱主上熱下冷名中二指熱主夾驚之候食指熱指胸中氣滿乳食不消面部驗色主病東方青色入通於肝開竅於目旺於春南方赤色入通於心開竅於耳其華舌旺於夏中央黃色入通於脾開竅於口旺於長夏及四季之末西方白色入通於肺開竅於鼻旺於秋北方黑色入通於腎開竅於耳其旺冬小兒面赤為心病面青眼青肝病認面白肺病脾病黃面黑腎病為相應青主驚積欲發風紅為痰積驚悸甚黃主食積疳癖成泄瀉嘔吐白色進異色主臟腑欲絶初患驚瀉印堂青青黑腹痛夜啼頻淡白泄瀉食不化紅主啼哭被火驚黑色見時為客杵二次受驚山根青或驚後發躁山根黑黃死來侵年壽平陷亦主天青色發熱更生驚黑主瀉痢紅主躁俱危微黃隱隱始為平黃甚主霍亂傷乳胃逆人中黃青主下痢乳食妨噯氣酸腐食不進黑色蟲痛定須防食時被驚承漿青黃主吐逆血痢因黑色驚風須急救頦長腎足壽元形吐血便血唇色白或吐嘔涎沫乾燥而皺脾熱極消渴煩熱並不寐大便不通下之則兩眼黑睛黃主熱白睛黃時食積訣主疳病黃疸白睛青時主驚風黑睛紅黃傷寒劫兩眉青色是為平紅主煩躁夜啼勤黃主霍亂並吐瀉久痢紅者定傷人兩顴赤色肺有熱太陽青時二次驚青自太陽入耳死紅色見時主血淋客忤之病兩臉青食痰喘急黃色親赤主風熱鬚髮散兩頰赤時傷寒尋額間赤色心經熱煩躁驚悸不必說青黑腹痛又驚風瘈瘲叫啼何時歇微黃驚疳自古傳純黑之時命已絶左臉青赤肝風熱項強煩悶病之訣驚搐腹痛定黑青細心推看心能決風邪發熱右臉赤咳嗽便閉並氣急青白噁心或咳嗽青黑驚風腹痛極或盤腸內吊脾胃熱極鼻色赤小便不通深黃色鼻中乾燥及氣粗衄血之症因而得脾虛泄瀉若何形乳食不化鼻淡白脾土受寒色自青木剋土黑為死候君須識小便不通頦間赤膀胱與腎氣滯熱結則耳後微赤屬少陽本經風熱宜知悉睡中驚悸若咬牙微黃之色法無失耳輪乾燥是骨蒸口渴盜汗肝熱極兩頤青時主吐蟲古人望色從來的虎口三關脈紋示吉按水鏡曰寅關脈初見易治卯關脈見病深辰關脈見者死若三關通度是為急驚虎口脈紋亂者主胃氣不和若青驚積發病三關脈色如何斷紅黃隱隱是為常非病脈也青色為驚人與獸紅色傷寒咳嗽嗆又主水驚脾虛色黃乳不化又主雷驚紫色瀉痢熱多張白色為疳黑中惡黑主人驚紅黑相兼痢不良青多白痢紅多赤痢紋如線直青紅色乳食傷脾驚熱償左右一樣驚積發三條四散肺風痰小兒脈法小兒三歲方切脈一指三關定數息一息七至號平和加則為數熱是責減則為遲冷病侵浮則為風沉為積左手人迎主外感右手氣口主內疾外候風寒暑濕傷內候痰積停乳食浮緊無汗是傷寒浮緩自汗傷風則浮大多因風熱盛沉緩原來乳食塞沉緊腹中痛不休弦緊喉間作氣急促急驚風搐搦生弦滑風癇人強直大小不常鬼祟侵二便祕時脈牢實軟細之脈有疳蟲上下失血脈芤悉虛濡主氣兼慢驚沉緩為冷泄瀉得沉數骨蒸時內熱客忤邪氣脈弦急遲澀胃脘自不和弦長肝膈有風入以上脈訣出名家再參紋色方無失薛立齊曰小兒血氣未實驚則氣散氣散則脈亂必當參三部五脈三部者面上氣色虎口脈紋寸口一指之脈五脈者上按額前下診太衝並前三部也心誠賦欲保赤子全仗心誠口不能言其疾苦脈難以決其浮沉外感六邪風寒火邪易襲內因諸症心肝脾臟為多小兒多啼則傷肝多驚則傷心多食則傷脾故三臟病多欲觀氣色先分部位左頰屬木為肝右頰屬金為肺天庭高為心火之位承漿低為腎水之區脾土中央鼻為通氣肝青腎黑木水之色主驚寒肺白心紅金火之色為虛熱土色黃現疳食症多欲窮其變再察五官鼻雖中央肺竅通聲重鼻塞風寒可見唇雖赤色脾氣應燥腫生瘡脾熱自詳舌乃心苗紅滑順而乾黑者熱舌乾主心熱乾黑則熱極難治目為肝竅赤腫熱而有神者生胃流注於雙頤風熱內攻則紅腫腎開竅於兩耳腎元憊損則黑枯繞耳經絡足少陽暴聾紅腫其過在膽牙床經絡二陽明上床足陽明下床手陽明齒遲枯燥病歸乎腎再觀其外以知其內以下活幼指南紅氣現而熱蒸青色露而驚悸如煤之黑兮中惡之因似橘之黃兮脾虛之謂白乃疳勞紫為熱極青遮口角扁鵲難醫黑掩太陽盧醫莫治年壽赤光兮多生膿血山根青色兮頻見災危瀉痢而帶陽者須防咳嗽而拖藍者可畏疼痛方殷面青唇撮眉自蹙驚風欲發面赤目直睡多驚火光焰焰外感風寒白氣浮浮中藏癖積乍黃乍白兮肝熱連綿又赤又青兮風邪緊急察之若精治之得理鴉聲魚口枉費精神肉拆皮乾空勞乏力氣色頓移形容變異氣乏則脾冷腎虛則滯頤面目虛浮定腹脹而氣喘眉毛頻蹙則肚痛以多啼蛔出兮脾胃將敗䘌蟲兮肛臟先虧苟瞑眩而弗瘳總盧扁而何益手如數物兮肝風將發面若塗硃兮心火已熾坐臥愛冷兮煩熱之攻伸縮就暖兮風寒之畏肚大腳細兮脾欲困而成疳瞪目張口兮熱已危而必斃弄舌脾熱解顱腎憊重舌木舌兮虛熱積於心脾哽氣喘氣兮實火浮於肝肺齦宣息露必是牙疳哺露丁奚多緣食積唇乾自作渴腸鳴必自利夜啼分為四症變蒸周於一歲心熱欲言而不能脾虛無時而好睡病後失音者腎怯咳嗽失音者肺痿肚痛而清水流出者蟲腹痛而大便酸臭者積口頻撮而虛寒舌長伸而火熾龜胸兮肝火乘於肺膈鱉背兮腎風入於骨髓鼻乾黑燥兮火甚金衰肚大者筋兮木強土潰丹瘤瘡疥皆胎毒之連纏吐瀉瘧痢乃食積之黏滯不能吮乳者熱在心脾常欲俯臥者火蒸脾胃喜視燈火者煩熱在心愛吃泥土者疳熱在脾腹痛寒侵口瘡熱積臍風忌於一臘火丹畏於一周驚自熱生癇因痰致吐瀉而精神好者則危瘧痢而飲食減者則瘁驚本心生風由肝致搐合左右兮症有順逆藥分補瀉兮病有虛實急驚也由於積熱之深涼瀉偏宜慢驚也得於大病之後溫補為貴頭搖目竄而氣喘兮上工莫醫口噤鼻張而氣冷兮神丹何濟閉目兮無魂狂叫兮多祟不知吞吐者死反加悶亂者危且如病則熱起熱則驚生或制熱以熱或攻熱以寒襁褓未寧兮但調其母匍匐不快兮當固其元奈何瀉久成痢積久成疳瘧久生癖驚久成癇未致留連兮攻之宜速已見沉疴兮治之宜緩腸胃祕結兮急瀉而已氣血虛乏兮急補而安此言指南之活動何疑治病之萬全示吉曰小兒之病口不能言故曰啞科惟賴望色驗症察紋切脈以知其臟腑之微實難事也故庸工治病遂拘小兒病食上起之說概施消導攻伐之品實者偶爾中病虛者遂至重虛良可憫也即有智者不遵古人之遺意常恃一己之聰明或致弄巧而成拙以致智愚相去其間不能以寸此故為何皆因不辨明其寒熱虛實外感內傷之故也豫不揣愚陋將六症分明於後一見了然使無疑似之嫌如兼他症隨症加減又存司命者之方寸耳凡見小兒頭痛發熱鼻塞聲重咳嗽手背熱惡風寒皆屬外感無汗脈浮緊傷寒自汗脈浮緩傷風暑月吐瀉作渴齒燥脈虛傷暑浮腫泄瀉身重小便不利脈濡細傷濕舌乾口燥唇焦面赤或啞脈數傷熱凡見小兒噯氣飽悶作酸腹膨不思食及惡聞食氣下泄臭屁噁心乍吐乍瀉或寒熱或腹中硬塊作痛手心熱脈弦滑俱屬內傷飲食以上二症最多凡見小兒發熱無汗表實大便閉裡實心胸飽悶腹中膨脹噁心噯氣吐出酸水手足有力腹痛手不可按脈洪實有力俱屬實證凡見小兒面㿠白無神懶言氣短不思食腹膨不痛二便如常喜臥眼喜閉手足無力慢驚久吐胃虛久瀉脫肛脾虛自汗表虛自痢裡虛脈來微細無力及行遲發遲齒遲解顱鶴節俱屬腎氣未成元精不足以上俱屬虛證凡見小兒發熱手足心熱面紅唇乾舌乾口渴口上生瘡口中熱臭大便祕小便赤黃或痢下黃赤肛門焦痛喜飲冷水喜就涼處腹中熱痛脈來洪數俱屬熱證凡見小兒面白唇青手足冷口中冷氣或泄痢清白無熱不渴腹痛悠悠無增減或噁心嘔吐喜就暖處脈來沉遲無力俱屬寒證以上諸症每症不必悉具凡見一二便作主張治之若二證三證兼見者須照本條斟酌盡善自能中病也小兒百病歌初生小兒宜珍攝溫涼得體自和悅初生小兒宜用老人舊衣改作衣衫真氣相滋令而有壽夏月宜夾衣獨臥冬月宜穿薄綿襖置大人懷中以就暖氣因小兒陽氣尚微即著重裘其陽氣不能自暖多致凍壞也冬月初生黃連忌用大寒故也三朝內服化毒丹名為開乳解胎熱臍帶落後須炙乾硃砂相和為細屑最能稀痘更還元胎毒胎熱從此絶臍帶落後置新瓦上用炭火四圍燒至煙將盡放地上用瓦盞蓋之存性研末預用透明硃砂末水飛過如臍帶灰四分硃砂末二分和勻煎生地當歸濃汁少許調和前二味抹兒上齶間及乳母乳頭上一日之內服盡次日大便遺下穢物終身無疾矣滿月之後有變蒸微寒微熱吐哯生唇有白泡三日愈若夾風寒逐樣尋變者異常蒸者發熱小兒自此氣血發榮性情有異一二日其熱自退若夾他症而不愈有食則消食是風則行痰有驚則安神可也若變蒸而妄投藥餌則誤人最大慎之眼閉面赤名胎熱焦啼煩躁熱不歇口中氣熱甘草一錢黑豆及燈心七莖豆二錢竹葉七葉煎湯頻頻呷乳母亦服面色青白四肢寒口冷腹痛胎寒說當歸黃芩及桂心細辛龍骨白芍訣等分為末服一匙乳汁調下寒能絶此症兒大便青黑身起寒栗因母孕時受寒臍帶斷後風濕傷臍腫硬直臍風殃臍有青筋衝心者燈火急救始無妨臍有青筋行肚卻分兩岔行至心者必死急用燈草蘸油燃火自青筋頭並行盡處燎之外再灸中脘三壯內服小紅丸以泄胎毒五通膏貼功誠妙生地生薑蔥白當卜子田螺各等分五件共搗搭臍旁敷臍四旁一指厚拘住一時有屁下泄即愈一用田螺入麝搗爛敷腫上亦消風邪入臍心脾熱唇青舌強撮口訣齒根上下粟米瘡青布蘸水擦破截小兒口撮緊閉不吮乳皆因齒根生小泡子痛極也青布蘸雪水擦破自開口便安甚者用牛黃一分為末竹瀝調滴入口中即愈一用龍骨為細末敷之急驚小兒急症急驚風緊閉牙關氣不通壯熱涎潮目竄視反張搐搦頰唇紅二便閉結法當下驅痰清火有神功輕用小牛黃丸重用小紅丸若下後不止夢中驚悸宜玉樞丹驚定即當調胃氣莫仍克伐與推攻慢驚慢驚之症實非驚吐瀉亡陽病後成脾胃損傷肢體冷虛痰泛上目無神口鼻氣微時驚悸手足瘈瘲命將傾加減醒脾湯可治人參白朮白茯苓木香天麻並半夏膽星甘草橘皮靈倉米棗姜煎服效殭蠶全蠍逐痰增不愈六君加附子暖回痰降自全生示吉曰急驚者內傷乳食外感風寒內熱痰壅腹脹便祕脈數有力故宜瀉宜攻慢驚者久吐之後名胃虛驚久瀉之後名慢脾驚或服克伐過多或投寒冷太甚以致元氣衰憊虛痰泛上不投溫補何以挽回元氣無何有之鄉耶古人云似風而無風可驅似痰而無痰可逐信然也疳疾小兒疳疾從食起乳母寒熱失調理肥甘過度喜怒偏生冷油膩不得體或因久瀉及痢瘧或熱或嗽病不已以致脾胃中氣傷溺如泔色又不長皮黃肌瘦發更直肚大青筋腹痛殃好食泥炭並茶米諸蟲作痛藥須嘗先服珍珠丹一服或用小牛黃丸追蟲取積最為良連薈肥兒後調理蒸餅礬丸細酌量並治丁奚疳症發熱小兒發熱病不一傷寒無汗惡寒極手足梢冷麵色青兼不舒暢左額青紋可認識傷風惡風且自汗手足梢溫面光赤二證宜通神散傷食胸膈又飽悶吐瀉腹痛面黃色右額青紋目胞腫夜熱晝涼無定跡便祕小牛黃丸瀉沉香末子驚風發熱山根青手心有汗時警惕小紅丸抱龍丸紫金錠選用疳積發熱是骨蒸背熱不止盜汗生有積先服小牛黃丸後服乾蟾肥兒丸唇有白泡變蒸熱耳冷微汗又虛驚腹痛啼叫或吐哯周歲之後無此形不須服藥諸熱表熱手背熱遍身發熱通神散內熱化毒自能平內熱手心熱口乾唇紅便結痧疹斑小兒痧疹屬風熱煩悶焦躁啼不歇汗下之後熱轉增痧疹將發醫之訣頭粒細小痧疹來細點無頭斑症列欲出未出須升散牛蒡升麻乾葛慣防風薄荷及甘草陳皮水姜煎服古方撰已出之後去干葛升麻加入元參黃芩定不差知母花粉山梔黃連能消熱咽喉疼痛青黛桔梗拿大便祕結大黃用自汗口渴石膏查一方治痧子不發用櫻桃核打碎泡湯與之風寒風寒之症若何成頭痛發熱咳嗽生傷寒無汗風自汗鼻塞身重拘急形解表先服通神散若夾驚痰細酌斟傷食乳食不化自飽悶噯氣作酸或吐甚下泄臭屁不思食沉香末子藥可進大便結者小牛黃食隨利去法有信嘔吐乳食傷胃則嘔吐食消吐定法所布沉香末子是總司用濃薑汁調下不愈定吐飲功大半夏陳皮及藿香神曲麥芽厚朴木香助水煎臨服加薑汁口渴身熱黃連入身冷不渴炮乾薑脈遲厥冷人參白術益夏月香薷滑石添大便祕時檳榔吃祕甚者用小牛黃丸薑湯化下泄瀉乳食傷脾泄瀉症健脾消食利水應沉香末子亦可施實脾利水煎方定蒼朮白朮白茯苓山藥扁豆甘草順澤瀉木通及木香砂仁煨姜陳皮進有熱須增姜炒黃連無熱肉果炮姜性姜用少許食積腹痛神曲麥芽山楂卜子枳實厚朴檳榔令暑夏月吐瀉多因暑加減香薷飲可止香薷藿香及木香厚朴陳皮神曲麥芽始半夏茯苓並木通扁豆蒼朮滑石同熱加黃連去蒼朮瀉多炒芍亦良工有食山楂枳實妙臨服薑汁助成功按燒針丸治小兒吐瀉甚效用東丹硃砂白礬等分為細末棗肉為丸丸如黃豆大每服三四丸戳針尖上燈火燒過研細涼水調服外用緑豆粉以雞子清調成膏如吐塗兩腳心瀉塗囟門上止則去之痢痢疾皆因傷濕熱白傷氣兮赤傷血新積多血久積膿初起腹痛下之訣通因通用之法用小牛黃丸珍珠丹後服肥兒丸調理表熱太甚薑茶煎內熱口渴香連截嘔逆噤口用石蓮為末調下病能絶薑茶煎用生薑切片細茶各三錢並水煎服痢而兼外感者用之血痢加連根韭菜汁酒調服香連丸治內熱口渴肛門焦痛用川黃連十兩切片薑汁拌炒木香二兩為細末神麯糊丸如緑豆大每服三五丸分量大小酌用白湯下石蓮散石蓮肉炒去心為末每服一二錢陳倉米飲調下如嘔加薑汁一匙同服久痢塞劑用粟殼木香榴皮細茶烏梅肉各二錢白蜜砂糖各五錢紅痢多糖白痢多蜜水二盅煎八分去渣服大人亦用瘧疾小兒瘧疾名童瘧初起消食痰涎卻便祕腹痛小牛黃屬乳食痰積發熱無汗通神略屬風寒外感六七發後截法精天靈散用真靈藥天靈散用天靈蓋燒存性為細末黃酒調下五釐瘧立止一用斑蝥一個放小膏藥上侵晨貼眉間印堂中瘧止揭去咳嗽有聲有痰名咳嗽風寒邪氣肺經受若兼發熱及頭痛通神解表功方就火鬱肺經聲不轉瀉白噙化丸能奏痰塞喉中喘急者巴豆塞鼻如神宥小兒痰喘用巴豆一枚去殼搗爛作一丸綿花包裹男左女右塞鼻中痰即降下而愈一方治咳嗽喘急甜梨一個刀切勿斷入蜜於內麵裹灰火煨熟去面吃梨一方用白蘿蔔汁半盅蜜半盅飴糖半杯薑汁十匙蒸熟不拘時吃並治老年痰火肺脹喘急小兒肺脹喘嗽多人看作風喉大黃檳榔二牽牛人參分量等勻五味研成細末蜜水調量稀稠每將一字下咽喉不用神針法灸雲林云肺脹喘滿胸高氣急兩脅搖動陷下作坑脹悶亂嗽聲嘎不鳴痰涎壅塞俗云馬脾風不急治則死本方主之按幼科陳見田祕本肺葉脹以致喘急眼胞上下臥蠶紋起用防耆散見雜症水腫條浮腫遍身浮腫是屬濕燥脾利水並消食腹脹便祕珍珠丹內消食積沉香末子益不效平胃皮子飲厚朴陳皮炒蒼朮腹皮姜皮茯苓皮車前卜子檳榔則神麯澤瀉及麥芽木香木通桑皮力砂仁炒末水煎來小便利時腫自息一方用黑醜半生半炒取頭細末每服二三匙煎桑白皮湯磨木香汁調服一方小便不利者磨玉樞丹燈心湯送下一用草果仁每歲用一粒炒為末白酒調下外用河白草煎湯洗浴若浮腫先眼下臥蠶紋起喘急病在肺宜防耆散黃疸小兒黃疸是濕熱清熱利水方真訣指甲面目遍身黃溺如黃汁或寒熱嘔吐口渴不思食夜無安臥不寧貼大便祕結珍珠丹蒸餅快活調理截不愈茵陳滲濕湯茵陳赤