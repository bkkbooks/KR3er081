兩川黃連炒白朮土炒檳榔各八兩共為極細末煉白蜜為丸丸如龍眼大空心清米湯化下若疳積加蘆薈胡黃連銀柴胡名蘆薈丸又名五疳保童丸此須夜間發熱骨瘦如柴者可用一方加蝦蟆食蛆或用蝦蟆食蛆俱燒存性入前藥內名乾蟾丸虛者加米仁山藥虛甚加人參有蟲加川楝子使君子肉鶴蝨蔣氏肥兒丸治小兒瘦弱食不生肌肚腹疼痛內熱蟲積云白朮土炒陳皮炒香附鹽水炒厚朴薑汁炒枳實麩炒檳榔神麯炒麥芽炒澤瀉炒卜子炒山楂肉炒白茯苓蒸白芍藥炒各四兩木香不見火甘草炙各二兩內熱口渴脈洪數小便黃加連翹川黃連各三兩骨蒸熱背熱手心腳底熱口渴身瘦溺赤脈細數加蘆薈一兩胡連銀柴胡各三兩鱉甲醋炙四兩瘧後寒熱不止脅下有塊加銀柴胡胡黃連當歸青皮各三兩鱉甲醋炙四兩桂枝七錢腹中膨脹或有塊痛手不可按加三稜蓬朮醋炒各三兩食蛆二兩乾蟾一隻泄瀉少食或腹痛手按則減面色㿠白無神六脈無力倍白朮白芍加人參山藥米仁各四兩瀉不止加肉果麵裹煨二兩六脈遲手足冷口不渴溺清白肌肉日消或悠悠腹痛無增減或喜就暖處或食生冷即瀉或臍下作痛是屬虛寒加炮薑肉桂各一兩倍白朮白芍泄加肉果麵煨二兩虛甚加人參山藥各三兩面上白斑腹中作痛口出清水或口中吐蟲屬蟲積加使君子肉貫衆各二兩雷丸鶴蝨各一兩示吉曰小兒如春令草木得雨露滋養則日生夜長所患者惟蟲物以害之則枯萎爾小兒稟純陽之體乳食滋補則先天之氣生生不窮所患者飲食過度脾胃損傷成疳成積肌肉瘦消也食積之害小兒亦猶蟲物之害草木蟲物去則草木日長食積去則元氣自生固不易之理故古人制肥兒之方多用消食去積之品蓋欲先除其害也豫得古人之旨隨症加減以盡寒熱虛實蟲積之變敢云一片婆心聊為古人之小補耳紅燕丹專治小兒疳積丁奚骨瘦如柴目閉溺赤或腹中疼痛或溺如米泔大石燕一雌一雄每個重一兩者佳人傾銀罐中上下用炭火煅紅淬入好醋中如此九次明硃砂另研水飛三錢紅曲揀淨一兩三味為極細末和勻周歲者每服三分糖拌不拘時服按此方乃消疳化積之神藥也且無藥氣利於小兒之畏藥者豫表侄二三歲間患疳積症頭大身瘦發熱溺如米泔諸藥不效後聞藥氣即吐束手無策偶遇異人傳此方和於糖果粥飯中與之數服全愈後以此濟人無不效矣抱龍丸治小兒急驚癲癇痰涎壅盛胎驚內吊咳嗽喘急搦搐驚悸等症天竺黃五錢辰砂二錢九套膽南星一兩明雄黃一錢麝香一分五釐為極細末另用麻黃款冬花甘草各五錢煎湯去渣慢火熬成膏和末藥為丸丸如芡實大每服一丸薄荷湯化下示吉曰鎮驚消痰安神開竅制抱龍之旨也然恐病輕藥重朱雄則過於墜鎮而麝香更有引驚入竅之弊故古人有不可輕用之說今此方之妙作之以膏麝香得麻黃之辛散竅內之驚盡出雄朱得甘草之和緩墜鎮之性和平膽星天竺而佐款冬消痰潤肺肺潤則氣降氣降則痰下痰下則驚平咳嗽痰喘不治而悉愈其方若與古人同則其效勝於古人遠矣非得岐黃之祕者斷不知此此方為計元讓家祕活人無算豫求之數年始得同志者勿易視之玉樞丹一名太乙神丹一名追毒丹一名紫金錠解百毒逐水氣下痰開結鎮驚去積通竅除驚定搐搦理內外無名之症療大小疑難之疾明雄黃一兩五倍子槌破洗淨焙三兩山茨茹去皮洗淨二兩紅芽大戟去蘆洗淨焙乾兩半千金子去殼研去油取霜一兩明硃砂五錢麝香三錢上除雄朱麝千金另研外其三味各為極細末和勻卻入前四味再研勻以糯米糊和杵千餘下為錠子陰乾端午日午時修合者佳癰疽腫毒初起腫疼或蟲獸咬傷疼痛外用井花水磨敷內用井水磨服大人每服二錢小兒周歲者五分大者酌用小兒夢中驚悸及痰火壅甚大便如常者井花水磨服薄荷湯送下半歲者二三分周歲外者三五分珍珠丹追蟲去積消食逐滯消膨脹通便結化痰垢疏滯氣推陳致新下法中之神藥也皂莢去筋子八兩小檳榔干切八兩黑白醜淘淨浮水者不用各四兩巴豆肉槌碎包夏布中六錢四味和一處用陰陽水十四碗與藥共煮水盡取起去巴豆曬乾磨為極細末磁瓶收貯每服男用三五七九分女用四六八十分黑糠拌上部病白蘿蔔湯下下部病冷茶送下生薑湯催之如治水蠱用川貝母秦艽花粉各一錢真蘇子九分煎湯送下珍珠丹三分隔一日服藥一次水去依本條中調理川貝四味為末蜜湯調下治咳嗽如神雞肝藥治小兒疳積肝經積熱以致眼閉眼紅失明腹脹等症白肉雷丸一兩赤色者不用用蒼朮一兩同煮一二十滾去蒼朮切片使君子肉一兩黑油者不用二味焙乾等分鐵碾內碾為細末用不落水雞軟肝一具男用雌女用雄將末藥一錢摻上飯上蒸熟小兒食之即愈輕者二三服重者不過七服神效忌豬肝及豬牛犬肉不忌損目此方系王仙師所傳吳中專司疳積者惟賴此方其效若神豫竭力覓之以公海內庶得好生之意云蒸餅快活丸治小兒丁奚疳症皮膚瘦消骨露如柴肚大青筋小便濁睡臥躁亂神乏昏沉常服健脾化積進食肥肌神效用小麥面一斤作餅十六個每餅重一兩內裹青礬一錢外以濕紙包黃泥封固炭火內煅透取出候冷為細末用紅棗米泔水煮熟去皮核搗爛如糊同餅末杵勻丸黍米大每服三五十丸清水湯送下碾化亦可示吉常讀內經曰以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不知御神務快其心逆於生樂起居無節此岐伯言今人致病之由也若夫小兒則榮辱不動其心色欲不傷其腎惟天之六邪外入風寒火證為多暑濕燥次之內因諸症易驚則傷神而心病善啼則怒而肝病多食則傷脾而脾病至於傷肺傷腎之事無有也故豫集幼科諸方通神瀉白風寒火之通治也沉香末肥兒丸快活丸脾胃病之通治也紅燕丹雞肝藥肝臟之通治也小紅丸抱龍丸心臟之通治也小牛黃珍珠丹追蟲取積化毒專司清熱玉樞丹消痰逐水定驚解毒兼理怪病俱去害之良藥因小兒純陽之體害去其生生之氣自長溫補之法不講也惟慢驚及久吐瀉諸遲法宜補益已見於本條下專司幼科者諸方預宜修合三歲之內非此不愈四五歲後當參大人雜症條治之治夜啼方治邪熱相乘焦炒夜啼用燈花三顆為末以乳汁調抹兒口內或抹母乳頭上令兒吮之一用燈心燒灰敷乳頭上令兒吮之一用玉樞丹二分井花水磨抹兒口中一用硃砂二分半研細末蜜調兒睡時抹兒口中一方用火柴頭一個長四五寸削平面用硃砂寫云撥火杖撥火杖將來作神將捉著夜啼鬼打殺不要放急急如律令治愛吃泥土方煎黃土湯送下小牛黃丸一用干黃土為末濃煎黃連汁和為餅食之愈一用膩粉一錢砂糖和為丸如麻子大米飲送下瀉出去土立愈小兒愛吃泥土乃脾虛胃熱所致用清胃養脾湯用黃芩石膏陳皮白朮茯苓甘草水煎服治蟲病方凡腹痛口中出清水者屬蟲積用小牛黃丸糖湯化下一方用使君子肉二錢殼五分檳榔一錢水煎服一方用使君子肉一錢雄黃五分共為細末每服一錢糖拌苦楝根煎湯送下小兒蟲咬心痛欲絶用五靈脂二錢枯礬五分為細末水煎一錢不拘時服蟲即吐出豫少時入山路逢一小兒心腹痛啼哭口吐清水豫曰蟲也少頃吐出蟲長一二寸者一二十其痛愈急倉卒無藥豫記老蔥根能化蟲為水取蔥搗汁香油調服下咽痛定其病永不發矣此方大人心腹蟲痛俱治豫一日靜坐一人索化蟲藥甚急曰三日前鄰家小兒心腹痛欲死服相公丸藥後即下血鱉七八枚蛔蟲二三十如螻蛄者一二十痛立愈矣今小兒心痛亦然必求前藥乃妙豫亦不記其何藥以諸丸合渠驗之乃揀遇仙丹而去方見雜症蟲條治遺尿方小兒膀胱冷弱則遺尿用破故紙一兩鹽酒炒為末每服一錢熱湯調下一用益智炒為末白湯調下一錢一用雞䏶胵一具雞腸一具燒存性豬胞炙焦為細末每服一錢黃酒調下男用雌女用雄一用官桂為末雄雞肝一具等分搗丸如小豆大溫水送下日三服治尿濁方小兒胃中濕熱下流則小便濁如米泔或多食糯米食之故沉香末子主之一用澄清飲白朮茯苓白芍黃連澤瀉山楂青皮甘草水煎空心服治小便不通方膀胱有火則小便祕結而不通用燈心湯送下益元散一錢一用兒茶二錢為末萹蓄湯送下一用五苓散加車前燈心煎服初生小兒二三日不大小便用蔥汁人乳各半調勻抹兒口中即通治語遲方治小兒心氣不足邪熱乘之則語遲用石菖蒲丸菖蒲人參麥門冬去心川芎遠志甘草水泡去心當歸各一兩乳香五錢硃砂三錢為細末煉蜜丸黍米大服十丸食後粳米湯下治齒遲方小兒腎不足則齒生遲用川芎山藥當歸白芍炒甘草炙等分為細末白湯調下二錢食後服將藥末擦牙齦即生龜胸方小兒心胸高如覆掌是肺熱脹滿之故用天冬去心百合杏仁去皮尖麩炒木通枳殼麩炒桑皮蜜炙葶藶隔紙炒石膏煨各二錢川大黃酒蒸六分共為細末煉蜜為丸如緑豆大每服五丸白湯化下食後臨臥服外灸兩乳前各一寸半上兩行三骨間六處各灸三壯春夏從下灸起秋冬從上灸起龜背方風入督脈背脊受傷故背高如龜用枳殼防風獨活大黃煨前胡當歸麻黃去節等分為末麵糊丸如黍米大每服十五丸看兒大小以米湯送下食後服外宜灸肺俞穴在三椎下兩旁各一寸半心俞穴在五椎下兩旁各一寸半膈俞穴在七椎下兩旁各一寸半六處穴各灸三壯以小兒中指節為一寸艾炷如小麥大陰腫疝氣方治寒鬱下焦偏墜氣痛用故紙炒橘核炒乾薑肉桂砂仁等分為末酒拌空心生薑湯送下一錢一方用五倍子燒灰存性為末好酒調下三分出汗立愈一方用牡蠣不拘多少為末雞子調塗治外腎腫大即消陰囊忽腫或久坐濕地或蟲蟻吹毒用蟬退五錢煎湯熏洗腫痛自消內服五苓散加燈心煎服若因蚯蚓吹毒陰頭腫痛用鴨涎敷之一方用蔥園內蚯蚓糞以甘草汁調塗腫處或薄荷汁調亦可斷乳法以山梔三粒炒黑存性硃砂輕粉各少許研為細末取生芝麻油調和待小兒睡著以藥濃敷兩眉間睡起即不食乳不可說破如不效再加黃丹一錢須揀伏斷及卯日牙疳口瘡方小兒心熱則舌瘡胃熱則牙疳脾熱則唇瘡凡治牙疳口瘡先用青絹蘸雪水或井花水拭淨白皮即血出亦不妨拭淨後用元水丹見雜症口舌病吹入口舌瘡用黃連為細末蜜水調服牙疳用竹葉石膏湯水煎服少許噙漱凡痘後痧後生疳是邪熱未散積毒成疳不急治則牙落非元水丹可治宜祕方二仙丹用活雄童子鯽魚炙乾大葫蘆浸糞坑內七日取起洗淨炙乾各為極細末等分和勻先拭淨牙根敷上即愈牛黃散治小兒口中百病鵝口口瘡重齶不能吮乳及咽喉腫塞一切熱毒用黃連末黃柏末各八分雄黃青黛火硝各二分半牛黃冰片硼砂硃砂各一分共研極細每用少許敷入口內重舌木舌弄舌方心脾積熱舌下有形如舌而小者名重舌舌腫硬不和為木舌舌伸出縮進不安名弄舌重木舌用歸尾連翹白芷各三錢大黃煨甘草炙各一錢水煎食後頻頻服外用青黛黃柏末和勻敷之一方蒲黃敷一方用膽礬研細點少許一方用百草霜朴硝滑石共為末酒調塗之木舌用元明粉五錢川連末一錢食鹽少許竹瀝調敷弄舌宜服化毒丹頭面疳火方治小兒頭面諸瘡丹毒腮腫眼痛用牛黃黃連散用牛蒡子炒黑一兩川大黃生用一兩川黃連三錢共為末每服一錢蜜湯調下外用松香三錢蔥汁拌煮乾東丹鉛粉各二錢為細末香油調搽名三物丹丹毒方遍身遊走赤腫名曰丹毒內服通神散散之或玉樞丹解毒外用朴硝大黃等分為末新汲水調雞翎蘸藥塗之一用伏龍肝不拘多少雞子清調敷患處眼痛紅腫方小兒眼痛紅腫是風火上攻宜通神散熱甚化毒丹外用熟地黃一兩新汲水浸透搗爛貼腳心布裹住有效一用火硝一錢雄黃六分為極細末吹入鼻中目中流淚即效耳痛方腎熱上衝耳中或痛或出水或流膿耳中腫痛用蔥汁滴入出膿流水先用綿紙捻捻盡膿水後以白龍丹見雜症耳病吹入一用五倍子燒存性為末吹入耳效一用黃蠟如豆大搓成條外用真蘄艾槌熟裹蠟條用火燒著煙燻患處鼻瘡方鼻下兩旁瘡濕癢爛膿流處即又成瘡最為可厭宜用澤瀉鬱金山梔仁炙甘草等分共為細末食後白湯調下一錢外用甘草湯洗淨敷疳火三物丹頭瘡方小兒頭上生瘡最難除根法先用蔥頭花椒米泔水煎湯洗淨瘡蓋後用臘豬油半斤熬滾入麻黃半斤同煎煎至麻黃色黑枯撈去渣以油搽瘡一加輕粉三錢尤妙一方用菜油一杯放勺內煮滾入活蜈蚣一二條煎蜈蚣黑枯為度去渣將油搽臍瘡方小兒剪臍外傷風濕以致臍瘡不幹用枯白礬龍骨煅各五分共為細末每用少許摻臍上一方用草紙灰敷一用紅絨灰敷一用蠶繭燒灰存性敷一小兒初患舌碎繼之遍身發熱一醫以傷風停食而用發散消導之劑豫曰無益也服後果熱愈甚滴水難食復來求救豫以黃連五錢煎湯徐徐與之終劑而愈其父問其故豫曰若先身熱而後舌碎則因風食發熱以致舌碎固常事也今先舌碎知其心火亢甚加之身熱是內熱極而火外行耳一小兒二三歲身熱驚悸易醫六七俱無寸效一日忽作鴉聲少頃其音已啞魚口開張豫視之欲哭狀惟眉頭稍皺終無音出心甚憐之細思其策因以指探其口中唇乾舌燥豫曰心熱欲言而不能果有之乎即以黃連黃芩石膏麥冬五味山梔元參花粉知母甘草薄荷燈心竹葉銼一大劑煎成薄膏頻頻與之一晝夜而鴉聲復出又一日而音始全而愈自此之後此法活人無數大便三四日不行者加元明粉二三錢尤驗驚悸者加金子同煎嗟呼人遇啞驚風俱棄之而不治孰知唇乾口燥終屬陽證此法甚善故記文嘉善魏交讓子豫之表弟也年十歲患小腹痛三四年矣醫藥不效豫診之脈來沉遲二便如常按之無塊此必腎家虛寒也六味地黃丸加炮薑肉桂青皮香附車前牛膝而愈淮安大啇陳受伯弟年十一歲傷寒病起幾至二百日粒米不食食即脹滿諸藥不愈惟日以人參三錢煎湯飲而已載至吳中求治豫視之骨瘦如柴六脈沉細投之參朮正相宜也何無效驗因揭心胸小腹按之硬塊已滿手按則痛豫曰憑脈則難用下藥不下亦無生理遂用當歸元明粉各三錢酒蒸大黃二錢杏仁麻仁蘇子桃仁俱炒為末各一錢白芍川芎桔梗各十分水煎服服後即去黑塊二三十中脘硬處下行寸許然已虛極明日去大黃元明粉加人參二錢服一劑後日復用大黃元明粉而去人參又去黑塊一二十如此人參大黃間服半月黑塊始盡而愈周忠介公孫女年七八歲大便下血不止遍問幼科有用黃連犀角者有用人參阿膠者俱無寸效豫診得氣口沉緊豫曰十服末子即霍然矣佩老母舅笑曰何言之易耶姑試之三服而血止索其故豫曰人但知脾虛不能攝血不知飲食傷脾亦不攝血今用消導之劑食去則脾氣復而血自攝焉得不愈其末子即沉香末也一小兒在水閣風雨卒至又驚又寒後至四肢厥冷漸至遍身惟心口稍暖此冷風入骨症也冷至心窩則死用理中湯加附子一錢數服而寒始退
