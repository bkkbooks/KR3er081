body:
  text: 卷之二汗證克肖天地名曰人天地有雨人汗生久雨之時天地否久汗之人病自成上工治汗須分別自汗盜汗有二説寐時汗出覺來止盜汗陰虛兼火挾動則汗出名自汗陽虛有濕兼氣竭自汗補陽並調衛盜汗滋陰降火絶參耆湯治自汗來人參黃耆白朮截茯苓當歸兼棗仁白芍熟地牡蠣屑各一錢烏梅一個並甘草陳皮浮麥大棗煎一貼盜汗當歸六黃湯生熟地黃黃芩當當歸黃連黃柏等分用黃耆倍用水煎方陰陽兩虛自盜汗二方合用又何妨泄瀉虛滿食不思芩連黃柏定須除加入棗仁並白芍黑豆桃奴亦可施汗出不止法如何五倍為末津調和塗入臍中真妙法或用撲粉亦除疴龍骨牡蠣俱為末白朮糯米小麥斫過周身撲之汗自止莫將厚被蓋身多示吉曰汗證有虛無實調治不難但冬月傷風非桂枝不愈至於內傷自汗原須補中益氣湯蜜炒升柴少加製附子浮小麥麻黃根治之調其中氣使脾土和則濕不上升濕不升則君火亦不能自為汗也頭痛頭痛即非真頭痛風寒痰火虛氣動古人羌活沖和湯加減服之真有用羌活黃芩及防風蒼朮白芷細辛川芎生地甘草引薑棗蔥頭髮汗自然松太陽倍羌活症惡風寒脈浮緊少陽柴胡症寒熱口苦脈弦數陽明石膏乾葛攻自汗發熱不眠頭額目痛脈微洪太陰腹痛倍蒼朮或有痰身重脈沉緩少陰倍用細辛功症足冷氣逆脈來沉細甚加麻黃附子厥陰頭痛吐痰沫手足厥冷吳萸通脈沉緩肥人頭痛多濕痰二陳合用術相同瘦人定是火壅上酒炒黃芩病可沖脈來洪數實火升重劑須知石膏靈脈來無力是虛火牛膝車前引火行導龍入海法人參黃耆氣虛用症懶言倦臥右脈無力合四君子湯血虛四物酒黃柏送日輕夜重脈芤澀風熱在上頭痛者天麻蔓荊酒炒黃芩共巔頂頭痛加藁本酒炒片芩用亦中大便祕結酒大黃釜底抽薪功最重若還真痛指甲青旦發夕死誠危恐按半片頭痛古法本方中左痛合四物右痛合四君固妙更有祕方用白芷二錢川芎三錢為末黃牛腦子一個共入磁器內加酒燉熟和酒食之隨量一醉酒醒痛失矣外用吹鼻法一用鬧羊花川芎等分為末一用火硝川芎等分為末俱妙右痛吹左鼻左痛吹右鼻又膈鹽灸法用一厚紙為圈約一分厚填鹽其中放大陽穴上用艾火置鹽上灸七炷艾炷始黃豆大圈約錢大可也凡服頭痛藥須乘熱先熏後徐徐咽下藥力始到又祕方治半片頭痛以致目中生翳者用白鳳仙一株搗爛用火酒一斤浸之露七夜去渣飲酒食後服神效心痛心痛雖分九樣論食風熱冷悸蟲飲疰去來痛皆因胃脘當心痛痛則不通多成郁郁久因而作熱蒸大實痛時不可按按之痛減作虛因蛔蟲痛止偏能食面上兼有白斑唇紅時作時止脈澀須知瘀血成必平日喜食熱物嘈雜善飢是胃火口吃冷物屬寒痛或身受寒氣痰痛吐痰脈沉滑噁心惡食食傷生加減調中治諸痛山梔陳皮草蔻共蒼朮桔梗與檳榔烏藥香附枳殼用半夏薑汁磨木香祕法一匙滴滷送火甚竹茹薑炒黃連炮薑肉桂虛寒中去山梔瘀血當歸桃仁五靈脂痰飲瓜蔞南星弄食積砂仁山楂草果蟲痛川椒烏梅動便結仍加酒大黃通則不痛從來重可用元明粉三錢亦妙真心痛時指節青夕占旦死誠可痛示吉曰痛無補法勿用參朮得寒則凝不可純用寒涼故古人用山梔而佐以薑汁也此症大都因有形之物隔礙其氣而然法宜吐瀉以行其氣宜三因吐法或鵝翎探吐之外治點眼止痛實為妙法用透明雄黃火硝等分為末加麝香少許新汲水調點眼內眥睛明穴男左女右扶行數步立愈若再鄉僻藥餌不便竟用鞋底泥化入井花水中攪勻服甚佳此症痛止切不可飲食食必復痛外蟲痛欲死用老蔥根搗爛取汁香油和服立愈諸心痛用良薑香附等分炒為末每服二錢酒送下效腹痛腹痛之因有幾般食痰瘀血熱蟲寒瀉後痛減知食積痰則脈滑小便難或腹中鉤痛脅下有聲時痛時止是火痛四肢手足心熱脈數綿綿不止作寒看症面青白或爪甲唇口皆青脈來遲內有瘀血致腹痛必有常處不移動小便自利大便黑面白唇紅痛不常蟲痛惡心食不用腹中乾痛時作時止夏天吐瀉冒暑來身重腹痛因濕中或兼浮腫手按痛止軟為虛手不可近是實痛主治戊己調中湯蒼朮陳皮香附光厚朴茯苓並滑石川芎白芷神麯方木香山梔須炒黑各一錢甘草薑灰少許入痰多半夏及南星食積檳榔共枳實砂仁蘇梗調氣滯葛根白蔻澤瀉消酒積飲酒人多酒積痛熱甚黃連不可無寒多炮薑肉桂原有力去山梔赤芍歸尾及桃仁瘀血痛塊加有益肉食停滯山楂草果卜子麥芽消麵食冒暑香薷並藿香傷濕木通倍蒼朮手按痛甚便不通大黃三錢一齊吃按之痛減脈無力白朮白芍補虛則烏梅川椒治蟲痛川楝肉桂檳榔同要用臍下大痛治最難人中黑時病已重止痛尉法一用炒鹽一升絹包乘熱尉痛處冷則再炒一用生薑斤許搗爛去汁取渣炒熱尉痛處冷則加汁再炒並治結胸痞氣一用麩皮炒熱尉痛處示吉曰鹽性善走力能軟堅薑味辛辛能發散麩皮性熱熱主流通故能定痛加之以炒者借火力直達於中宮也大痛時先用此法痛稍定辨虛實寒熱用藥更為切當毛公威曰痛則不通總宜行氣祕方桃靈丹治諸痛如神用桃仁一兩半炒半生青皮元胡廣皮靈脂各五錢沉香圓木香各三錢乳香沒藥各三錢共為末九種心痛淡醋湯下絞腸腹痛淡鹽湯下食積瘀血痛酒下脅痛膽無別竅肝盡陰位居兩脅怒為神忿怒傷肝主脅痛風邪痰食血能成小柴胡湯加減治柴胡半夏及黃芩白芍甘草青皮用川芎丹皮次第行引加薑棗水煎服青黛膽草熱可增右脅疼痛痰流注右關脈滑或走注有聲南星白芥白茯苓左脅痛時合四物按之有塊瘀血成痛處不移左關沉澀桃仁紅花宜加入痛甚乳香沒藥尋右脅有塊兼飽悶吐酸噯氣傷食症右關脈緊盛神曲麥芽厚朴及檳榔肉食山楂草果應脅痛口苦並寒熱耳聾嘔吐寒邪訣豬膽汁三匙入本湯神功妙用無人説脅痛內熱大便難沉實有力是熱結痛隨利減加大黃瘀血桃仁不可缺脈來微細又如何或大無力內傷多本湯須借人參力補中益氣合除疴示吉曰脅為肝膽之區禁用汗吐下三法司命者須知外治法內外夾攻自能速效一用白芥子水研敷痛處能消脅中痰又兼辛散一用吳茱萸研細醋調敷熱主流通又從治也一用韭菜一握縛定約寸許切斷成餅放在痛處上用尉斗火尉之使韭氣入內即愈餅爛再易一枚韭菜氣辛開鬱結又能逐瘀用者擇焉腰痛先天之本惟兩腎位在腰間藏精應房勞過度兩腎虛邪氣客之腰痛病腎虛為主有瘀血或濕或痰或鬱熱風寒挫閃總能疼益坎湯中加減説山藥山萸熟地黃香附烏藥續斷截杜仲故紙鹽酒炒丹皮澤瀉砂仁接引用青鹽空心飲尋常腰痛自然絶痛之不已習以為常屬虛知母黃柏脈數添或手足心熱面紅口乾屬熱炮薑肉桂脈遲設症足冷無熱不渴或瀉屬寒寒濕時見熱能除加蒼朮白朮肉桂良薑天陰疼痛知濕熱加黃柏蒼朮白朮川芎白茯苓挫閃板疼難俯仰歸尾桃仁牛膝列便結大黃並桂枝赤芍紅花治瘀血內有塊痛日輕夜重為瘀血治同挫閃尺脈浮時定是風天麻防風羌獨活脈來滑疾又名痰腰背重注走串雜南星半夏白茯苓白芷撫芎二術奪腰痛雖虛禁參耆寒涼之劑不宜遏久痛須加官桂開痛甚不妨加乳香沒藥祕法引經豬腰子煮湯煎藥功奇特若還大便祕不通酒蒸大黃不可忽又有腎著若物纏腰重如帶五千錢體冷如冰小便利白茯炮薑各四錢甘草炙白術各三錢炒煎每服四錢空心服示吉曰腰為腎府腎坎象也水火併焉水衰則相火旺而腎熱火虛則陰翳襲而腎寒水火俱衰土乘邪干均令腰痛官青娥丸大茴杜仲故子鹽酒炒各一兩熟地二兩胡桃肉四兩為末蜜丸空心酒下一方用豬腰子一具剖開入青鹽三錢杜仲末五錢濕紙包裹煨熟空心食之妙吹鼻點眼治閃腰痛法一用木香一錢麝香三分為細末右痛吹左鼻左痛吹右鼻令病人手上下和之一用兩瓜皮陰乾為細末點目內眥睛明穴立愈臂痛手臂因何作疼痛經絡血虛風濕中或寒或痰或有傷祕法活經湯有用蒼白二術共南星防風羌活秦艽動半夏桂枝羌獨活補血須用川芎當歸頌經寒蘄艾桂枝添或脈遲臂冷痰多白芥竹瀝薑汁送症麻木不仁或硬塊白色脈數臂熱酒炒芩屬濕熱身重痠痛蒼術倍進屬濕若因挫閃定為傷桃仁紅花靈仙應氣滯香附及薑黃氣虛黃耆人參幸右脈浮大無力服時食後引生薑臨服陳酒一杯定止痛法一用瓦曬熱尉痛處一用真蘄艾四兩揉成綿裹痛處二法均熱主流通通則不痛之法背痛背屬太陽膀胱經太陽氣鬱痛不行通氣防風湯可用藁本羌活獨活存各二錢防風川芎各一錢及甘草蔓荊各六錢生薑為引水煎成身重腰沉加防己脈遲附子藥如神二陳合治脈來滑背心一點冷如冰屬痰合二陳湯勞役過度常常痛十全大補定功成四君四物加耆桂薑棗水煎服或用補中益氣湯痛風俗名白虎歷節風古名痛痹遍身走痛名痛風血虛氣滯風濕攻濕痰流注脈來滑麻痹不仁經絡壅上盛為風脈浮數下盛為濕脈濡同日間痛甚為氣滯夜間痛甚血虛凶肥白人多痰蒼瘦火從風羌活有神功羌活蒼朮酒炒黃芩當歸白芍半夏均茯苓香附甘草陳皮用木香磨汁水薑增上痛防風白芷妙下痛黃柏牛膝尋熱痰瓜蔞並枳實竹瀝薑汁臨服入脈澀血虛生地川芎痛甚原須加乳沒發熱柴胡不可無臂痛桂枝加有益小便短澀合四苓骨節疼痛靈仙力按走注疼痛古名痛痹究其故血虛不榮內血瘀不養筋寒甚則凝滯濕痰則留結使榮衛滯塞而不通何怪乎其為痛也但痛而走注非寒痰濕血之所能其惟風之善行者乎古人定名良有以也祕方用桑枝一小升細切炒香水三升煎一升一日不拘時飲桑枝性平不冷不熱可以常服並能止嗽消食利便屢效眩暈頭眩昏暈病何如如立舟中氣喘時時暗生花身自轉耳聾昏倒事無知氣少血虛痰作病風寒暑濕亦須知內經眩暈責肝木風木主動故也丹溪痰火兩相持清暈化痰湯主劑陳皮半夏茯苓施各一錢五分白朮川芎羌活白芷各七分防風枳實膽星支天麻黃芩須酒炒水薑煎飲病當除勞役過度自汗重黃耆人參氣虛用去羌芷防風或用補中益氣湯失血産後是血虛當歸生地芍藥中去羌芷防星或用芎歸湯脈數黃連並山梔遲脈炮薑肉桂重痰多竹瀝及薑汁中濕身重增蒼朮或吐逆脈濡項強不仁風脈浮有汗桂枝白芍的筋攣掣痛脈浮緊寒則無汗紫蘇入冬加麻黃夏天煩悶暑脈虛麥冬五味香薷益麻木麻病如繩縛初放全無痛癢木之狀總是皮膚不仁濕痰死血木病成氣虛麻症方來當開痰活血治木方川芎茯苓當歸幢陳皮生地半夏芍藥添各一錢白芥桃仁紅花望各八分甘草生薑一併煎竹瀝薑汁臨服放臂上桂枝不可無牛膝靈仙下部蕩南星二術治濕痰寒壅經絡川烏壯麻症治法又如何益氣行氣功最多補中益氣湯為主參耆歸術陳甘升柴木香香附川芎徒青皮桂枝加少許棗薑煎服定除疴茯苓半夏有痰用脈來滑羌活秦艽夾風送脈浮者是身重脈濡蒼朮增夾濕瘦人脈數黃芩黃連頌夾火芩連酒炒肥人附子可引經醫須便制少許用痹證痹證有五原歸一骨痹皮痹筋痹脈痹肌痹其原總屬風寒濕風能走注寒善痛濕多重著脈來澀或浮或緊故有痛痹行痹著痹之名以致麻木皮不仁不能行功但能食舒經湯用好薑黃四兩洗去灰土當歸赤芍共白朮各二兩甘草炙羌活各一兩海桐皮二兩為末三錢生薑入盞半水來煎八分去渣磨入沉香汁痿症四肢軟弱名痿症但能飲食行難任五臟五痿出經書脈痿筋縱筋痿筋攣肉痿則渴骨痿腰膝不舉氣痿肺鳴皮毛枯稿獨取陽明脾肺病陽明脾肺之府皆由酒色真氣傷清心補腎病自定參歸養榮湯名用人參熟地當歸白茯苓陳皮白朮兼芍藥黃柏知母故紙酒炒行牛膝杜仲薑酒炒等分用甘草減半水煎吞肥人有痰加瓜蔞半夏瘦人多火用山梔黃芩酒炒若挾瘀血脈澀弱桃仁紅花宜所增食積妨礙亦成痿食積條中加減論示吉曰痹痿俱能食而不能行症相同也但痹多實痿多虛痹多寒痿多熱痹為濕痿為濕熱苟不明辨調治自差其要在有痛無痛中分有實為實痹也不痛為虛痿也此為異同者辨至於用藥又當隨其所挾看其所急譬之痿症雖虛若二便祕結熱燥腸胃能不用大黃以潤之乎痹症雖實若因勞役內傷懶言倦怠脈來無力能不用甘溫以補之乎東垣治痿以黃柏為君黃耆等補藥為佐而無一定之方蓋欲學者隨其所挾而用藥也癇痓卒時暈倒口流涎身軟口噤咬牙關聲類畜叫名癇痓五臟五癇病自煩總因痰火塞心竅作畜聲者譬之笛孔開閉不同而音各異不必分羊豬等症祛癇二陳湯名功不凡白茯半夏甘草陳皮犀角屑黃連枳實沉香截膽星遠志及菖蒲竹瀝薑汁臨服設辰砂為末好鎮心開關牙皂鉤藤絶示吉曰癇與痓相似但癇則身軟時醒痓則身強直反張如弓發不時醒為異仲景曰身熱足冷頸項強急惡寒時頸熱面赤獨頭搖卒口噤背反張者痓症也方具傷寒科中至於雜症成痓變症也大抵屬痰屬血虛血虛參歸養榮湯見痿症加羌活防風黃耆桂枝痰用瓜蔞桂枝湯瓜蔞芍藥甘草桂枝水薑煎服痓症多用桂者以痓為肝病肝木主筋桂能緩筋而伐肝所謂木得桂而柔也若陰證成痓難治回陽救急湯加桂枝白朮方在傷寒科癲狂肝實多怒名曰癲錯亂妄為不可言心熱多喜狂呼叫妄言妄見是狂然難經雖有陰陽別均為熱證河間説從來宜瀉補不宜在上吐之病自歇病在下者微利之吐瀉後將餘邪撤祛癇二陳湯見癇症甚有功但得寧靜補心血天王補心是妙方莫施溫補病難絶飲食過度病復來枉咎醫家不先説清心寡欲並安神恬淡滋味善調攝傷寒之病變發狂節齋方法真奇訣見傷寒邪祟欺人詈罵來承祖灸法第一節治火亢吐法治火亢甚喜笑不休用食鹽二兩放刀頭上用火燒赤研細入半夏三錢竹葉一兩河水二大碗煎三四沸去渣待溫入竹瀝半杯薑汁三匙頓服鵝翎探吐熱痰即愈下法治實熱大便燥結發狂用大黃四兩酒浸一夜水三升煎之分三服能食脈沉實有力者立愈秦承祖灸鬼法治一切驚狂譫語逾垣上屋罵詈不避親疏等症以病者兩手大指用細麻繩扎縛定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即無效矣七壯神妙治發狂祕方用好生犀角四兩銼末每用一兩加清水十碗入砂鍋內熬至一碗濾淨再加水十碗熬至二酒杯另以淡竹葉四兩水六碗煎至二碗去渣加犀角汁同服四服立愈婦人産後血迷心包亦令癲狂歌唱無時逾垣上屋宜加味逍遙散用當歸白芍白朮茯苓柴胡生地遠志桃仁蘇木紅花甘草水薑煎服此屬虛證宜補不宜瀉故豫拈出一方加辰砂末驚悸怔忡驚悸忽然心惕惕如人將捕時驚惑跳動不已名怔忡寤寐神魂多恍惚精神短少或多痰健忘之病因而得皆緣大恐與大驚觸事喪志心神失治用四物安神湯當歸川芎白芍地黃人參茯神梔子黃連酒炒白術麥冬酸棗竹茹當烏梅炒米引薑棗臨服研入辰砂好時跳時止定因痰二陳合用病自了心下悸動是水停豬苓澤瀉不可少健忘心氣不足事多忘有始無終作事忙發言首尾都忘卻思慮勞傷致病妨天王補心真妙藥川連酒炒二兩生地黃酒洗四兩當歸麥冬五味子柏仁棗仁元參當天冬茯神並桔梗丹參遠志合成方各五錢菖蒲一兩共為末蜜丸送下定驚恍硃砂為衣臨臥服引用燈草竹葉湯每服二三錢肥人脈滑痰迷竅膽星半夏莫相忘虛煩不寐虛煩不寐是何緣心熱膽寒病自兼痰涎沃心誠可怕加味溫膽病當痊半夏竹茹陳皮枳實茯苓甘草棗仁先遠志人參及五味熟地薑棗一同煎臨臥服熱在陽明不得睡竹葉石膏勝如仙傷寒條內分明説口渴自汗症相全示吉曰健忘驚悸怔忡虛煩不寤俱屬少陰故多用安神養心之品然須察其所挾挾水者合四苓挾痰者合二陳再察所因如因勞役過度或病後而來宜補中益氣湯加紅花入心黃柏滋腎其病自退若因思慮過度勞傷心脾而來者宜歸脾湯蓋思傷脾脾足則神寧意定也諸症總不宜涼劑重瀉脾土瀉伐心火火卻土衰則痰涎日甚而不可為矣歸脾湯治脾經失血發熱盜汗或思慮傷脾不能攝血以致妄行或健忘驚悸或心脾傷痛嗜寐少食血虛發熱虛煩不寐等症用人參白朮黃耆茯苓當歸遠志棗仁龍眼肉各一錢木香炙甘草各五分薑棗煎服黃疸疸雖分五實歸一黃汗黃疸酒疸谷疸女勞疸丹溪曰不必分五種總是濕熱如盫醬曲相似蓋是脾虛胃不實水穀濕熱相鬱蒸發黃腹滿溺黃汁有如盫曲遍身黃眼珠指甲俱金色欲除濕熱利小便茵陳五苓湯有力氣茵陳澤瀉豬茯苓由梔木通並白朮山楂枳實共甘草陳皮桂枝少許兼滑石薑棗燈心河水煎厚朴檳榔消食積身熱柴胡乾葛增腹脹腹皮卜子入傷酒白蔻共葛根浮腫蒼朮應有益口渴腹脹大便難加入大黃去白朮名加味茵陳大黃湯小便自利大便黑按腹則痛瘀血積桃仁承氣湯中加茵陳見傷寒噁心吐酸胸腹滿右關緊盛是傷食從飲食條中治二者俱宜勝金丹見鼓脹食消血去黃自息腹中無病能飲食二便如常不苦澀惟有身痛脈來大煩躁頭痛苦鼻塞此因寒濕客頭中瓜蒂搐鼻黃水出祕方搐鼻瓜蒂散用瓜蒂二錢為細末再入母丁香一錢黍米四十九粒赤小豆五分再研極細至夜令病人先含水一口將藥半字吹入鼻中待下或吐去水便睡至夜半或次日取下黃水則愈若病在遍身者內服茵陳湯示吉曰疸症在上者吐之微汗以散之搐鼻以除之在下者引而竭之大便實者下之必使小便清白為愈病之常治之經也外有瘀者逐之蟲積者消之寒者溫之病之變治之權也蟲積如吃泥土米炭發黃依蟲症條中治之陰證發黃四逆湯加茵陳詳傷寒條凡疸散成臌者危黃入手足心渴而熱甚者難治驗黃疸生死法用二指重按胸前膻中穴二指左右分開中間有血色者可治祕方外治用生薑一斤搗爛入酸醋一斤和平胃末二兩調勻遍身塗之少頃戰栗汗出內瀉黃水而愈斑疹遍身紅點名曰斑斑無頭粒疹生頭粒又多番疹有頭粒浮小隨出隨沒先紅後赤人昏憒脈來洪大更心煩熱傷血分乘虛出鮮紅稀朗方為吉紫黑稠密定傷生和解辛涼消毒力將出未出升麻湯升麻葛根川芎立甘草棗薑水煎服再著紅花亦有益已出之後去升麻以下加入牛蒡元參知母吃黃芩桔梗同犀角加入大青功妙極譫語口渴並自汗竹葉石膏粳米的驗斑疹紋迹法以紅紙燈照病人面部胸背四肢有紅點者斑疹也疹輕斑重先將薑汁噴於斑上隨輕重用藥若病人安靜脈不洪大紅點惟在手足且先紅後黃是紋迹也切宜細察濁症小便去濁名濁症皆因濕熱為之病白者如米泔名白濁赤者如赤膿名赤濁漩腳澄下凝如膏糊經曰水液渾濁皆屬於熱赤屬血兮白屬氣肥人濕痰膀胱滲清心蓮子用石蓮去殼取肉人參黃耆赤苓淨地骨麥冬及車前黃芩甘草功相應以下加減肥人須合二陳湯二術升麻柴胡亦莫剩酒炒知母黃柏脈數添久而不止升柴進澀精金櫻並蓮鬚山萸牡蠣真能任瘦人血虛因而得赤色居多合四物暑天伏暑用清涼香薷扁豆兼滑石白濁腎虛萆薢飲益智菖蒲烏藥等四味等分煎成入少鹽空心一服功成穩示吉曰便濁則降火清痰分利清濁則益腎滋陰固脫關要也外有肥人多濕痰清痰是要瘦人多虛火降火為先老人因虛寒而致可求溫補夏月因伏暑而然法用清涼是亦丹溪之法傳於言外也淋心與小腸為表裡心火動時相火起煎熬津液成五淋血石膏勞氣赤澀不通痛不已欲去不去住又來淋瀝疼痛無人理清心分利是良方犀角黃連梔子擬滑石木通共車前麥冬赤茯甘草抵竹葉蓮心燈草煎還加青黛痛脫體溺出砂石名砂淋石韋瞿麥葵子行血淋尿血莖中痛柏葉藕節生地臨不痛者為尿血膏濁頻數膏淋症茯苓白朮半夏真勞倦則發是勞淋人參黃耆當歸白術尋嘗有餘瀝身又冷是氣淋木香檳榔當歸澤瀉青皮瘀血作淋脈來澀牛膝煎膏病自平脈數黃柏知母方有效下陷升柴更覺靈脈來無力人參白術用大便祕結大黃行示吉曰三濁五淋俱小便去濁也濁多虛淋多實蓋淋痛濁不痛為異耳濁淋俱屬熱證惟其不痛大約屬濕痰下陷及脫精所致惟其有痛大約從淫欲火動強留敗精而然治之不可袞同故男子女人五淋帶下初起小便痛者用白茯大黃各一錢五分百草霜五分共為末雞子清調蒸熟作丸白湯下空心服尿白即愈毛公威傳此方泄瀉者不可用小便不通小便不通有二症渴在上焦肺熱病不渴方屬小腸來膀胱實熱通關應渴者須投清肺湯赤茯豬苓澤瀉當通草車前扁蓄妙木通瞿麥飲無妨琥珀為末引燈草空心一服是仙方若還不渴小便祕通關丸用知母黃柏意各一兩俱酒炒肉桂為末用一錢熟水為丸桐子例空心送下一百丸頓兩足時藥行易以上二症是大綱投之不利吐之愈皆因痰塞中上焦如玉漏然上竅塞而下竅閉法煎二陳探吐之久不通時當提氣勿用巴豆及牽牛大便祕結八正散濟若兼嘔吐名關格老人鼓脹總不利皆死症示吉曰小便祕日久則水滿而死急症也外治法不可不講一用皮硝一合連須蔥一根同搗用青布攤似膏藥貼腹臍上熱瓦尉之即通一用炒鹽尉臍腹一用麝香半夏為末填臍中上用蔥白螺螄二味搗成膏為餅封臍上用布帛縛定下用皂角燒煙熏入陰中自通女人用皂角煎湯洗陰戶若在胎前名曰轉胞是胎壓轉尿胞不得小便也宜穩婆托法詳女科總之右寸關滑實者多煎二陳湯以吐其痰因痰塞上竅以致下竅不通也右寸關細微無力或浮大無力是屬氣虛宜獨參湯補氣經云氣化則能出矣若左脈芤澀或小腹有痛塊是屬瘀血桃仁牛膝作丸服若大便黑者桃仁承氣湯一單方治小便閉脹急垂危者用自己爪甲燒灰水調服只取通竅之意也大便不通心肺清肅腎水節津液充足內不熱大便濕潤自調均若還祕結津液竭大腸無血致成災更兼邪熱因而結壯年氣盛可下之大小承氣真奇絶湯見傷寒婦人産後及老人久病之後作虛説若用巴豆並硝黃暫時取快禍最烈千金潤燥是良方生熟地黃當歸帖蘇子桃杏共麻仁四味炒為末枳殼厚朴黃芩列甘草燈心共水煎祕甚還加大黃劫大黃用酒拌蒸曬九次便通即去之腹痛檳榔木香開氣虛人參郁李來痰火瓜蔞並竹瀝風閉羌活牙皂裁一加郁李仁老人蓯蓉人參麥冬用産婦川芎白芍紅花該小便多時或自汗津液枯竭之故人參麥冬五味用扶衰示吉按丹溪曰西北人壯實開結為主東南人氣弱潤燥為要然因其地而分不若隨其證而治蓋便結因風寒熱病者雖東南雖老弱非用硝黃不可仲景所謂急下法也便結因於病後失血産後者雖西北雖年少亦宜滋陰補養丹溪所謂潤燥法也變通而治何病不克至於結在廣腸導法尤為捷要三法附後一用豬膽二三個每個傾去少許仍入醋在內用蘆管相接縛定一頭套入穀道以手捻之令病人提氣如忍大便狀膽汁入內即通蓋酸苦能益陰潤燥也一用香菜油或麻油入豬膽中如上導法一蜜導法用白蜜六七兩煉稠厚黃色滴水凝硬再加入鹽五分皂牙末五分和勻急傾入冷水中捻如指大三四塊先將香油抹穀道中後用蜜條放入即通二便閉肝腎實熱二便閉大便行時小便利八正散中用大黃木通滑石車前意扁蓄瞿麥並山梔甘草燈心水煎例少壯驟病服如神老人虛弱藥所忌外治法用蝸牛三個連殼研如泥加麝少許貼臍中以手按之立通一用白螺螄搗爛填臍中亦妙一用香豉一十粒連須蔥一根勿洗生薑一塊食鹽二匙同研爛捏餅烘熱掩臍上以帛扎定良久氣透自通否則再易祕方用白蜜半盅白湯泡開入元明粉三錢空心服血熱便祕用當歸五錢煎湯調服元明粉三錢並妙脫肛肺與大腸為表裡肛門閉結肺熱理肺臟虛寒則脫肛瀉痢久虛下陷起老人虛弱小兒元氣不足産婦用力過度故有此症舉氣湯中人參與黃耆川芎當歸升麻五味已薑棗水煎空心服外治好將熱尿洗鞋底烘熱捺進去再點冰片亦得體冰片為末點肛上泄瀉脫肛去當歸補中益氣甚有禮大便乾澀努力來是為熱脫清涼擬脈數實肛門澀痛黃柏知母四物湯枳殼黃芩病自已收肛散用熊膽五分兒茶五分冰片二分為細末乳調抹肛上熱汁下而肛收矣熱瀉脫肛者佳並治痔漏三消心熱移肺名上消多飲水漿二便調或舌上赤裂多飲少食宜清金降火火熱在胃偏多食大便硬兮小便赤名中消善食而瘦自汗治清胃理中下消腎熱渴飲湯耳輪焦乾便淋瀝小便淋瀝如膏狀治宜清火養陰其名雖有三般異津液乾枯血虛一天花解毒治三消花粉麥冬五味粒葛根生地及川連人參當歸甘草吃竹葉蠶繭及燈心徐徐服下有神力山梔桔梗治上消黃芩石膏中消入黃柏知母治下消薑椒辛辣不可食烏梅蓮肉合煎膏合本方煎膏再加下幾味人乳牛乳藕梨汁再加白蜜共煎成不拘時候徐徐吃此症皆從燥熱來能食須防發毒物不能食者傳中滿鼓脹等病醫宜識示吉按渴症有三總歸無水外有酒毒作渴非葛花不除暑邪消渴非香薷不愈喜食炙煿甘肥令渴豆豉有效汗吐下後胃液不足而渴惟人參有功青梅止渴胃干暴渴宜加朽木作湯熱中消中當飲北梨甘蔗性水味甘酒渴鹽傷俱解病因不同歌難盡載從此消息亦有補也朽木土中水中者良方寸者三十枚煎湯飲治肥甘炙煿嗜酒耽辛以致消渴者佳喜飲酒灼人真陰愛海味喪人真液皆令消渴蔗汁梨汁主之夢遺夜精遺失多因夢心火旺時相火動清心寡欲是良方黃連生地當歸頌石蓮遠志共人參甘草茯神酸棗用不愈蓮鬚金櫻膏臨服食鹽少許送滑精無夢遺精是滑精陰虛火旺水難存澀精清火併節欲保精湯用自安寧川芎當歸白芍生地知母黃柏炒黃連梔子牡蠣搗沙參麥冬並山萸薑灰少許元精保不愈辰砂共龍骨為末臨時調服好一用固真湯治無夢而遺用蓮蕊石蓮芡實棗仁遠志茯神天麥冬桔梗車前龍骨等分甘草減半燈心水煎調辰砂末服此症大法不可用涼藥不可純用澀藥腳氣寒熱嘔逆傷寒意腳膝痠軟疼為異腫濕腳氣實因濕不腫熱痛乾腳氣麻者因風必無汗走注而脈浮痛者寒拘急脈遲腫為濕氣身重例筋弛脈濡防己飲子總能司木通防己蒼朮鹽炒計生地木瓜與檳榔犀角川芎黃柏酒炒味甘草梢頭用水煎內熱黃芩黃連倍生地先痛後腫用川芎氣傷血先腫後痛犀倍記大便祕結加桃仁結甚加大黃小便澀時牛膝利有痰竹瀝並半夏風盛秦艽羌活易嘔吐喘急最為凶腳氣臨心病所忌示吉曰脾氣虛弱胃氣下陷亦令足跗氣腫蓋脾具坤靜之德而有乾健之運中氣衝和則升清降濁而無病若勞役久病脾氣致傷土不制水胃中水穀之氣下陷令人跗腫宜補中益氣湯升舉其下陷之陽浮腫自愈若以牛膝木瓜之類治之病日甚矣腳氣外治法最妙一用附子末津調塗湧泉穴一用川椒一兩蔥一握生薑三兩打碎水十碗同煎洗腳寒濕腳氣疼痛不仁俱治一用木通二兩水煎頓服治足膝腫痛一日後發疹則愈如夾用他藥不效疝小腹急痛連睪丸疝氣還來有七般寒水筋血氣狐㿉七疝總為房勞並辛苦履冰涉水又經寒素問以下皆寒治丹溪濕熱法方完暖腎散中荔枝核橘核炒為末故紙杜仲青皮力烏藥香附及檳榔木通川芎炮薑益川楝肉桂並當歸川椒大茴砂仁入等分為末服五錢空心酒下功難述示吉按雲林集云腸中走氣作聲或痛者盤腸氣也少腹陰囊手按作響聲者膀胱氣也臍旁一硬升上鉤痛者小腸氣也小腹下注上奔心腹急痛者腎氣也陰子偏大小者偏墜也陰子雖硬大而不痛者木腎氣也俱因熱鬱於中寒束於外宜神效湯用大茴延胡益智蒼朮香附當歸山梔各一錢木香吳萸各七分川烏五分砂仁七分甘草三分薑燈心水煎臨服加酒脹悶而痛加乳香沒藥瘀血脹痛加桃仁紅花川芎腎氣上衝加沉香枳殼此方亦穩子一日治二疝一人升上作痛一人墜下作痛俱悶痛欲絶求方於豫升上者豫定故紙三兩炒黑醜一兩生硫黃七錢俱為末鹽酒打麵糊為丸鹽酒送下墜下者豫定補中益氣湯加杜仲故紙肉桂炮薑香附川芎二人駭曰疝氣同也何方之不同若是豫曰姑試之至明日而皆愈諸蟲濕熱生蟲古所云皆因飲食不調均牛羊莧鱉都生積米泥茶炭等生成面色萎黃心腹痛飲食少進肉不生椒梅湯治諸蟲症嘔吐涎沫腹痛甚烏梅川椒及檳榔枳實木香香附應川楝砂仁與厚朴肉桂炮薑甘草順等分生薑並水煎先食蜜糖藥後進十五以前蟲向上服之即效如律令望後蟲頭向下行先用蜜糖肉汁滲引蟲頭向上然後用藥按遇仙丹下蟲之藥也小兒最多蟲症急宜修合用白黑醜頭末一兩檳榔半生半炒一兩山稜蓬朮醋炒各五錢牙皂三錢為細末糖拌小兒一錢大人二三錢酌虛實用之糖湯送下空心服耳病耳為腎竅病屬腎腎虛耳聾不能聽少陽膽經絡繞入耳感受邪氣耳鳴應醇酒厚味動胃火亦致耳鳴紅腫盛右屬陽明左少陽紅腫流膿風熱病蔓荊散用蔓荊木通桑皮蜜炒赤芍升麻定生地前胡赤茯苓菊花甘草俱等分薑棗煎成食後服膽草柴胡黃芩左痛進右聾須合地黃丸川芎當歸芍藥功成峻風熱熾盛脈浮洪荊芥防風白芷川芎柴胡靖按腎虛耳鳴聾者宜地黃丸加川芎芍藥當歸黃柏菖蒲遠志肉或煎或丸俱妙若耳中紅腫疼痛用蔥搗汁滴入即愈若耳中流膿豫家祕方白龍丹枯白礬一兩飛過東丹二錢半海螵蛸一錢龍骨一分半麝香冰片各一分為極細末綿紙條捻盡膿水吹入少許即愈若耳後陷中紅腫恐成天疽急用神仙活命飲合小柴胡消之倘成膿則難治慎之目病目疾主治有專科五輪五臟肝居少目精屬肺曰氣輪烏珠屬肝曰風輪大小眥屬心曰火輪上下胞屬脾曰肉輪瞳神屬腎曰水輪目得血養方能視肝經風熱目生疴暴赤腫痛眼梢爛迎風出淚怕日過羌活飲子羌防風赤芍白芷薄荷川芎甘草陳皮兼枳殼柴胡乾葛亦相通水煎乘熱先熏眼徐徐服下有神功山梔黃芩內熱用龍膽連翹肝火攻酒蒸大黃加錢許釜底抽薪妙不窮不能久視昏花暗腎經真水虛弱保又宜明目地黃丸熟地飲子金不換熟地當歸麥門冬枸杞芍藥川芎伴丹皮羌活與防風菊花燈草真有干相火旺時加知母黃柏氣虛人參黃耆入熱甚黃連及黃芩損者益之自有力洗眼法一用防風荊芥連翹白芷歸尾甘草朴硝白礬膽礬少許水煎去渣乘熱洗一用古青錢三文黃連三分杏仁三粒艾一葉水一杯煎三分去渣澄清一夜次日頻頻洗之凡患風熱眼眶腫爛者佳治雀盲方蒼朮炒為末羊肝同食即愈用齋者豆腐同食凡晝明夜暗者佳鼻病無形之氣通於鼻鼻塞聲重風寒客傷寒傷風在本條膽移熱腦鼻淵責俗名腦漏辛夷散能治鼻淵白芷一兩辛夷蒼耳得各二錢半薄荷五分共為末每服二錢蔥湯食食後服喜飲熱酒肺熱傷赤鼻名為酒齄鼻祕方只用連翹仁四兩為末湯來吃臨臥服二錢鼻孔生瘡氣不通香臭莫辨息肉塞辛夷川芎與防風木通細辛藁本的白芷甘草及升麻等分為末三錢茶調益外用冰片吹鼻中內外兼治法有力用狗頭骨燒灰加硇砂少許為細末搐鼻中瘜肉自化口舌病口屬脾經舌屬心舌和五味自知口肝熱口酸食亦作酸心熱苦內熱亦口苦脾熱口甘疸亦生腎熱口咸虛則淡寒亦口咸肺熱口辣自生成口乾欲飲皆為熱喜唾停水胃寒侵內傷勞倦淡無味漱水不咽屬寒陰蓄血症亦喜漱水不欲咽上焦鬱火口舌碎或腫無皮神憔悴重舌木舌口乾焦二寸洪數熱為祟玄參飲子是神方玄參牛蒡連翹貴甘草桔梗共黃芩黃連生地枳殼最白芍薄荷炒山梔燈草同煎祛病纍牙肉腫兼白虎湯石膏竹葉知母粳米口酸膽草柴胡青皮類不愈牛膝及車前引火下降如神謂大便結時酒大黃加酒半杯不可醉示吉曰口舌病屬熱者多故古人多用本方然亂世之民勞勞則虛虛則近於寒故屬寒者亦不少其證口舌生瘡脈來無力微遲飲食少思大便不實足冷服涼藥不效者是也是命門無火浮陽上升宜八味地黃丸或用官桂噙之總之口舌症若因勞役致病房欲無度或費心憂愁而來者須從各症本條合元參飲細心加減用之實熱口碎用元明粉煎湯噙漱甚妙一外治法舌腫滿口不能出聲用蒲黃摻之即效一用百草霜錢許調服一人無故舌上出血仍有小竅炒槐花為末摻之即愈熱證多舌出有病愈而舌不入者冰片一分抹舌上即收有舌腫出口外以萆麻油蘸紙作燃燒煙燻之隨即消縮齒病木生於土齒生床床牙肉內骨床本陽明齒腎生下床嚼物大腸脈屬手陽明動而不休上床不動胃經當足陽明止而不動厚味濕熱陽明病牙床腫痛理所定竹葉石膏是主湯石膏淡竹升麻知母順玄參糯米及山梔水煎服時痛自應吸風痛甚是為風羌活防風荊芥白芷細辛川芎進齒齦宣露動搖長腎元虛損地黃尤峻虛熱六味丸虛寒八味丸示吉曰牙痛多腫口穢臭屬火者多故木方用涼藥而挾風者兼風治也外有蟲蛀痛寒痛俱宜外治法一用白芷北細辛各五分肉桂麻黃草烏各三分真蟾酥分半為細末麵糊丸桐子大每用一丸咬痛牙下即愈一用防風荊芥芫花蜂房各一錢川椒十粒細辛三分食鹽少許水醋各半煎漱口立愈二方風寒蟲痛俱治一用蓽菝咬定痛處一用川椒章冰為末放碗內上用一碗合蓋用紙糊口不使漏氣下用稻柴火一握其藥即升上矣取下擦痛處神效咽喉症咽喉之位司呼吸人身槖籥緊要極忽然腫痛語言難十八種病水難入主治加味甘桔湯一切實火總皆息甘草桔梗共山梔連翹防風枳殼益黃芩生地並當歸等分白芷薄荷減半入燈草細茶共水煎山豆根末調服吃麥冬花粉咽乾用發熱柴胡亦有中痰甚射干瓜蔞竹瀝牛蒡元參生瘡動熱極便祕酒大黃虛火泛上柏知重此藥總宜徐徐服吹藥外治能蠲痛示吉曰咽痛熱多寒少本湯十有九中若因飲食勞倦無根虛火上炎脈遲足冷者非甘桔所司也照口舌病浮火上升法治之吹藥外治法一用膽礬為末吹喉中吐出痰涎便愈一用火硝一兩五錢明雄黃二錢硼炒五錢殭蠶一錢冰片三分為細末筆蘸藥圈痛處立效一用膽礬白礬火硝片腦山豆根辰砂雞內金等分為末用鵝毛管吹藥入喉即愈一用膽礬五分半枯半生熊膽木香各二分為細末用番木鱉磨並水調和以鵝翎蘸掃患處立消針法喉中紅赤用針從旁針之血出則愈旁針不犯啞門穴也一針少商穴穴在患人手大指外邊指甲後一韭葉許針之出血男左女右取之如危急兩手俱針神效
