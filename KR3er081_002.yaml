風通血滑腸潤肌白濁能絕油能解毒疥癬妙絕豆豉苦寒煩躁滿悶寒熱頭痛解表須問綠豆甘寒散疹厚腸消腫下氣熱毒最良十八反歌本草明言十八反半夏瓜蔞貝母白蘞白及攻烏頭海藻大戟甘遂芫花俱反甘草諸參細辛白芍叛藜蘆參謂人參丹參苦參元參沙參十九畏歌硫黃原是火之精朴硝一見便相爭水銀莫與砒霜見狼毒最怕密陀僧巴豆性烈最為上偏與牽牛不順情丁香莫與鬱金見牙硝難合京三稜川烏草烏不順犀人參最怕五靈脂官桂善能調冷氣若逢石脂便相欺大凡修合看順逆炮爁炙煿莫相依君臣佐使法弘景曰用藥猶如立人之制若多君少臣多臣少佐則氣力不周也按神農本草經以養命上藥為君養性中藥為臣治病下藥為佐使岐伯曰方制君臣者主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也張元素曰為君者最多為臣者次之佐者又次之藥之於證所主同者則各等分李杲曰凡藥之所用皆以氣味為主補瀉在味隨時換氣主病為君假令治風防風為君治寒附子為君治濕防己為君治上焦熱黃芩為君中焦熱黃連為君兼見何證以佐使藥分治之此制方之要也本草上品為君之說各從其宜爾制度引經法陳嘉謨曰製藥貴在適中不及則功效難求太過則氣味反失火制四煅炮炙炒也水制三漬泡洗也水火共制蒸煮二者焉法造雖多不離於此酒製升提薑製發散入鹽走腎而軟堅用醋注肝而住痛童便制除劣性而降下米泔制去燥性而和平乳制潤枯生血蜜制甘緩益元陳壁土製竊真氣而驟補中焦麥麩皮製抑酷性勿傷上膈烏豆湯甘草湯漬曝並解毒致令平和羊酥油豬脂油塗燒咸滲骨容易脆斷去穰者免脹抽心者除煩大概具陳初學熟玩服藥時候法本經曰病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽食而在夜東垣曰古人服藥活法病在上者不厭頻而少病在下者不厭頓而多少服則滋榮於上多服則峻補於下凡云分服再服三服者要令勢力相及並視人之強弱病之輕重以為進退增減不必泥法好古曰用藥若寒熱各半晝服則從熱之屬而升夜服則從寒之屬而降或晴則從熱陰則從寒變化不一如此此三論各呈妙旨學者於此貫通之自能得其活法也㕮咀丸散合宜法李杲曰湯者蕩也去大病用之散者散也去急病用之丸者緩也舒緩而治之也㕮咀者古制也古無鐵刃以口㕮細煎汁飲之則易升易散而行經絡也凡治至高之病加酒煎去濕以生薑補元氣以大棗發散風寒以蔥白去膈上痰以蜜細末者不循經絡只去胃中及臟腑之積氣味厚者白湯調氣味薄者煎之和滓服去下部之病其丸極大而光且圓治中焦者次之治上焦者極小稠麵糊取其遲化直至中下二焦或酒或醋取其收散之意也犯半夏南星欲去濕者丸以薑汁稀糊取其易化也水浸宿炊餅又易化滴水丸又易化煉蜜丸者取其遲化而氣循經絡也蠟丸取其難化而旋旋取效或毒藥不傷脾胃也煎藥法李時珍曰今之小小湯劑每一兩用水二甌為準多則加少則減之如劑多水少則藥味不出劑少水多又煎耗藥力也凡煎藥並忌銅鐵器宜用銀器瓦罐洗淨封固令小心者看守須識火候不可太過不及火用木炭蘆葦為佳其水須新汲味甘者流水井水沸湯等各依方若發汗藥必用緊火熱服攻下藥亦用緊火煎熟下硝黃再煎溫服補中藥宜慢火溫服陰寒急病亦宜緊火急煎服之又有陰寒煩躁及暑月伏陰在內者皆水中沉冷服貴賤少長異治宗奭曰人有貴賤少長病當別論病有新久虛實理當別藥蓋人心如面各各不同惟其心不同臟腑亦異欲以一藥通治眾人之病其可得乎張仲景曰有土地高下不同物性剛柔餐居亦異是故黃帝興四方之問岐伯舉四治之能且如貴豪之家形樂志苦者也衣食足則形樂而外實思慮多則志苦而內虛故病生於脈與貧下異當因人而治後世醫者委此不行所失甚矣又凡人少長老其氣血有盛壯衰三等故岐伯曰少火之氣壯壯火之氣衰蓋少火生氣壯火散氣況衰火乎故治法亦當分三等其少曰服餌之藥於壯老之時皆須別處決不可忽病在上而求諸下示吉曰凡病頭痛目痛耳紅腮腫咽喉腫痛一切上焦等症除清涼發散正治外更有三法大便結脈沉實者用酒煮大黃三錢加入湯中微下之名釜底抽薪之法大便如常脈無力用牛膝車前引下之名引火歸原之法如大便泄瀉脈沉足冷者宜六味地黃丸加牛膝車前肉桂足冷甚者加熟附子是冷極於下而迫其浮火上升也名導龍入海之法若不知此不免頭痛醫頭之誚也一同學年二十餘歲患腮腫醫以清涼散火之劑不效一夜舌忽腫塞口命在須臾叩門求救予診其脈微細而數大便四五日不行矣微數雖屬虛火而便結又已屬實予用百草霜吹舌上內用酒蒸大黃五錢肉桂一錢引火下行一劑而愈一友始於牙痛既而咽腫醫投涼藥而轉甚予診其脈沉細大便一日二三次予曰浮火上升也其足必冷察之果然以金匱腎氣料作湯與之服完即睡覺來病失矣病在下而求諸上示吉曰凡治下焦病用本病藥不愈者須從上治之如足痛足腫無力虛軟臁瘡紅腫用木瓜米仁牛膝防己黃柏蒼朮之品不愈者定是中氣下陷濕熱下流用補中益氣升提之若足軟能食而不能行名曰痿證宜清肺熱如治泄瀉用實脾利水之劑不效亦用升提補中益氣去當歸加蒼朮炮姜脈遲再加故紙肉蔻如治下痢日數行寸口脈滑者宜吐之如治溺血用涼血利水不效宜清心蓮子飲清心復不止再加升麻柴胡如治大便下血用地榆側柏槐花棕灰蒲黃荊芥血餘阿膠等件不效者若兼泄瀉再診其脈如右關微細或數大無力是脾虛不能攝血宜用六君子加炮姜若右關沉緊是飲食傷脾不能攝血予制沉香末子甚驗若右寸洪數大便如常是實熱在肺熱主流通傳於大腸宜清肺熱用麥冬花粉元參枯芩桔梗五味枳殼之類如小便閉用五苓車前瞿麥不效者須加清肺藥桑皮桔梗元參之類脈虛口渴者用生脈散加燈心木通之類經云氣化則能出矣若上部脈滑有痰是痰壅於上如玉漏之上竅塞而下竅閉也宜用二陳四君煎大劑頓服鵝翎探吐之徐萬壽楓江人年二十餘歲七月中下血不止遍醫不效至十月初屢次昏暈事急矣求治於予予診之右寸獨得洪數是必實熱在肺傳於大腸也用麥冬花粉桔梗元參黃芩山梔五味沙參服數劑而愈胡明甫年五十餘患臁瘡三載沿皮瘙癢微腫色紫黑用膏藥蓋之則流水鞋襪盡濕去膏藥即又燥烈癢痛難忍易醫數人內外兼治日甚一日不得已而求予予曰予非瘍醫然亦識之此濕熱下流也人但知燥濕清熱解毒而不知濕熱之原從脾家下陷耳遂用補中益氣湯升舉其氣更加黃柏清熱蒼朮燥濕茯苓澤瀉利水治濕不利小便非其治也彼求外敷藥適在山中未便細思之燥濕散瘀者無如陳石灰清熱者無如側柏汁皆山中所有遂以石灰研末搗柏汁調勻稍加火酒為從治之具試之明日則瘡干矣數日而全愈吳江吳姓者巨族也有子十餘歲下血已久百藥不效乘便過湖乞藥予以沉香末子數服與之一月後遇諸途復索前藥甚急予曰尚未愈乎彼曰子愈矣猶子亦病此也後服之亦愈蓋小兒多因食傷脾胃以致不能攝血也昔丹溪已言及之其外泄瀉溺塞痿證治驗頗多然古人已有成案予又附之則蛇足矣虛中實虛中實者本虛而標實也如年老久病氣血兩虛若兼內有所損外有所感補之不應也至於傷寒熱病後元氣雖虛補之必復熱若多食食復尤宜消導瘧後痢後中氣脾元未復飲食易傷風寒易襲最宜細察產後發熱血虛者多若兼惡露不行腹有塊痛其熱也血滯無疑若兼胸腹滿悶咽酸噁心其熱也停食無疑若不用行瘀消導而概施補血之品其能愈乎小兒痘後惟當補益倘兼他病亦宜察風食而調理之蓋表虛而風易入脾虛則食易傷也周忠介公夫人年六十餘患痰喘五六年醫藥無效士材先師診之曰右寸浮洪肺有實邪須用麻黃石膏半夏防風細茶生薑等件藥雖峻而病當之無畏也投之果愈但麻黃只可用二三分服後兼須避風耳山塘吳氏母年六十餘外患腹痛日瀉四五行已三四年矣遍治不愈予診之二尺沉緊予曰內有沉積也用熟大黃三錢入本病藥中煎服一劑而病如失管於諫夫人小產後惡露不止屢發昏暈面色㿠白噁心不食自汗六脈微細而數治以四物湯加參朮姜灰服數劑虛證稍退而血亦止但大便秘結腹痛不食如故而咽酸發熱尤甚諸醫束手予於前方中加酒蒸大黃二錢大便始潤而發熱咽酸漸愈崇明肖氏寄居吳門之西山有婦二十餘歲素虛弱患熱病將一月醫者滿堂弗愈一夕忽死其父叩門求救予曰已死矣又何救焉彼曰死其分也若得一決尤所甘心不得已嚮往至其家帳已揭帛已焚慟哭之聲徹於中外予就視之脈雖無重按尚存心口微溫予曰似有生機即用竹瀝燈心生薑湯灌之嚥下一口少頃微動細察之腹痛甚問其大便云二十日不食亦不行矣予以大黃一兩芒硝五錢桃仁當歸各三錢與之眾駭曰素有弱證且病久何能堪此予曰更有法在強與之遂去黑物半桶即用人參五錢煎湯補之蓋因其素弱急下後不得不峻補也調理月餘而愈今連生三子此諸醫因其虛而不治其實幾誤矣從此亦可例推實中虛實中虛者今實而素虛也如病人現在頭痛體痛身形拘急惡寒發熱無汗此表實也宜汗之若其人有虛證或吐衄下血或夢遺滑精或小便淋濁或大便瀉利或內傷勞倦或房勞陰虛或動氣瘡痛或胎前產後或熱入血室或口燥咽乾或尺脈微弱俱不可汗汁之則自汗亡陽而變為肉瞤筋惕等症如病人現在發熱潮熱煩渴譫語腹脹硬滿大便五六日不通此裡實也宜下之若其人有虛證或內傷勞倦或房勞陰虛或氣血兩虛或胎前崩漏或經水適來適斷或小便清白或手足逆冷或臍有動氣或腹痛按減或六脈無力或小兒病後慢驚或傷寒惡寒及表證在者俱不可下下之則自利亡陰而變為逆冷昏沉等症如病人現在胸滿鬱郁微煩或食在胃口或喉中有痰或胸中懊憹或寸口脈滑皆病在膈上也宜吐之若其人老弱氣衰或吐衄崩漏或勞倦內傷或好怒喜淫或胎前產後或熱入血室俱不可吐吐之則自吐不止而變為呃逆喘急厥逆等症外如腹胸脹滿實也若其人平素少食或不思食或右關微細或脹滿手揉則軟或不噯氣作酸惡食俱屬脾虛不運化如胸脅腹中諸痛實也若其人手按痛減則為虛證氣血不能運行上氣喘急實也若其人勞倦內傷或奔走太過或房勞陰虛皆為氣虛不得歸原面赤煩躁實也若足冷脈沉無力自利則為陽虛陰極發躁之證凡此種種皆虛實互見或虛證似實失辨為害最速故先哲已詳言之示吉曰識藥易察病難察病易用藥適中難何也古人用藥有因天之寒溫而異有從人之虛實而殊故麻黃汗藥也或代之以羌活或易之紫蘇或佐之以石膏久虛無汗身癢如蟲行乾葛亦解表熱大煩口噤不能言柴胡能療此皆輕重發汗之法故用大黃下藥也或助之以芒硝或調之以甘草或佐之以桃仁或兼之以柴胡或上行而酒浸或散滯而姜炒或同人參以調氣或兼當歸以養血或欲其走而生用或使其留而九蒸或大下而用一二兩或微利而用五六分此皆急下微下之法若夫吐法瓜蒂散其首方也至於桐油吐喉痰常山吐瘧痰膽礬吐喉閉鹽湯吐霍亂二陳湯黃齏汁桔梗蘆人參蘆蔥根汁卜子汁無非湧吐之物但藥之無毒者宜大劑而頓服藥之有毒者宜少服而漸加服後或以手指探或以鵝羽撩不出以齏汁投之不吐再投且投且探無不吐者吐至瞑眩慎勿驚疑但飲涼水立解此隨症吐湧之法也外如枳實消痞佐以白朮知柏滋腎導以桂心膽汁童便入白通以祛寒炒黑乾薑入四物以治熱冷藥熱服熱藥冷服如此種種先哲豈好為多歧哉亦為用藥適中之難用此苦心耳陳案固多不容贅述治病須求其本夫治病當知標本以身論之外為標內為本陽為標陰為本故六腑屬陽為標五臟屬陰為本臟腑在內為本十二經絡在外為標而臟腑陰陽氣血經絡又各有標本焉以病論之先受為本後傳為標故百病必先治其本後治其標否則邪氣滋甚其病益蓄縱先生輕病後生重病亦先治其輕後治其重則邪氣乃伏有中滿及病大小便不利則無問先後標本必先治滿及大小便為其急也故曰緩則治其本急則治其標此東垣之法也然脹滿便閉亦有標本之分故先喘後脹病在肺喘為本而脹為標治宜清金降氣先脹後喘病在脾脹為本而喘為標治宜實脾利水血分之症先經水斷絕而後浮腫腫為標而血為本先治血後治腫先腫而後經絕腫為本而血為標先治水此皆先哲之陳案同志者可旁通也貝葉齋僧永譽初患疥自以水銀蘄艾熏之遂喘急胸滿漸至遍身浮腫一醫投之五皮飲不效復以椒目大黃等投之喘愈急而腫愈甚延予視之予曰疥在皮膚肺氣熱也復以火熏火毒傷肺遂失降下之令氣道塞水道閉喘急溺澀浮腫之所由來矣今復推蕩陰血又傷若非童真難免於死矣遂以麥冬黃芩山梔桑皮花粉滑石木通燈草與之服四劑而諸症皆愈制方定見北直梁敬州客楓江年六十餘病濁已三年淡滲寒涼溫補之品投之俱不效求治於予予診之六脈俱微惟左寸帶數予曰此因心火不降以致脾胃之氣不升白濁之物因而下滲耳法當養心升補若用本病藥無益也遂制方用丹參茯神遠志棗仁山萸山藥黃耆白朮升麻柴胡甘草陳皮薑棗煎服服三劑其濁倍至彼懷慍曰抑何故也予問其體中健否彼曰如故予曰若使所出者盡為津液體必憊甚今濁增而體健知白濁之物積於其中為藥所迫而出耳清者既升濁者自降再服二劑所積者盡而病如失矣投之果然由此觀之若無定見庶必再換一方寧能愈乎此亦可例推調攝得宜穹隆盛氏一子一女俱十餘歲病劇延予視之予問何恙曾服何藥彼曰男患胸滿寒熱曾服小柴胡加消導藥女患內熱乾咳特甚曾服清火滋陰麥冬黃芩之品其方俱在但服之不愈予診之男得浮弦女得弦數予曰脈證湯藥甚相合也因何不愈沉思間忽聞女衣有煙火氣予視之曾臥火箱中乎曰然予即以前方銼藥與之令其遷臥床上其子亦以前方與之令其避風絕食服藥完而二人皆愈其父駭問曰方藥相同也何效之不同若是邪予曰令郎風食證之輕者也惟其輕也不避風不絕食宿食未消而新食復傷舊風未散而新風又襲矣若令嬡咳嗽火熱爍金而用清火潤肺之品治之甚當其如外火復逼一杯水其能救一車薪火乎此其所以皆不愈也予因此而加之調攝故愈
