body:
  text: 卷之首望色經曰望其五色以知其病故望色者活人之首事也靈樞經曰以五色命臟青為肝赤為心白為肺黃為脾黑為腎內經云五臟之氣色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝樓實生於腎如以縞裹紫此五臟所生之外榮也內經以一色之中而分平病死三等至靈樞又分明臟腑部分及浮沉淺深夭澤散摶等法蓋以其道之不容忽也予略陳其要夫五色有光明亮是也五色有體潤澤是也光者無形為陽陽主氣體者有象為陰陰主血氣血俱亡其色沉晦枯槁經所謂草茲枳實炲衃血枯骨五者是也氣血尚存其色光明潤澤經所謂翠羽雞冠蟹腹豕膏烏羽五者是也此五色雖為可生終為一臟之色獨亢亢則害病也非平也蓋平人五臟既和其一臟之色必待其旺而始榮於外其榮於外也稟胃氣而出於皮毛之間胃氣色黃皮毛色白故云如縞裹如縞裹者朦朧光澤雖有形影猶未燦然內因氣血無乖陰陽不爭五臟無偏勝故也苟或不然五臟衰敗其見色也昔之朦朧者一變而為獨亢昔之光明者一變而為沉濁昔之潤澤者一變而為枯槁甚至沉濁枯槁合而為夭是光體懼無陰陽氣血俱絕不死又何待哉六節藏象論曰草生五色五色之變不可勝視至於臟腑部分容色上下淺深散摶等法未能盡陳容於望色全書中述之聞聲經曰聞而知之謂之聖如辨音者聽其聲即可以知其物雖非玄述誠非淺易蓋不由音律之道造必於靜定中得也予姑以經書中要者言之經曰肝在音為角在聲為呼心在音為徵在聲為笑脾在音為宮在聲為歌肺在音為商在聲為哭腎在音為羽在聲為呻口出無倫譫語也有虛有實無稽怒叫狂言也實證出言壯厲先輕後重者外感也語立懶怯先重後輕者內傷也語不接續鄭聲也無人始言獨語也三證屬虛鼻塞聲重傷風也聲啞唇瘡狐惑也卒口噤背反張痓證也鼻鼾語塞風溫也錯語呢喃出言不正熱證也心下汩汩有聲先渴後嘔停水也喉中轆轆有聲痰也腸若雷鳴氣不和濕也小兒驚風口不能言心熱也無還聲為鴉聲死症也雜病發喘癆瘵聲啞危病也以上種種若能細察實能活人至於聞其五音以知其所苦是神聖之道存乎司命者之方寸耳問症示吉曰望聞問切察病之四法也望色聞聲切脈古人反復言之至於問而知之之謂工先哲尚未發明不無有疑焉何以故如至病家問其瀉痢以知其瀉痢問其寒熱以知其寒熱則淺矣必非古人之意也即至病家問其病起於何日日少為新病實證居多日多為久病虛證居多曾食何物食水而痢藥用水煎如傷肉食用草果山楂之類詳傷食本條曾有怒勞房欲等事怒則傷肝勞則內傷元氣房勞則傷腎及問初起何症如初起頭痛發熱惡寒屬外感如初起心腹疼痛及瀉痢等病俱屬內傷後變何病如痢變瀉變瘧為輕瘧瀉變痢為重先喘後脹病在肺先脹後喘病在脾先渴後嘔為停水之類今口渴思飲否口不渴內無熱也口渴欲飲為熱老人口乾不思飲主津液少若漱水不欲咽主蓄血主陰極發燥喜熱喜冷否喜熱內寒喜冷內熱口中淡苦否苦熱鹹寒虛淡甘脾熱成疳傷食口酸思食否傷食不思食雜症思食為有胃氣則生否則無胃氣則死胸中寬否不寬傷食候積氣滯之證腹中有無痛處否無痛病不在內主虛有痛處主食積痰血之類有痛處手按則減者為虛大小便如常否小便秘結黃赤為熱清白為寒濁如米泔為濕熱下陷大便秘為實為熱自利為虛暴瀉暴痢為實久瀉久痢為虛下黃赤為熱下清白為寒足冷暖否足暖陽證足冷陰證乍冷乍溫便結屬陽大便如常屬虛及平日勞逸喜怒憂思並喜食何物勞則氣散逸則氣滯喜傷心怒傷肝憂傷肺思傷脾恐傷腎喜食厚味則生痰醇酒則發熱種種問法實為活人之捷徑然以此而盡古人問而知之之義尤未也予於靜定之中若有所悟蓋今人之病如咳嗽發熱瀉痢諸痛俱病之總名也一症之中各有火有寒有痰有氣有虛有實致症之原不同如治咳嗽問得有火證即作火治有痰有氣證即作痰氣治因此一問舍病名而治病原庶合古人之心也昔丹溪翁名擅千古亦不過每症分出寒熱虛實痰火血氣等件隨證調治此豈有異人之目洞見臟腑者乎亦惟問其症以知之也予何人斯敢參未議但願學岐黃者見痰即攻痰見火即治火見食即消食莫為病之總名所拘也相形頭者諸陽之會也頭重視身名天柱骨倒元氣敗矣因於濕首如裹蓋至卑之邪而犯至高之位其象有物以裹其首也又有頭搖頭眩頭暈者經所謂徇蒙招尤目瞑耳聾也蓋為如有物以蒙其首招搖尤甚又兼瞑聾是下實上虛之故有痰有火有虛有風額南方也經曰心熱病者額先赤若青黑色現主有暴疾目肝之竅也經曰肝病者眥青脫陽者見鬼脫陰者目盲氣脫者目不明陽氣盡陰氣盛則目瞑欲愈之病目眥黃目赤主熱白睛黃主黃疸眼胞腫主風主濕開目見人病屬陽閉目不見人病屬陰凡病目明能識見者可治若睛昏不認人或目上視或眼小目瞪直視或目斜視或目睛正圓或戴眼反折或眼胞陷下皆死症也若病人目睛微定暫時稍動者屬痰宜吐若目中不了了大便不通者宜下鼻者肺之官也肺病喘息鼻張經曰脾熱病者鼻先赤凡鼻色青者腹中痛微黑者有水氣黃者小便難白者為氣虛鮮紅有留飲鼻孔乾燥者必衄血鼻燥如煙煤屬陽毒熱極鼻孔冷滑而黑屬陰毒冷極鼻燥息如鼾睡屬風溫鼻塞濁涕者屬風熱鼻流清涕者屬肺寒鼻孔痔脹者屬肺熱有風經曰心病者顴赤腎病者顴與顏黑黃赤色出兩顴大如拇指主卒死肝熱病者左頰先赤肺熱病者右頰先赤耳者腎之竅也經曰耳焦枯受塵垢病在骨精脫者耳聾耳間青脈起者掣痛足少陽經絡亦繞耳而入耳故暴病耳聾耳腫耳痛耳旁紅皆屬少陽風熱經曰唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者甲篤乙死經曰足少陰氣絕則骨肉不相親而肉軟卻齒長而垢發無潤澤戊篤己死足厥陰氣絕唇青舌卷囊縮庚篤辛死凡病人舌乾口焦為脾熱焦而紅者吉焦而黑者凶唇口俱腫赤者是熱極青黑者是寒極口苦者是膽熱口甜者是脾熱口燥咽乾者腎熱舌乾口燥者是心熱口噤咬牙者是風痓唇口生瘡聲啞者是狐惑齒燥無津液是陽明熱極前板齒燥脈虛者是中暑唇口舌苔斷紋者難治唇色白者主失血主虛唇口燥裂是脾熱齒如熟齒者難治若唇青舌卷唇吻反青環口黧黑口張直氣口如魚口顫搖不止氣出不返者死頦為北方腎水象也經曰腎熱病者頦先赤色赤又主腎與膀胱氣滯熱結而小便不通舌心之苗也經曰心病者舌短卷顴赤少陰氣厥逆走上則齧舌凡見舌乾舌碎舌裂主心火甚旺總之舌鮮紅濕滑者吉燥澀者凶舌上白苔者胸中有寒丹田有熱故苔白而滑未入乎腑邪在半表半裡間法當和解舌上黃苔者必燥渴胃腑有邪法當下之舌上黑苔燥生芒刺者必燥渴皆極則難治也法當急下若不燥渴身不熱舌上黑苔而滑者屬陰寒法當急溫若舌卷焦黑而燥者陰毒熱極亦當下之若舌青而苔滑無熱不渴者陰毒寒極亦當溫之凡舌色鮮紅者吉青黑者凶而紫者為陰寒赤而紫者為陽熱也但見舌硬舌卷舌腫舌短舌強囊縮者難治也經曰頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨胸將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣病人身輕自能轉動者易治身重不能轉動者難醫掌中熱者腹中熱掌中寒者腹中寒四肢倦怠者主中氣不足手足牽引口噤難言者名曰風證四肢強直口噤頭搖者名曰痓證叉手冒心多因過汗尋衣摸床名曰撮空腳手難移身重而痛小便短赤名曰風溫若身熱口渴揭去衣被揚手擲足脈來有力陽也熱也實也無熱不渴欲得衣蓋或身重足冷倦臥惡寒或好向壁臥閉目不欲見光明懶與人言陰也寒也虛也總之身輕手足和暖開目欲言者吉若身汗如油喘而不休形體不仁乍靜乍亂脈浮而洪者死皮膚潤澤者生枯燥者死形如枯骨脈脫者死大骨枯槁大肉陷下者死若看小兒更有八候之說兩手伸縮曰搐十指開合曰搦勢如僕曰掣頭偏側曰顫身仰後曰反臂如開弓曰引目直似怒曰竄露睛不活曰視凡此者風痰驚熱所為大人亦常犯之內經分配三部臟腑脈法脈要精微論曰尺內兩旁則季脅也季脅穴名尺內尺澤之內兩旁尺之外側也尺外以候腎尺裡以候腹中腎有二枚二尺候之候腹中者所以候大腸小腸膀胱之疾附上左外以候肝內以候膈右外以候胃內以候脾附上尺之上關位也肝主賁賁膈也不及膽者寄於肝部也上附上右外以候肺內以候胸中上附上關之上寸位也胸中氣管也左外以候心內以候膻中膻中氣海也前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝脛中事也示吉按經曰持脈有道虛靜為保古之神聖尚以虛靜是戒今之學者非古誰遵而臟腑三部不能一定於胸中寧言虛靜乎舊訣以經絡相為表裡大腸小腸列於二寸蔡西山戴同父滑伯仁復以二腸之病候於尺中至先師李士材非之尤甚及考丹溪脈訣二法並載予以為信招辨之訣奚不遵岐黃之典上從胸喉下至膝脛三焦有序內外無乖由此而再加虛靜之功豈復有指下難明之誚耶寸關尺者從魚際至高骨卻有一寸故名寸從尺澤至高骨卻有一尺故名尺寸陽尺陰高骨為陰陽之關界故名關從關至魚際經云上竟上也從關至尺澤經云下竟下也膽寄於肝大小腸膀胱統於腹中故經文不及之診法黃帝曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈黃帝曰平人何如岐伯曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也醫不病故為病人平息以調之為法脈經曰欲持其脈令仰其掌男先取左女先取右醫者覆手以中指切至高骨定其關位次下食指切至關前以定寸位再下名指切至關後以定尺位叔和曰下指之際宜相病人長短肥瘦人長臂亦長指下宜疏人短臂亦短指下宜密瘦人膚薄持之勿重肥人膚厚持之勿輕樞要曰持脈之道有三輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋初持脈時宜先輕手舉之以察其浮如脈浮膚上陽也腑也內應心肺再重手按之以察其沉如沉脈肉下陰也臟也內應肝腎又再不輕不重中而取之以察其中如脈行於血肉之間中和之應也內應脾胃若浮中沉俱不見則委曲而求之若隱若見三部皆然則為陰陽伏匿之脈經曰春胃微弦曰平夏胃微鉤曰平長夏胃微軟弱曰平秋胃微毛曰平冬胃微石曰平診家當隨四時而察胃脈慎勿持一東垣云不病之脈不求其神而神無不在也有病之脈則當求其神之有無蓋言不論脈之數熱遲寒脈來有力即為有神但清其熱溫其寒自已若遲數無力是為無神根本不固將何所恃耶秦越人云男子生於寅寅為木陽也女子生於申申為金陰也故男脈在關上女脈在關下是以男子尺脈恆弱女子尺脈恆盛是其常也反者男得女脈女得男脈也男得女脈為不足病在內女得男脈為太過病在四肢右得之病在右左得之病在左隨脈言之也脈法曰反關脈者脈不行於寸口由列缺絡入臂移手陽明大腸之經也以其不順行於關上故曰反關有一手反關者有兩手反關者此得之於有生之初非病脈也令人覆手診之自見經曰凡陰之所在不應不應者仰手而沉覆手而沉也是天地之氣使然診家當先識運氣及南北二政之理若不知而誤治之反伐天和脈象辨浮中沉伏脈之上下也浮者為上浮於膚上舉之有餘按之不足中者為中脈行於肌肉之間沉者為下行於筋間舉之不見伏者又其下也附於骨上重按不見推筋至骨始得長短芤三脈脈之盈虛也長則過於本位短則不及本位中間有兩頭無曰短兩頭有中間空曰芤平緩遲數四脈脈之急慢也一息四至五至曰平一呼一吸為一息一息三至曰遲較之平脈稍遲比之遲脈稍速曰緩一息六至曰數促結代澀四脈脈動之有止者也脈動數時一止即來曰促脈動緩時一止即來曰結動而中止不能即來良久復動曰代往來遲滯似止非止三五不調曰澀大洪實長弦緊牢革動滑十脈脈之有餘之類也較之平脈稍大曰大大與洪相似但不十分浮而有力浮大有力曰洪洪與實相似但洪則重按稍衰洪而且長浮中沉三部皆然曰實長於本位曰長長而端直如弓弦曰弦弦而急彈如切繩曰緊緊與弦相似緊則長而端直切急而左右彈弦則惟長而端直而已古人弦取象於弓弦緊取象於切緊繩可短矣浮洪有力重按則空曰革沉實有力舉之不見曰牢狀如大豆厥厥動搖曰動中指充滿往來流利曰滑小短濡弱微細澀七脈脈之不足之類也小於平脈曰小短於本位曰短浮小無力曰濡重按不見沉小無力曰弱舉之乃空細則僅存一線猶有常位可審微則似有若無可虞血脈將亡澀則三五不調惟見往來遲滯浮洪虛濡革散芤七脈皆浮脈之類也浮於膚上舉之有餘曰浮洪則兼有力而大虛則兼無力而軟濡兼微小重按則無革兼洪大重手不見散則類乎浮大中手便無根蒂芤則體原虛軟重按旁在中空沉伏弱牢四脈皆沉脈之類也沉於筋間重按不見曰沉重按不見推筋尋之始得曰伏弱則兼無力而小舉之不見牢則兼有力而實輕手則無脈象主病二十九法示吉曰脈氣血之神也隱於膚中視之不見惟恃三指之巧而識悔吝之機誠非易事故脈之理微自古難之然豈因其難也忽置之不問乎上稽靈素下考百家凡脈應於指下者數取形求共得二十九種其上下動止盛衰虛實往來跡象雖極指下之幻亦無遁情矣從此而察三部之中見是脈即有是證脈證相合內外互參為治之法自彰也然此二十九象散見諸經起而集之者代有其人由來已久但簡要者多所缺略備全者不免繁多岐黃之旨難測高陽之訣招辨眾議紛紛脈道轉晦故集先哲諸書述其精要補其未補條附於後聊為持脈者登高之自可也浮脈宜汗宜補不宜下春夏順秋冬逆浮脈在上而不沉也浮於膚上舉之有餘按之不足曰浮陽也扁鵲曰浮陽也心肺俱浮浮而大散者心浮而短澀者肺也主風浮而大者中風頭痛鼻塞主脹腹脹浮大者順主痞在外主表病岐伯曰寸口脈浮而盛者病在外主外熱經曰諸浮不躁者皆在陽則為熱主氣喘浮疾為宿氣浮滑為風痰浮緩主皮膚不仁叔和曰風寒入於肌肉也浮短主肺傷咳嗽脈經云浮短者其人肺傷諸氣微小不過一年死浮緊有力為傷寒外症頭痛發熱無汗方合太陽經脈浮緩無力為傷風外症頭痛發熱鼻塞自汗浮大而虛主內傷元氣因勞役過度傷飢失飽以致中氣陷下而發熱浮大而短主陽明旺立春後春分前陽明之至浮大而短寸浮風在上主頭目不利關浮風在中主胸滿脅痛尺浮風在下主腰痛便結腳膝疼痛沉脈宜下宜溫不宜汗旺於冬心脈及春夏忌見沉脈在下而不浮也沉於肉下重手按之乃得舉之不見曰沉陰也難經曰沉陰也肝腎俱沉牢長者肝也按之濡舉指來實者腎也主寒主氣金匱云下手脈沉知是氣主水經云肝腎脈並沉為石水主六郁兼滑痰鬱兼數火鬱兼細濕鬱兼澀血鬱沉而無力氣鬱左手平和氣口沉緊食鬱主停飲叔和云沉而弦者懸飲內痛主裡病主癥瘕岐伯曰寸口脈沉而堅者病在中主厥逆沉遲為寒極故手足厥冷主洞泄沉數有力為實熱外症燥渴便閉腹痛宜下沉遲無力為虛寒外症手足厥冷自利蜷臥宜溫補沉實主內熱沉細主骨痛經云諸細而沉者皆在陰則為骨痛沉滑主痰飲滑氏作宿食戴氏作痰鬱沉伏主霍亂沉緊主急痛經曰寸口脈沉而緊心下有寒時痛有積聚滑氏作心腹冷痛沉喘主寒熱沉短而敦主闕陰旺立冬前後得甲子闕陰之至沉短而敦沉細懸絕主冬故以夜半死寸沉主陽虛心氣鬱肺氣寒關沉胸脅疼痛尺沉主下元虛冷泄瀉數脈宜寒涼忌溫熱無熱不渴手足冷而脈數者死數脈動太速也呼吸定息脈來六至過於平脈一至曰數為陽盛陰虧之候主熱越人云數者腑也數則為熱主煩經云數則為煩主吐脈經曰寸口數即吐主暴驚黃帝曰脈至如數使人暴驚主三消寸數上消關數中消尺數下消主適得病扁鵲云數為適得病前大後小即頭痛目眩前小後大即胸滿短氣數而浮主表熱手背熱為外感數而沉主內熱手心熱為邪熱入里數細無力主陰虛發熱血虛之證盜汗骨蒸日輕夜重乾咳皮毛枯槁數大無力主內傷元氣為虛熱宜辛甘發散數大有力主實熱外症口渴煩躁面赤內外皆熱或云便秘脈躁喘數者為陽主夏故以日中死寸數左主面赤舌燥右乾咳聲嘶關數左口苦脅痛右嘈雜善飢口臭尺數左溺赤五淋右大便閉腸紅遲脈宜溫熱補忌寒涼克伐經曰察九候獨遲者病遲脈動太慢也呼吸定息僅三至減於平人一至曰遲為陰盛陽虧之候主寒扁鵲云遲者也遲則為寒主不足寸見為氣不足尺見為血不足遲而浮主寒在表遲而沉主寒在裡遲而沉細無力主中寒厥冷蜷臥指甲青舌卷囊縮遲而滑者脹遲而澀者有癥結寸遲左心虛神怯右冷痰風短關遲左面青脅痛右中滿吐瀉尺遲左精冷小便餘瀝右火衰不育泄瀉大脈巳午月脈宜洪大察九候獨大者病形瘦脈大胸中多氣者死大較之平脈稍大也浮中沉皆然大之極為洪為實為陽有餘陰不足之候內經主熱主脹經云寸口脈大堅以澀者脹主實為病進經曰大則病進主寒熱經曰脈大者寒熱在中主癲病岐伯曰大堅疾者癲病主不得偃臥經曰肺氣盛脈大脈大主不得偃臥數大有力主外感風寒邪氣有餘豁大無力主內傷元氣正氣不足寸大左舌乾消渴善驚右咳嗽喘急關大左口苦善怒右痞脹不食尺大男子為逆主二便不利女子為順尺獨大搏手主有孕小脈察九候獨小者病人身大而脈往來小者死小較之平脈稍小也中外皆然小之極名微名細為正氣不足之候主寒主氣血皆少靈樞經曰小者血氣皆少主病在內經云脈小實而堅者主病在內主胃反經云小弱而澀胃反主泄少氣靈樞曰尺膚寒其脈小者泄少氣小而數主陰虛發熱小而遲主虛寒痼冷傷寒汗吐下後脈小為病退若乳子病熱脈小為順產後傷寒脈小非陽病見陰脈也經曰乳子病熱脈懸小何如岐伯曰手足溫則生寒則死寸小左神昏善忘驚悸右懶言氣怯關小左目昏易怒右少食痞滿尺小下元虛冷腰膝軟疼滑脈人身澀而脈往來滑者死滑而盛病日進滑脈行動不澀也往來流利如珠之盤輾轉替替然與數相似一曰浮中如有力一曰轆轆如欲脫曰滑為陰氣有餘之候經云滑者陰氣有餘也陰氣有餘為多汗身寒伯仁曰滑為血實氣壅之候血不勝於氣也二論雖異實可互為闡明主痰飲主宿食主吐逆脈法曰關上滑而大小不勻必吐逆主癲疾經曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治滑數心中結熱滑疾胃中有寒叔和脈盛滑堅者病在外脈滑浮而疾謂之新病內經女子二尺滑而和者主有子滑而有斷絕者主經閉尺脈偏滑疾面赤如醉外熱者主經閉為病寸滑左心悸痰滯心包右咳嗽痰喘關滑左寒熱口苦右宿食嘔吐尺滑小便淋相火妄動腎濁澀脈申酉月脈浮短而澀病在外脈澀堅難治澀脈之行動不滑也虛細而遲往來極難三五不調無復次第如雨沾沙如刀刮竹曰澀岐伯曰澀者陽氣有餘也為身熱無汗滑氏曰澀為氣多血少之候為陽氣有餘之候主少血主心痛主血痹經曰澀則心痛澀則少血脈澀曰痹主亡汗主傷精澀而堅內留惡血表熱脈澀主中霧露女子有孕胎痛無孕敗血為病寸澀左心神虛耗驚悸怔忡右短氣冷痞關澀左目昏脅痛右心疼痞滿尺澀下元不足男子傷精女子崩漏緊脈夏至後得甲子太陰旺太陰之至緊大而長緊者勁急而不和緩也按之搏指長而左右彈如切繩絞索之狀曰緊滑氏為邪風搏擊伏於榮衛之間主寒主痛主積聚主吐逆叔和曰緊則為寒緊而滑者吐逆駛而緊積聚有擊痛盛而緊曰脹內經緊而急者遁屍脈經緊牢者為實扁鵲浮緊主傷寒表證沉緊主寒客腹中名內傷寒氣口右關緊盛左手平和者主傷食寸緊左頭熱目痛右鼻塞咳嗽關緊左風癇脅脹指甲青右噁心脹滿尺緊疝瘕腰腳臍下痛二便不利緩脈乳子中風緩則生急則死腎病及二尺忌見緩脈動舒緩而緊急也往來徐徐呼吸不及四至較遲脈稍速為榮衛向衰之候主虛主濕主解㑊經曰尺脈緩澀謂之解㑊緩而滑為熱中浮而緩主風表虛沉而緩主內虛主冷緩而澀為痹上見之為項強下見之為腳弱寸緩左怔忡多忘右氣短頭重關緩左風虛眩暈右善嘔不思食尺緩腳膝無力下元虛冷示吉曰緩中州脾脈也緩而無神方可言病若四至調勻緩而有神不大不小不浮不沉不輕不重意思欣欣如春風楊柳之狀平和之應也倘認為病脈則誤矣古人論脈大人以五至為平小兒以六七至為平今若此又覺偏於熱矣豈古今時勢異耶抑今人元氣薄也弦脈經曰春胃微弦如持長竿末梢曰平脾病及右關及四季之末忌見弦長而端直如按絲絃舉之應手按之不移為陰遏陽郁之候主瘧主痛主飲主疝主寒熱往來主傷風主宿食經曰脈弦上寸口者宿食主驚經云肝腎並小弦欲驚主氣結主勞倦主經絡間為寒所阻弦數為勞瘧為傷寒熱邪傳少陽寒熱口苦脅痛耳聾雙弦脅急痛弦長為積寸弦左頭痛心惕右咳嗽噁心關弦左脅痛寒熱右宿食痞滿尺弦小腹痛下焦停水芤脈芤浮大而軟中空旁實旁有中無若捻蔥葉為血不能統氣之候伯仁曰氣有餘血不足血不能統氣故脈來虛而大若芤之狀主失血芤而數主火盛而血妄行芤而遲主木土二臟虛寒不能藏血失血寸芤左心虛易驚痰現紅星右咳血血絲關芤左脅痛吐血右嘈雜嘔血尺芤便血腸紅女子崩漏洪脈立夏後得甲子太陽旺太陽之至洪大而長右寸及冬忌見宜寒涼洪較大更盛也浮大有力騰上滿指來至大而去且長有類乎實惟重按稍衰為異為氣血燔灼之候主煩主咽乾主表裡皆熱主二便澀主傷寒陽明經病寸洪左煩熱舌乾裂右乾咳唾黏上消關洪左眼赤善怒右火嘈易飢脹滿尺洪左小便赤澀右大便難火旺遺精虛脈虛中下皆空也浮大而軟舉按無力豁然不能自固訣曰浮而無力為虛為榮衛俱虛之候主暑傷元氣主虛煩多汗主恍惚多驚主小兒驚風病在中脈虛難治肝腎脈並虛為死陰虛陽搏謂之崩內經寸虛左恍惚多忘右內傷元氣懶言關虛左目昏少寐右不思食虛痞尺虛左腰膝痠軟遺溺右下元虛冷實脈實表裡俱實也弦大而長舉按有力浮中沉三取皆然曰實為邪氣益盛之候經曰實以堅謂之邪氣甚盛訣云三焦氣滿主熱主痛主痢主氣塞主食積主伏陽在內寸實左口舌瘡咽喉痛右煩熱嗽痰喘急關實左脅痛善怒目赤右中滿痰飲䐜脹食積尺實左便赤少腹痛右大便難或痢散脈老人忌見此脈散到手便無根蒂三五不調類乎澀又兼浮大有陽無陰似乎虛中指便空來去不明根由難覓如散葉隨風不常其狀為氣血耗散臟腑欲絕之候主寒熱無時主陽虛不斂主心氣不足主暴病而榮衛虧損寸散左神虛驚悸右氣散久喘關散左筋痿不寐右飲食不化瘦弱無力尺散精耗耳鳴腰膝無力長脈人短脈長者是中損二十歲長指下有餘如持長竿過於本位為陽氣有餘之候陽也越人主壯熱主三焦煩郁主陽毒內蘊脈經主氣治經曰長則氣治主遺尿經云脈長過寸入魚際者遺尿主足脛痛寸口脈中手長者足脛痛主逆氣喘急經云脈長出魚際主逆氣喘急寸長左心經實熱舌乾咽痛右上焦氣壅關長左壯熱脅痛右中滿不食尺長溺黃莖痛大便實陽事頻舉短脈人長脈短是大損三十歲短指下不足中有旁無不及本位為陰中伏陽之候滑氏云氣不足以前導其血則脈短主氣病主頭痛經曰寸口之脈中手短者曰頭痛主酒病脈法曰短疾而滑酒病主三焦氣滯主宿食不消短而數主心煩心痛寸短左心氣鬱頭痛右氣怯內傷關短左胸痛引脅面青白右噁心四肢怠惰尺短二便不利元精消弱濡脈凡病初起見濡難治若久病後產後見之為順宜補濡浮細無力也輕手乍見重手卻去如線之浮水中為氣血俱衰之候主虛主濕主少氣主無血主骨蒸盜汗主痹積主下冷主婦人產後客風面腫寸濡左心驚盜汗右氣乏體倦關濡左目昏易怒右不食虛滿尺濡傷精脫血泄瀉腰膝虛冷弱脈長夏胃微軟弱曰平弱多胃少曰脾病老得之順少壯得之逆弱沉細無力也輕手不見重手按之怏怏不前欲絕未絕為血氣欲絕之候主亡精主虛汗主痼冷主神昏身重主精氣不足主元氣虛耗寸口脈沉而弱曰寒熱脈弱以滑是有胃氣命曰易治內經寸弱左陽虛心悸右形寒氣短關弱左筋痿無力右痞滿倦怠尺弱下焦冷泄瀉便數革脈經曰渾渾革至如湧泉病進而色弊革浮而有力也輕手舉之洪大搏指重手則空如按鼓皮曰革為裡虛表實之候主實熱在外主傷寒一二日表證壯熱無汗皮膚盡疼又主男子亡血失精女子半產漏下寸革左頭痛面赤煩躁右咳嗽聲啞關革左善怒嘔血右嘈雜善飢尺革夢遺失精二便澀滯牢脈越人云牢而長者肝也牢者為實宜寒涼攻利牢沉而有力也輕手不見重手按之實大搏指曰牢為表虛里實之候主實熱在內主傷寒熱邪傳裡大便燥結主骨間疼痛主勞傷痿極寸牢左煩渴舌裂右氣鬱引飲乾咳關牢左兩脅急痛右不食䐜脹尺牢小腹痛二便閉腰膝痛痹示吉曰牢革脈俱在實脈中流出革為實之浮牢為實之沉陰陽亢害大抵與胃氣相遠故先哲皆不取之然有暴病而得是脈病為之也若久病而診得之胃氣全無鮮克免者微脈經云微浮秋吉冬成病微不顯也依稀輕渺似有若無模糊難見為氣血俱虛之候主少氣主自汗主泄瀉主崩漏脫精微而數主虛熱微而遲主虛寒浮而微者陽不足主身惡寒沉而微者陰不足主臟寒下利微而弱者主寒少氣寸微左憂惕善忘不寐右短氣不足以息關微左脅肋虛滿惡寒右噁心不食虛痞尺微男傷精女崩帶脛膝無力細脈形盛脈細少氣不足以息者危細不粗也往來指下極其小渺僅存一線如蛛絲相似為氣冷血虛不足以充之候主傷濕主痛在內主元氣不足乏力無精主內外俱冷痿弱洞泄主勞傷過度神昏體倦寸細左心無血養驚悸右氣少倦怠關細左目暗筋痿右少食虛滿尺細精冷下虛泄瀉女子經事過期促脈示吉曰促無胃脈也傷寒熱極及暴怒痰厥急驚尚為可生久病及雜症見之者死促陽之極也一息脈來六七至時一止復來曰促為陽獨盛而陰不能相和之候主熱極主暴怒主氣壅主傷寒陽毒主瘀血發狂寸口脈促上擊者肩背痛內經寸促左狂言風痰於心右痰熱咳嗽關促左吐血善怒熱極右脾熱口臭引飲尺促腎水涸二便澀滯結脈結陰之極也一息脈來三四至時一止復來曰結為陰獨盛而陽不能相入之候主氣鬱主血壅主飲食痰飲留滯經絡浮結主外有痼疾沉結主內有積聚寸結左驚悸痰飲右肺寒痰嗽關結左脅肋痞痛右食積痰飲留滯尺結小腹冷痛硬滿示吉曰脈因熱而數因數為促因寒而緩因緩為結蓋促結者寒熱之變也滑氏曰有氣血痰飲食五者若有一留滯其間脈亦為之間斷非必死脈也故張長沙亦作病脈予近診血氣素虛之人及有年者脈來不數不緩但數動一止或五六動一止後亦無妨蓋其榮衛固不足以充前導而氣血飲食痰易於留滯也若兼數兼緩則病上更病退則生加則死矣蓋可忽哉代脈長夏脈但代無胃曰死曰代為戊己惡脈右關忌見代更代也動而中止良久復動動而又止如前復起曰代為一臟無氣而他臟為之代至也六脈皆然主呼吸危云之候然亦有暴病而致是脈者主霍亂吐瀉主心腹急痛主便膿血主心中驚悸主積痰停水主中風卒僕主瘀血飲食停滯以致元氣不續寸代左怔忡言語謇塞右氣塞痰壅關代左胸脅急痛右暴痛吐瀉尺代亡陽失血陰疝上衝伏脈經曰按之至骨脈氣少者腰脊痛而身有痹也伏浮中沉皆不見也附於骨上重手推筋取之乃得為陰陽潛伏關隔閉塞之候主寒主痛主水主霍亂主疝瘕主飲食不消主榮衛氣閉而厥逆伏結為積聚寸伏左沉憂失志右氣滯痰積關伏左血冷脅腰痛右吐瀉暴作中脘積塊尺伏腎寒火虛疝瘕痼冷動脈動狀如大豆厥厥動搖尋之有舉之無不往不來不離其處為陰陽相搏之候正理論主痛主驚主崩脫主泄痢主虛勞體痛陽動則汗出陰動則發熱婦人手少陰脈動者妊子也內經寸動左心驚汗出右自汗痰喘關動左寒熱口苦右食積停滯尺動骨蒸虛脫崩帶溺赤七絕脈法一曰雀啄連連搏指忽然止絕少頃復來如雀啄食肝絕也一曰魚翔本不動而末強搖似有似無如魚之翔心絕也一曰屋漏如屋殘漏下半時一滴胃絕也一曰解索指下散亂乍數乍疏如索之解脾絕也一曰蝦游浮於指下始則冉冉不動少焉而去久之忽然一躍進退難尋如蝦之遊大腸絕也一曰釜沸浮於指下有出無入無復止數如釜湯沸肺絕也一曰彈石沉於筋間劈劈急硬如指彈石腎絕也凡此七脈一見皆主胃氣消亡臟元已竭死無時矣藥性炮製歌草部一百三十九種人參味甘功專入肺止渴生津大補元氣更能養血肺熱乃忌細皮光潤者佳去蘆切片用肺中實熱右寸洪大有力勿用反藜蘆黃耆甘溫力專補氣收汗固表內傷有濟專托潰瘍生肌大利綿綿箭乾者佳托瘡生用補氣蜜炙一用鹽水炒表邪實而無汗者勿用托裡得防風而效速甘草甘平健脾強胃調和諸藥解毒功最蜜炙溫中生用火退梢去小便澀痛節主癰疽腫痛俱生用身蜜炙溫補若痞滿嘔吐者勿用反甘遂海藻大戟芫花當歸甘辛補血歸經扶虛益損退熱滋陰頭止血上行身養血中守尾破血下流全活血不走酒浸洗淨用體肥痰盛薑汁妙恐泥膈也風邪初旺者脾虛泄瀉者濕痰浮腫者勿用川芎辛溫生血調經能止頭痛開鬱上行小者開鬱不宜單服久服酒浸用山藥甘溫健脾補腎補陰固精瀉痢能定消腫長肉筋骨強盛人乳拌蒸喜麥門冬惡甘遂單食多食亦能滯氣白朮苦甘健脾強胃除濕利水痰痞皆退大者為云術力大氣濁小者為臺術力小氣清土炒微黃用之入滋陰藥中再用酒拌蒸佐黃芩則安胎君枳實則消痞傷寒動氣勿用蒼朮甘辛健脾平胃燥濕寬中鬱結開遂米泔水浸一宿去黑皮切片炒用並能發汗定瘧祛瘴疫土燥火炎乾咳聲嘶陰虛便結者勿用白芍酸寒能收能補平肝養血腹痛自可瀉痢崩漏安胎不苦伐肝生用止痛炒用和血補血酒炒斂血止血醋炒新產婦人勿用恐酸寒伐生生氣也反藜蘆赤芍酸寒除熱清目破血通經癰腫宜服產後勿用生地微寒專治血熱骨蒸煩勞止吐衄血忌見鐵器酒淨用畏萊菔及子血虛寒者勿用肥人多痰薑汁浸炒用熟地微溫滋腎補血封填骨髓勞傷易絕烏須黑髮耳目清徹用生地酒浸蒸熟曬乾再浸蒸如此九次一法用好酒在砂罐內煮一夜其色如漆則熟矣忌畏同生地多痰薑汁拌炒知母味苦滋陰止渴自汗骨蒸煩熱可合生用瀉胃火鹽酒炒瀉腎火忌鐵去毛貝母微寒止渴消痰清心潤肺開鬱除煩去心研末用出四川陝西者佳性輕而治上焦之痰出浙江者名土貝母性重而燥惟治皮裡膜外痰塊結腫瘰癧一切瘡瘍之痰然肺癰肺痿及人面瘡古人俱用者反烏頭黃芩苦寒枯瀉肺火消痰利氣風熱皆可條芩安胎除下焦火崩淋痛痢濕熱除苦除風熱生用入血分酒炒治瀉痢薑汁拌炒治膽熱用豬膽汁拌曬乾細實而堅者名條芩黃連苦寒瀉心除痞止痢厚腸濕熱自已清目除煩瘡瘍不起清熱酒炒治瀉痢薑汁拌炒開火鬱湯泡吳茱萸拌炒去萸用腸紅下血入豬大腸中煮熟用癰腫疔瘡生用大黃大寒破血消瘀快膈通腸積聚盡驅錦紋者佳酒浸蒸熟曬乾如此九次能上達巔頂治頭風目疾及久積痼病治瀉痢薑汁拌炒治傷寒熱結生用治瘡瘍熱結酒炒血痢韭菜汁拌曬乾桔梗味辛療咽腫痛載藥上升痰嗽皆用寬胸利膈枳殼相共去蘆生用若用之治腸紅久痢大腸氣鬱之疾須炒黃色天花粉寒清熱止渴消痰定嗽癰腫可奪瓜蔞潤肺消痰下氣寬胸清熱更醫乳閉去殼打爛去油用瀉者勿用半夏味辛燥濕化痰止吐開鬱健脾消涎有毒凡使用白礬生薑皂牙同煮以半夏中無白星為度煩渴及血證胎前勿用反烏頭紫蘇甘辛風寒發表梗下諸氣安胎之實夏月不敢用麻黃以紫蘇葉代之蘇子潤肺開鬱下氣定喘消痰乾咳是利微炒為末白芷辛溫陽明頭痛散風祛寒排膿可用皮膚瘙癢通經亦中防風甘溫諸風通用頭暈目疼骨節痹痛去蘆獨活甘辛頸項難舒腰背痠疼諸風皆除入肺腎羌活溫平身痛頭痛祛風除濕活骨舒筋入膀胱小腸柴胡味苦寒熱脅痛和解瘧疾升陽宜用犯火無功咳嗽氣急痰喘嘔逆者勿用前胡甘辛消痰解熱止嗽除痞又開氣結亦止夜啼兒香附辛甘疏氣開鬱止痛調經更消宿食忌鐵器搗去毛發散消食生用入血分酒炒軟堅止痛鹽水炒降虛火童便浸開鬱醋炒止血童便浸炒黑溫經艾汁炒消痰薑汁炒又有鹽酒醋童便四味合制麻黃性溫解表出汗身熱頭痛風寒盡散去節根切斷用之霜降後春分前傷寒表實無汗頭痛如斧劈身熱如火熾方用之若夏秋雖頭痛發熱不可輕用也快用則有亡陽衄血筋惕之弊根止自汗葛根甘平陽明發表解酒止渴溫瘧可好自汗者勿用麥冬甘寒清心潤肺止咳滋陰煩渴皆濟更除勞熱虛火大利溫水洗去心用不令心煩惟傷寒科帶心用之天冬甘寒保肺清熱消痰止嗽喘渴能絕肺癰肺痿更治吐血去心虛寒者勿用五味味五止渴生津氣散能收滋腎強陰暑熱自汗乾咳功成北產者佳寒邪初起咳嗽者勿用小兒尤忌凡用打碎升麻微寒解毒散風升提下陷牙痛可攻闢瘟止瀉清胃有功形輕堅實色青綠者佳藁本苦辛巔頂頭痛陰寒腫痛風濕俱行細辛辛溫少陰頭痛破結通關牙痛功成風寒濕痹驅散皆靈反藜蘆去土葉用不可單服連翹苦寒瀉六經熱解毒消癰通淋水泄去心打碎除肺火只用心赤鼻良驗澤瀉甘鹹利水滲濕通淋消腫陰汗可入炒黃色延胡索溫血結諸痛破瘀調經跌僕堪用生用破血炒用調血酒炒行血醋炒止血地榆微寒血熱堪用血痢帶崩金瘡止痛炒黑止血虛寒下陷血衰瀉痢者勿用防己辛苦風濕腳腫手足攣急散熱消癰去皮酒浸洗常山苦寒專截瘧疾最開結痰水脹可食有毒令人吐吐痰生用截瘧醋炒或同烏梅用同丁香截三陰瘧寒老人小兒及虛弱久病者勿用龍膽苦寒療眼清熱下焦濕痛疸痢皆絕酒洗用入肝腎元參鹹寒清無根火目赤咽痛心煩俱可散腫解熱腎虛能補反藜蘆勿犯銅器堅黑者佳入心肺腎丹參味苦定志養神生新破瘀崩帶調經安胎清目癰腫能平酒浸去蘆用反藜蘆苦參苦寒燥濕清熱癰腫瘡疥逐水散結黃疸腸風殺蟲妙絕反藜蘆以糯米泔浸一夜去浮面腥氣曬乾一用酒拌炒紅花辛溫最消瘀血多則通經少則養血兼治跌僕瘡毒解截三稜苦平行血行氣消癖削堅虛人當忌麵裹煨切片醋炒用畏牙硝蓬朮苦溫破積消聚止痛行血通經最易消食開胃醋炒用例天麻辛平風熱眩暈驚悸風癇癱瘓俱應濕紙裹煨熟用南星苦辛能治風痰破傷跌打下氣開關麻痹風疾癰腫皆安薑湯泡透切片薑汁浸炒用妊娠勿服為末入臘月牯牛膽中陰乾名膽南星秦艽苦辛去濕活筋肢節風痛腸風骨蒸酒洗切片遠志辛溫益智寧心清目利竅壯陽補精甘草湯泡去心用破故紙溫腰膝痠痛興陽固精鹽酒炒用即補骨脂胡蘆巴溫暖補腎臟膀胱諸疝脹痛皆除酒洗用何首烏甘填精種子黑髮悅顏長生不死忌犯鐵器九蒸九曬用之骨碎補溫骨碎折傷固齒祛風殺蟲最良即猴姜威靈仙溫腰膝冷痛積痰痃癢風濕通用酒洗牛膝味苦除濕痹痿腰膝痠疼益陰補髓去蘆酒洗用黃精味甘能安臟腑五勞七傷此藥大補洗淨九蒸九曬用之鉤吻略同切勿誤用蒲黃味甘逐瘀止崩止血炒黑破血宜生續斷味辛接骨續筋跌僕折損且固遺精酒浸洗用益母草甘調經所宜產後胎前生新去瘀忌犯鐵器蓯蓉甘溫峻補精血若驟用之反動便滑忌犯鐵器酒洗去浮用鎖陽性溫補陰固精大便燥結酥炙用行大便不實者勿服車前性寒溺澀眼赤利水止瀉帶濁有益炒細研用紫菀苦辛血痰上氣補虛定喘寒熱並濟酒洗百部微寒肺熱咳逆傳屍骨蒸殺蟲有力酒洗用百合味甘安心定膽止嗽消浮癰疽可啖款花甘溫理肺消痰肺癰喘咳定悸除煩兜鈴苦寒肺熱久嗽定喘消痰能熏痔漏根名青木香下氣甚速兼治小腸氣青黛性寒開鬱清火驚癇疳痢發斑俱可甘菊味甘除熱祛風頭眩目赤收淚有功酒洗曬乾用薏苡味甘專除濕痹筋節拘攣肺癰肺痿去殼淨炒用丹皮苦寒止血通經和傷清熱無汗骨蒸酒洗用菟絲甘平夢遺滑精腰疼膝冷補髓益陰水淘淨用白酒糯米泔同入砂罐內煮爛成餅曬乾入諸藥用茴香性溫能除疝氣腎臟虛寒調中暖胃鹽湯浸炒砂仁性溫養胃進食止吐安胎通經破滯炒為末白蔻辛溫能卻瘴翳益氣調元止嘔開胃去殼炒為末用肉蔻苦溫脾胃虛冷瀉痢不休功可立等麵裹煨熟研碎用草蔻辛熱治寒犯胃作痛嘔吐不食能遂搗末用草果味溫消肉除脹截瘧逐痰解瘟闢瘴搗末用菖蒲辛溫開心通竅去痹除濕清聲至妙附子辛熱性走不守四肢厥逆回陽功有厥冷回陽用生引諸藥行經用麵裹火煨去皮臍切四片用童便浸透燒乾若入補益丸中切六片先用甘草防風同煮三四滾去皮臍甘防再用童便煮一日曬乾方無毒也天雄大熱壯陽補火陰寒止痛面風亦可制同附子烏頭性熱溫經去風手足拘攣回陽兼用制同附子射干味苦咽喉腫痛咳逆上氣消痰有中旋覆鹹甘祛風開結脅滿稠痰水濕能絕大戟苦寒消水利便腫脹癥堅其功瞑眩反甘草商陸酸寒赤白各異赤者消腫白利水氣葶藶性寒利水消腫痰咳癥瘕治喘肺癰隔紙炒用牽牛性寒利水消腫蟲脹痃癖散滯除壅妊娠忌服黑者屬水力速白者屬金效遲研爛取頭末用萆薢甘苦風寒濕痹腰背冷疼添精益氣木通辛甘小腸熱閉利竅通經最能導滯乳閉難產淋濁皆治通草味甘善治膀胱消癰散腫能通乳房燈草味淡清心定驚除熱利水夜啼如神石斛味甘卻驚定志壯骨補虛冷閉可恃去根酒洗一法蜜炙石韋苦甘清熱利水癃閉五淋癰疽可委拭去毛羊脂炒焦黃用白蒺藜苦療瘡瘙癢白癜頭瘡翳除目朗搗去刺用青葙苦寒治風熱濕明目堅筋殺蟲有力木賊味甘益肝退翳能止月經積聚更奇茅根甘寒止血治淋利水和傷除熱通經搗汁用仙茅辛溫腰足攣痹壯陽補血勞傷莫離烏豆湯中浸一夜酒拌蒸用鬱金苦溫破血生肌吐衄溺血鬱結功奇小者為鬱金薑黃味辛消癰破血心腹疼痛下氣最捷大者為薑黃牛蒡辛溫能消瘡毒癮疹風熱咽疼可逐一名鼠黏子打末用紫草苦寒心腹邪氣利竅通水癰腫大利酒洗用白薇苦鹹利水益陰中風帶下寒熱痠疼酒洗用白附辛溫治面百病血痹風瘡中風諸症白鮮皮寒黃疸頭風咳逆濕痹疥癬功同蘆薈性寒殺蟲消疳癲癇驚搐服之立安胡黃連苦治勞骨蒸小兒疳痢盜汗虛驚並治痔漏澤蘭甘苦癰腫能消打僕傷損月事可調用葉調經酒洗用青蒿苦寒骨蒸勞熱虛煩盜汗殺蟲功烈童便浸曬乾用巴戟天溫助腎添精疏風辟邪酒浸方靈去骨酒洗蘭葉甘辛散久鬱氣膽癉消渴劫痰癖利用草蘭葉決明子甘能除肝熱目疼收淚仍止鼻血炒為末蓖麻子辛利水腫脹無名腫毒其功莫量塗足心下胞胎塗巔頂收生腸去殼搗用蘆根甘寒客熱消渴噎膈吐逆利水皆活搗汁用蛇床苦辛風寒濕痹諸惡瘡癬陰痛能醫炒金銀花甘療癰無對未成則散已成則潰山豆根苦療咽腫痛敷蛇蟲傷可救急用俗名金鎖匙用根口嚼汁吞止咽喉腫痛艾葉溫平驅邪逐鬼漏血安胎心痛必委搗作絨灸百病薄荷味辛最清頭目祛風化痰骨蒸宜服豨薟味苦祛風除濕明目補元烏須強骨酒蒸用蒲公英寒消瘡結核化食散滯乳癰可食夏枯草寒瘰癧癭瘤散血破癥目痛須求藿香辛溫能止嘔吐發散風寒霍亂功大荊芥味辛能清頭目表汗祛風治瘡消毒止血炒黑用祛風生用香薷味辛傷暑便澀霍亂水腫除煩解熱蒼耳甘溫風寒濕痹頭骨腦漏疥癬功奇炒搗用茵陳味苦退濕除疸明目發汗清熱所攬使君子溫消疳清濁瀉痢諸